spring:
  datasource:
    url: jdbc:h2:mem:test_room_escape-${random.uuid}
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:test-data.sql

auth:
  jwt:
    secret: test-roomescape-test-roomescape-test-roomescape
    access-token-expiration-seconds: 3600

payment:
  toss:
    base-url: https://api.tosspayments.com
    secret-key: test_sk_placeholder
    client-key: test_ck_placeholder
    connect-timeout: 500ms
    read-timeout: 500ms

rate-limit:
  capacity: 1000
  refill-per-second: 1000

outbound-rate-limit:
  capacity: 1000
  refill-per-second: 1000
  max-attempts: 3
  fallback-retry-after: 10ms
