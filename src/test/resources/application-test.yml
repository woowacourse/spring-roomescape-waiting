spring:
  datasource:
    url: jdbc:h2:mem:test_room_escape-${random.uuid}
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      data-locations: classpath:test-data.sql
  jpa:
    show-sql: true
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true

auth:
  jwt:
    secret: test-roomescape-test-roomescape-test-roomescape
    access-token-expiration-seconds: 3600
