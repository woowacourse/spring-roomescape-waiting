spring:
  datasource:
    url: jdbc:h2:mem:database

toss:
  base-url: http://localhost:8089
  client-key: test_client_key
  secret-key: test_secret_key
  max-attempts: 3
  fallback-retry-after-seconds: 1

rate-limit:
  capacity: 10000
  refill-per-second: 10000.0

outbound-rate-limit:
  capacity: 10000
  refill-per-second: 10000.0
