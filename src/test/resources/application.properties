spring.sql.init.data-locations=classpath:/empty-data.sql
toss.base-url=https://api.tosspayments.com
toss.client-key=test_client_key
toss.secret-key=test_secret_key
toss.connect-timeout-ms=500
toss.read-timeout-ms=500
toss.retry-after-max-attempts=2
rate-limit.capacity=100000
rate-limit.refill-per-second=100000
outbound-rate-limit.capacity=100000
outbound-rate-limit.refill-per-second=100000
