spring.sql.init.data-locations=classpath:/empty-data.sql

toss.base-url=http://localhost
toss.secret-key=test_dummy_key
toss.connect-timeout-ms=3000
toss.read-timeout-ms=10000
toss.retry.max-attempts=3

rate-limit.capacity=20
rate-limit.refill-per-second=10

outbound-rate-limit.capacity=10
outbound-rate-limit.refill-per-second=5
