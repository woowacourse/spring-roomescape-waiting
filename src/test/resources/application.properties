spring.datasource.url=jdbc:h2:mem:database
spring.datasource.driver-class-name=org.h2.Driver
spring.sql.init.data-locations=

toss.base-url=https://api.tosspayments.com
toss.client-key=${TOSS_CLIENT_KEY:test-dummy-client-key}
toss.secret-key=${TOSS_SECRET_KEY:test-dummy-secret-key}
toss.connect-timeout=2000
toss.read-timeout=3000
toss.max-attempts=3

rate-limit.capacity=100000
rate-limit.refill-per-second=100000

outbound-rate-limit.capacity=100000
outbound-rate-limit.refill-per-second=100000
