spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.datasource.url=jdbc:h2:mem:testdb
spring.sql.init.data-locations=

toss.connect-timeout-ms=1000
toss.read-timeout-ms=2000

rate-limit.capacity=1000000
rate-limit.refill-per-sec=1000000

outbound-rate-limit.capacity=1000000
outbound-rate-limit.refill-per-sec=1000000
outbound-rate-limit.retry.max-attempts=3
outbound-rate-limit.retry.fallback-delay=1s
