spring:
  h2:
    console:
      enabled: true
      path: /h2-console
  datasource:
    url: jdbc:h2:mem:database

toss:
  base-url: https://api.tosspayments.com
  secret-key: test_gsk_docs_OaPz8L5KdmQXkzRz3y47BMw6
  client-key: test_gck_docs_Ovk5rk1EwkEbP0W43n07xlzm
  connect-timeout-ms: 10000
  read-timeout-ms: 30000
  max-attempts: 3

# 들어오는 요청의 Rate Limit 정책.
rate-limit:
  capacity: 5            # 허용 버스트
  refill-per-second: 1.0 # 평균 TPS 상한

# 게이트웨이가 429 를 주면 Retry-After 만큼 대기 후 재시도하는 백오프 정책.
gateway:
  base-url: http://localhost:8080
  max-attempts: 3

# 나가는 호출의 Rate Limit 정책.
outbound-rate-limit:
  capacity: 5            # 허용 버스트
  refill-per-second: 1.0 # 평균 TPS 상한
