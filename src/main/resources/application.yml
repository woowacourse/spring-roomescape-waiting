spring:
  h2:
    console:
      enabled: true
      path: /h2-console
payments:
  toss:
    base-url: https://api.tosspayments.com
    client-key: ${TOSS_CLIENT_KEY:test_ck_placeholder}
    secret-key: ${TOSS_SECRET_KEY:test_sk_placeholder}
    connect-timeout: ${TOSS_CONNECT_TIMEOUT:2s}
    read-timeout: ${TOSS_READ_TIMEOUT:3s}
    retry:
      max-attempts: ${TOSS_RETRY_MAX_ATTEMPTS:3}
      fallback-delay: ${TOSS_RETRY_FALLBACK_DELAY:1s}
  reservation-amount: ${RESERVATION_AMOUNT:10000}

rate-limit:
  capacity: ${RATE_LIMIT_CAPACITY:1000}
  refill-per-sec: ${RATE_LIMIT_REFILL_PER_SEC:1000}

outbound-rate-limit:
  capacity: ${OUTBOUND_RATE_LIMIT_CAPACITY:100}
  refill-per-sec: ${OUTBOUND_RATE_LIMIT_REFILL_PER_SEC:100}
