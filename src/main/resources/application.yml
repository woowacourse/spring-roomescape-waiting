spring:
  h2:
    console:
      enabled: true
      path: /h2-console
  datasource:
    url: jdbc:h2:mem:database
    driver-class-name: org.h2.Driver
    username: sa

payment:
  client-key: ${TOSS_CLIENT_KEY:test_ck_placeholder}
  toss:
    secret-key: ${TOSS_SECRET_KEY:}
    connect-timeout: PT2S
    read-timeout: PT5S
    retry:
      max-attempts: 3
      fallback-delay: PT1S

rate-limit:
  capacity: 100
  refill-per-second: 100

outbound-rate-limit:
  capacity: 50
  refill-per-second: 50
