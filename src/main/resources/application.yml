spring:
  h2:
    console:
      enabled: true
      path: /h2-console
  datasource:
    url: jdbc:h2:mem:database
  sql:
    init:
      mode: always

payment:
  toss:
    # 토스 공식 문서에 공객된 시크릿 키
    secret-key: ${TOSS_SECRET_KEY:test_gsk_docs_OaPz8L5KdmQXkzRz3y47BMw6}
    connect-timeout: 2s
    read-timeout: 3s
    retry:
      max-attempts: 3
      fallback-backoff: 1s

rate-limit:
  capacity: 1000
  refill-per-sec: 1000

outbound-rate-limit:
  capacity: 1000
  refill-per-sec: 1000
