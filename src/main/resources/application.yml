spring:
  h2:
    console:
      enabled: true
      path: /h2-console
  datasource:
    url: jdbc:h2:mem:database

payment:
  toss:
    base-url: https://api.tosspayments.com
    client-key: ${TOSS_CLIENT_KEY:}
    secret-key: ${TOSS_SECRET_KEY:}
    connect-timeout: 3s
    read-timeout: 5s

rate-limit:
  capacity: 1000
  refill-per-sec: 1000
