error.not-found-reservation=해당 ID의 예약을 찾을 수 없습니다.
error.duplicated-reservation=해당 시간에 본인의 예약이 이미 존재합니다. 예약 가능한 시간으로 다시 시도해 주세요.
error.past-reservation-create=지나간 시간에는 예약할 수 없습니다. 예약 시간을 변경해 주세요.
error.past-reservation-delete=지나간 시간의 예약은 삭제할 수 없습니다.

error.not-found-wait=해당 ID의 예약 대기를 찾을 수 없습니다.
error.duplicated-wait=해당 시간에 이미 예약 대기를 신청했습니다. 다시 시도해 주세요.
error.wait-is-full=해당 시간에 이미 예약 대기가 가득 찼습니다. 다른 시간으로 예약해 주세요.

error.not-found-reservation-time=해당 ID의 예약 시간을 찾을 수 없습니다.
error.duplicated-reservation-time=동일한 예약 시간이 이미 존재합니다. 시간을 변경해 다시 시도해 주세요.
error.referenced-time=현재 해당 예약 시간을 사용하는 예약이 존재합니다. 연관된 예약을 삭제한 후 다시 시도해 주세요.
error.past-reservation-time-read=지나간 날짜의 예약 가능 시간은 조회할 수 없습니다.

error.not-found-theme=해당 ID의 테마를 찾을 수 없습니다.
error.referenced-theme=현재 해당 테마를 사용하는 예약이 존재합니다. 연관된 예약을 삭제한 후 다시 시도해 주세요.
error.future-ranking-period=조회 기간에 미래 날짜가 존재합니다. 현재보다 이전으로 기간을 설정해 주세요.
error.invalid-ranking-period=종료 날짜가 시작 날짜보다 빠릅니다. 종료 날짜가 시작 날짜보다 뒤에 오도록 요청해 주세요.
error.long-ranking-period=조회 기간이 최대 기간을 초과했습니다. 기간이 1년({0}일) 이내가 되도록 다시 요청해 주세요.

error.invalid-input=입력값이 올바르지 않습니다.
error.not-found-resource=요청한 경로를 찾을 수 없습니다.

error.title.not-found=리소스를 찾을 수 없습니다.
error.title.conflict=요청 충돌이 발생했습니다.
error.title.bad-request=잘못된 요청입니다.
error.title.unexpected=서버 오류
error.unexpected=서버 내부에서 에러가 발생했습니다.