spring:
  h2:
    console:
      enabled: true
      path: /h2-console
  datasource:
    url: jdbc:h2:mem:database
  sql:
    init:
      mode: always
  mvc:
    problemdetails:
      enabled: true

payment:
  reservation-amount: ${ROOMESCAPE_RESERVATION_AMOUNT:1000}
  toss:
    base-url: ${TOSS_PAYMENTS_BASE_URL:https://api.tosspayments.com}
    client-key: ${TOSS_PAYMENTS_CLIENT_KEY:test_gck_docs_Ovk5rk1EwkEbP0W43n07xlzm}
    secret-key: ${TOSS_PAYMENTS_SECRET_KEY:test_gsk_docs_OaPz8L5KdmQXkzRz3y47BMw6}
    connect-timeout: ${TOSS_PAYMENTS_CONNECT_TIMEOUT:1s}
    read-timeout: ${TOSS_PAYMENTS_READ_TIMEOUT:2s}
    max-attempts: ${TOSS_PAYMENTS_MAX_ATTEMPTS:3}
    retry-after-fallback-delay: ${TOSS_PAYMENTS_RETRY_AFTER_FALLBACK_DELAY:1s}

rate-limit:
  capacity: ${ROOMESCAPE_RATE_LIMIT_CAPACITY:100}
  refill-per-sec: ${ROOMESCAPE_RATE_LIMIT_REFILL_PER_SEC:100}

outbound-rate-limit:
  capacity: ${TOSS_OUTBOUND_RATE_LIMIT_CAPACITY:100}
  refill-per-sec: ${TOSS_OUTBOUND_RATE_LIMIT_REFILL_PER_SEC:100}
