spring:
  h2:
    console:
      enabled: true
      path: /h2-console
  datasource:
    url: jdbc:h2:mem:database
  sql:
    init:
      mode: always
  mvc:
    problemdetails:
      enabled: true

payment:
  reservation-amount: ${ROOMESCAPE_RESERVATION_AMOUNT:1000}
  toss:
    base-url: ${TOSS_PAYMENTS_BASE_URL:https://api.tosspayments.com}
    client-key: ${TOSS_PAYMENTS_CLIENT_KEY:}
    secret-key: ${TOSS_PAYMENTS_SECRET_KEY:}
