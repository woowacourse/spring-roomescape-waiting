<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>사용자 — 예약</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <script src="https://js.tosspayments.com/v2/standard"></script>
    <style>
        #paymentPanel { display: none; }

        .amount-display {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            margin: 0.5rem 0 1.25rem;
        }

        .pay-summary {
            background: #121920;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1.25rem;
            font-size: 0.88rem;
            color: var(--muted);
            line-height: 1.8;
        }

        .pay-summary strong {
            color: var(--text);
        }

        #paymentBtn {
            width: 100%;
            padding: 0.75rem;
            font-size: 1rem;
            margin-top: 1rem;
        }

        .widget-loading {
            text-align: center;
            color: var(--muted);
            padding: 2rem 0;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<header th:replace="~{fragments/site :: siteHeader}"></header>
<main>
    <h1>예약하기</h1>
    <p class="muted"><a th:href="@{/user}">← 사용자 홈</a></p>

    <div class="panel">
        <h2>1. 날짜</h2>
        <div class="form-row">
            <label>게임 날짜
                <input type="date" id="gameDate"/>
            </label>
        </div>
    </div>
    <div class="panel">
        <h2>2. 테마</h2>
        <p id="themeHint" class="muted">테마 목록을 불러오는 중…</p>
        <div id="themePick" class="theme-pick" style="display:none;"></div>
    </div>
    <div class="panel">
        <h2>3. 예약 가능한 시간</h2>
        <p class="muted">같은 날짜·시간이라도 테마가 다르면 각각 예약할 수 있습니다.</p>
        <div id="timeChips" class="time-chips"></div>
        <p id="timeHint" class="muted">날짜와 테마를 먼저 선택하세요.</p>
    </div>
    <div class="panel">
        <h2>4. 이름으로 예약</h2>
        <div class="form-row">
            <label>예약자 이름
                <input type="text" id="memberName" maxlength="255" placeholder="이름"/>
            </label>
            <button type="button" class="btn btn-primary" id="submitBtn" disabled>예약 요청</button>
        </div>
        <p id="status" class="status-msg" style="display:none;"></p>
    </div>

    <!-- 결제 패널: PENDING 예약 후 노출 -->
    <div class="panel" id="paymentPanel">
        <h2>5. 결제</h2>
        <div class="pay-summary" id="paySummary"></div>
        <div class="amount-display" id="amountDisplay"></div>
        <div id="payment-method">
            <div class="widget-loading">결제 수단을 불러오는 중…</div>
        </div>
        <div id="agreement"></div>
        <button type="button" class="btn btn-primary" id="paymentBtn">결제하기</button>
        <p id="paymentStatus" class="status-msg" style="display:none;"></p>
    </div>
</main>

<script th:inline="javascript">
    const TOSS_CLIENT_KEY = /*[[${tossClientKey}]]*/ '';

    const gameDate    = document.getElementById('gameDate');
    const themePick   = document.getElementById('themePick');
    const themeHint   = document.getElementById('themeHint');
    const timeChips   = document.getElementById('timeChips');
    const timeHint    = document.getElementById('timeHint');
    const memberName  = document.getElementById('memberName');
    const submitBtn   = document.getElementById('submitBtn');
    const status      = document.getElementById('status');
    const paymentPanel  = document.getElementById('paymentPanel');
    const paySummary    = document.getElementById('paySummary');
    const amountDisplay = document.getElementById('amountDisplay');
    const paymentBtn    = document.getElementById('paymentBtn');
    const paymentStatus = document.getElementById('paymentStatus');

    let themes = [];
    let times  = [];
    let reservations = [];
    let selectedThemeId   = null;
    let selectedThemeName = '';
    let selectedTimeId    = null;
    let selectedTimeLabel = '';
    let selectedTimeBooked = false;

    // Toss 결제 위젯 인스턴스
    let paymentWidget = null;
    // 현재 결제 대기 중인 orderId
    let pendingOrderId = null;

    function localYmd(d) {
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${y}-${m}-${day}`;
    }

    function showStatus(text, ok) {
        status.textContent = text;
        status.className   = 'status-msg ' + (ok ? 'ok' : 'err');
        status.style.display = 'block';
    }

    function showPaymentStatus(text, ok) {
        paymentStatus.textContent = text;
        paymentStatus.className   = 'status-msg ' + (ok ? 'ok' : 'err');
        paymentStatus.style.display = 'block';
    }

    function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, c => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[c]));
    }

    // sessionStorage에서 customerKey를 꺼내거나 새로 발급
    function getOrCreateCustomerKey() {
        let key = sessionStorage.getItem('toss-customer-key');
        if (!key) {
            key = 'guest-' + crypto.randomUUID().replace(/-/g, '');
            sessionStorage.setItem('toss-customer-key', key);
        }
        return key;
    }

    async function refreshReservations() {
        const res = await fetch('/reservations');
        if (!res.ok) throw new Error('예약 목록을 불러오지 못했습니다.');
        reservations = await res.json();
    }

    function reservedTimeIds(dateStr, themeId) {
        return new Set(
            reservations
                .filter(r => r.date === dateStr && r.theme.id === themeId && r.status === 'RESERVED')
                .map(r => r.time.id)
        );
    }

    function renderTimes() {
        timeChips.innerHTML = '';
        selectedTimeId    = null;
        selectedTimeLabel = '';
        selectedTimeBooked = false;
        submitBtn.disabled = true;
        submitBtn.textContent = '예약 요청';
        const dateStr = gameDate.value;
        if (!dateStr || selectedThemeId == null) {
            timeHint.textContent = '날짜와 테마를 먼저 선택하세요.';
            return;
        }
        const taken = reservedTimeIds(dateStr, selectedThemeId);
        if (!times.length) {
            timeHint.textContent = '이 날짜·테마에 예약 가능한 시간이 없습니다. (관리자에게 시간 등록을 요청하세요)';
            return;
        }
        const hasBooked = times.some(t => taken.has(t.id));
        timeHint.textContent = hasBooked
            ? '시간을 선택하세요. (주황색 시간은 이미 예약됨 — 대기 신청 가능)'
            : '시간을 선택하세요.';
        for (const t of times) {
            const btn = document.createElement('button');
            btn.type = 'button';
            const isBooked = taken.has(t.id);
            btn.className = 'time-chip' + (isBooked ? ' booked' : '');
            const label = typeof t.startAt === 'string' ? t.startAt.slice(0, 5) : String(t.startAt).slice(0, 5);
            btn.textContent = isBooked ? `${label} (대기)` : label;
            if (isBooked) btn.title = '이미 예약됨 — 대기 신청으로 처리됩니다';
            btn.addEventListener('click', () => {
                selectedTimeId    = t.id;
                selectedTimeLabel = label;
                selectedTimeBooked = isBooked;
                timeChips.querySelectorAll('.time-chip').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                submitBtn.textContent = isBooked ? '대기 신청' : '결제하기';
                submitBtn.disabled = !memberName.value.trim();
            });
            timeChips.appendChild(btn);
        }
    }

    function renderThemes() {
        themePick.innerHTML = '';
        if (!themes.length) {
            themeHint.textContent = '등록된 테마가 없습니다. 관리자 화면에서 테마를 추가하세요.';
            themePick.style.display = 'none';
            return;
        }
        themeHint.textContent = '테마를 선택하세요.';
        themePick.style.display = 'grid';
        for (const th of themes) {
            const b = document.createElement('button');
            b.type = 'button';
            b.className = 'theme-option' + (selectedThemeId === th.id ? ' selected' : '');
            b.innerHTML = `
                <img src="${escapeHtml(th.imageUrl)}" alt=""/>
                <div class="t-name">${escapeHtml(th.name)}</div>
                <div class="t-desc">${escapeHtml(th.description)}</div>`;
            b.addEventListener('click', () => {
                selectedThemeId   = th.id;
                selectedThemeName = th.name;
                themePick.querySelectorAll('.theme-option').forEach(el => el.classList.remove('selected'));
                b.classList.add('selected');
                renderTimes();
            });
            themePick.appendChild(b);
        }
    }

    gameDate.addEventListener('change', renderTimes);

    memberName.addEventListener('input', () => {
        submitBtn.disabled = !(selectedTimeId && memberName.value.trim());
    });

    // ── Toss 결제 위젯 초기화 ──────────────────────────────
    async function initPaymentWidget(amount) {
        document.getElementById('payment-method').innerHTML =
            '<div class="widget-loading">결제 수단을 불러오는 중…</div>';
        document.getElementById('agreement').innerHTML = '';

        const tossPayments = TossPayments(TOSS_CLIENT_KEY);
        const customerKey  = getOrCreateCustomerKey();
        // 위젯 방식은 .payment()가 아닌 .widgets()
        paymentWidget = tossPayments.widgets({ customerKey });

        await paymentWidget.setAmount({ currency: 'KRW', value: amount });

        await paymentWidget.renderPaymentMethods({
            selector: '#payment-method',
            variantKey: 'DEFAULT'
        });

        await paymentWidget.renderAgreement({
            selector: '#agreement',
            variantKey: 'AGREEMENT'
        });
    }

    // ── 예약 요청 버튼 ──────────────────────────────────────
    submitBtn.addEventListener('click', async () => {
        status.style.display = 'none';
        const body = {
            name: memberName.value.trim(),
            date: gameDate.value,
            timeId: selectedTimeId,
            themeId: selectedThemeId
        };

        submitBtn.disabled = true;
        submitBtn.textContent = '처리 중…';

        try {
            const res = await fetch('/reservations', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            if (!res.ok) {
                const errBody = await res.json().catch(() => ({}));
                throw new Error(errBody.message || '요청에 실패했습니다.');
            }
            const data = await res.json();

            if (data.status === 'WAITING') {
                // 대기 신청 완료 — 결제 불필요
                showStatus('대기 신청이 완료되었습니다.', true);
                await refreshReservations();
                renderTimes();
                memberName.value = '';
            } else if (data.status === 'PENDING') {
                // 결제 필요 — Toss 위젯 초기화
                pendingOrderId = data.orderId;

                paySummary.innerHTML = `
                    <div><strong>날짜</strong>  ${escapeHtml(data.date)}</div>
                    <div><strong>테마</strong>  ${escapeHtml(selectedThemeName)}</div>
                    <div><strong>시간</strong>  ${escapeHtml(selectedTimeLabel)}</div>
                    <div><strong>예약자</strong> ${escapeHtml(data.name)}</div>`;
                amountDisplay.textContent = `${Number(data.amount).toLocaleString()}원`;

                paymentPanel.style.display = 'block';
                paymentPanel.scrollIntoView({ behavior: 'smooth' });

                await initPaymentWidget(data.amount);
            }
        } catch (e) {
            showStatus(e.message, false);
            submitBtn.disabled = false;
            submitBtn.textContent = selectedTimeBooked ? '대기 신청' : '결제하기';
        }
    });

    // ── 결제하기 버튼 ──────────────────────────────────────
    paymentBtn.addEventListener('click', async () => {
        if (!paymentWidget || !pendingOrderId) return;
        paymentStatus.style.display = 'none';
        paymentBtn.disabled = true;
        paymentBtn.textContent = '결제 진행 중…';

        try {
            await paymentWidget.requestPayment({
                orderId:      pendingOrderId,
                orderName:    '방탈출 예약',
                successUrl:   window.location.origin + '/user/payment/success',
                failUrl:      window.location.origin + '/user/payment/fail',
                customerName: memberName.value.trim()
            });
            // requestPayment는 페이지를 successUrl로 리다이렉트하므로
            // 아래 코드는 오류가 발생한 경우에만 실행됩니다.
        } catch (e) {
            showPaymentStatus(e.message || '결제 요청 중 오류가 발생했습니다.', false);
            paymentBtn.disabled = false;
            paymentBtn.textContent = '결제하기';
        }
    });

    (async function init() {
        const today = new Date();
        gameDate.value = localYmd(today);
        try {
            const [tr, ts, rr] = await Promise.all([
                fetch('/themes'),
                fetch('/times'),
                fetch('/reservations')
            ]);
            if (!tr.ok || !ts.ok || !rr.ok) throw new Error('데이터를 불러오지 못했습니다.');
            themes       = await tr.json();
            times        = await ts.json();
            reservations = await rr.json();
            renderThemes();
            renderTimes();
        } catch (e) {
            themeHint.textContent = e.message;
        }
    })();
</script>
</body>
</html>
