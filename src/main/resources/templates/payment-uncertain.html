<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>결제 결과 확인 필요</title>
  <style>
    body {
      font-family: -apple-system, "Segoe UI", sans-serif;
      background: #f4f5f7;
      margin: 0;
      padding: 40px 16px;
    }

    .card {
      max-width: 480px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, .06);
    }

    h1 {
      font-size: 20px;
      margin: 0 0 12px;
    }

    .desc {
      font-size: 14px;
      color: #555;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
      gap: 16px;
    }

    .row .label {
      color: #888;
      white-space: nowrap;
    }

    .row .val {
      text-align: right;
      word-break: break-all;
      color: #555;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .actions a {
      flex: 1;
      text-align: center;
      padding: 14px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
    }

    .retry {
      background: #3182f6;
      color: #fff;
    }

    .later {
      background: #f0f0f0;
      color: #555;
    }
  </style>
</head>
<body>
<div class="card">
  <h1>⏳ 결제 결과를 확인하지 못했어요</h1>
  <p class="desc">
    응답이 지연되어 결제가 승인됐는지 아직 알 수 없습니다.
    이미 승인됐을 수 있으니 결제 실패로 단정하지 않습니다.
    다시 확인하면 같은 멱등키로 처리되어 이중 결제가 발생하지 않습니다.
  </p>

  <div class="row"><span class="label">메시지</span>
    <span class="val" th:text="${message}">결제 결과를 확인하지 못했습니다.</span></div>
  <div class="row"><span class="label">주문번호</span>
    <span class="val" th:text="${orderId}">order-xxxx</span></div>

  <div class="actions">
    <a class="retry"
       th:href="@{/payments/success(paymentKey=${paymentKey}, orderId=${orderId}, amount=${amount})}">결과 다시 확인</a>
    <a class="later" href="/my-reservations">내 예약에서 확인</a>
  </div>
</div>
</body>
</html>
