<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예약하기 · 방탈출</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="topbar">
    <a class="brand" th:href="@{/}">방탈출 예약</a>
    <nav class="nav">
        <a th:href="@{/}">홈</a>
        <a class="active" th:href="@{/reservation}">예약</a>
        <a th:href="@{/popular}">인기 테마</a>
        <a th:href="@{/admin}">어드민</a>
    </nav>
</header>

<main class="container">
    <div class="page-header">
        <div>
            <h1>예약하기</h1>
            <p class="subtitle">원하는 슬롯이 이미 예약되어 있으면 대기로 신청됩니다.</p>
        </div>
    </div>

    <section class="card reservation-form-card">
        <div class="reservation-form">
            <div class="form-field">
                <label class="field-label" for="reservation-name-input">예약자 이름</label>
                <input id="reservation-name-input"
                       class="input"
                       type="text"
                       placeholder="예: 브라운"
                       autocomplete="off">
            </div>
            <div class="form-field">
                <label class="field-label" for="reservation-date-input">날짜</label>
                <input id="reservation-date-input" class="input" type="date">
            </div>
            <div class="form-field">
                <label class="field-label" for="reservation-theme-select">테마</label>
                <select id="reservation-theme-select" class="select"></select>
            </div>
            <div class="form-field">
                <label class="field-label" for="reservation-time-select">시간</label>
                <select id="reservation-time-select" class="select"></select>
            </div>
            <button id="reservation-submit-button" class="btn btn-primary reservation-submit" type="button">
                예약 신청
            </button>
        </div>
        <p id="reservation-form-message" class="form-message muted">
            날짜와 테마를 선택하면 예약 가능 시간과 대기 신청 가능한 시간이 함께 표시됩니다.
        </p>
    </section>

    <section id="my-reservations" class="card lookup-card">
        <div class="lookup-form">
            <label class="field-label" for="my-reservation-name-input">예약자 이름</label>
            <input id="my-reservation-name-input"
                   class="input"
                   type="text"
                   placeholder="예: 브라운"
                   autocomplete="off">
            <button id="my-reservation-search-button"
                    class="btn btn-primary"
                    type="button">
                내 예약 조회
            </button>
        </div>
        <p id="my-reservation-lookup-message" class="lookup-message muted">
            예약할 때 입력한 이름을 넣어주세요.
        </p>
    </section>

    <section class="card my-reservation-card">
        <table class="data">
            <thead>
            <tr>
                <th style="width: 60px;">#</th>
                <th>상태</th>
                <th>테마</th>
                <th>예약자</th>
                <th>날짜</th>
                <th>시간</th>
                <th>대기 순번</th>
                <th class="actions">변경/취소</th>
            </tr>
            </thead>
            <tbody id="my-reservation-table-body"></tbody>
        </table>
    </section>
</main>

<script th:src="@{/js/common.js}"></script>
<script th:src="@{/js/reservation.js}"></script>
<script th:src="@{/js/my-reservation.js}"></script>
</body>
</html>
