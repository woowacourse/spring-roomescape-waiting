<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예약하기 · 방탈출</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=2)}">
</head>
<body>
<header class="topbar">
    <a class="brand" th:href="@{/}">방탈출 예약</a>
    <nav class="nav">
        <a th:href="@{/}">홈</a>
        <a class="active" th:href="@{/reservation}">예약</a>
        <a th:href="@{/my}">내 예약</a>
        <a th:href="@{/popular}">인기 테마</a>
        <a th:href="@{/admin}">어드민</a>
    </nav>
</header>

<main class="container">
    <div class="page-header">
        <div>
            <h1>예약 현황</h1>
            <p class="subtitle">예약 현황을 확인하고 새 예약을 등록할 수 있습니다.</p>
        </div>
        <button id="add-button" class="btn btn-primary" type="button">+ 예약 추가</button>
    </div>

    <section class="card">
        <table class="data">
            <thead>
            <tr>
                <th style="width: 60px;">#</th>
                <th>예약자</th>
                <th>테마</th>
                <th>날짜</th>
                <th>시간</th>
                <th class="actions"></th>
            </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </section>
</main>

<div id="payment-modal" class="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="payment-modal-title">
        <div class="modal-header">
            <h2 id="payment-modal-title">결제하기</h2>
            <button id="payment-modal-close" class="modal-close" type="button" aria-label="닫기">&times;</button>
        </div>
        <div class="modal-body">
            <div class="order-summary">
                <span id="order-name" class="order-name"></span>
                <span id="order-amount" class="order-amount"></span>
            </div>
            <div id="payment-method"></div>
            <div id="agreement"></div>
        </div>
        <div class="modal-footer">
            <button id="payment-button" class="btn btn-primary" type="button">결제하기</button>
        </div>
    </div>
</div>

<script src="https://js.tosspayments.com/v2/standard"></script>
<script th:src="@{/js/common.js(v=2)}"></script>
<script th:src="@{/js/reservation.js(v=6)}"></script>
</body>
</html>
