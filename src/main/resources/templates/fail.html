<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>결제 실패</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
            margin: 0;
            background: #f5f5f7;
            color: #1d1d1f;
        }

        header {
            background: #1d1d1f;
            color: #fff;
            padding: 24px 40px;
        }

        header h1 {
            margin: 0;
            font-size: 24px;
        }

        main {
            max-width: 480px;
            margin: 40px auto;
            padding: 0 16px;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
        }

        .card h2 {
            margin: 0 0 20px;
            font-size: 20px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
            gap: 16px;
        }

        .row .label {
            color: #888;
            white-space: nowrap;
        }

        .row .val {
            text-align: right;
            word-break: break-all;
            color: #ff3b30;
        }

        .links {
            margin-top: 24px;
            display: flex;
            gap: 16px;
        }

        .links a {
            color: #007aff;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
<header>
    <h1>🔑 방탈출 예약</h1>
</header>
<main>
    <div class="card">
        <h2>❌ 결제를 실패했어요</h2>

        <div class="row"><span class="label">에러코드</span>
            <span class="val" th:text="${code}">REJECT_CARD_PAYMENT</span></div>
        <div class="row"><span class="label">에러메시지</span>
            <span class="val" th:text="${message}">에러 메시지</span></div>
        <div class="row"><span class="label">주문번호</span>
            <span class="val" style="color:#555" th:text="${orderId} ?: '(취소되어 전달되지 않음)'">order-xxxx</span></div>

        <div class="links">
            <a href="/index.html">← 메인으로</a>
        </div>
    </div>
</main>
</body>
</html>
