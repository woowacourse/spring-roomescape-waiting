<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대기 관리 — ESCAPE ROOM ADMIN</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <a href="/theme" class="admin-entry is-admin d-none" title="관리자 페이지">
      <i class="fas fa-user-shield"></i><span>관리자 모드</span>
    </a>
    <a href="/" class="brand">
      <span class="brand-mark"><i class="fas fa-key"></i></span>
      ESCAPE ROOM
    </a>
    <button type="button" class="nav-toggle" aria-label="메뉴"><i class="fas fa-bars"></i></button>
    <nav class="nav">
      <a href="/theme">테마 관리</a>
      <a href="/time">시간 관리</a>
      <a href="/waiting" class="active">대기 관리</a>
      <a href="/">사용자 페이지</a>
    </nav>
  </div>
</header>

<main class="container">
  <h1 class="page-title"><i class="fas fa-hourglass-half" style="color:var(--accent);margin-right:10px;"></i>대기 관리</h1>
  <p class="page-subtitle">전체 예약 대기를 확인하고 취소할 수 있습니다.</p>

  <div class="table-container">
    <table class="table">
      <thead>
        <tr>
          <th>번호</th>
          <th>예약자</th>
          <th>테마</th>
          <th>날짜</th>
          <th>시간</th>
          <th style="width:120px;text-align:right;">관리</th>
        </tr>
      </thead>
      <tbody id="waiting-tbody"></tbody>
    </table>
  </div>
  <div id="waiting-empty" class="empty d-none" style="margin-top:16px;">대기 중인 예약이 없습니다.</div>
</main>

<script src="/js/scripts.js"></script>
<script src="/js/nav.js"></script>
<script src="/js/waiting.js"></script>
</body>
</html>
