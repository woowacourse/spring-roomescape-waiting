<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>결제 실패 | ESCAPE</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&family=Noto+Sans+KR:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css?v=payment-result-20260625-2">
</head>
<body class="payment-result-page payment-result-fail">
<header>
    <a href="/" class="escape-logo">ESC<span>A</span>PE</a>
    <a href="/reservation" class="header-link">새 예약</a>
</header>

<main class="payment-result-main">
    <section class="payment-result-card" aria-labelledby="payment-result-title">
        <p class="payment-result-eyebrow">PAYMENT NOT COMPLETED</p>
        <div class="payment-result-symbol" aria-hidden="true">!</div>
        <h1 id="payment-result-title">결제를 완료하지 못했어요</h1>
        <p class="payment-result-description">예약은 결제 대기 상태로 유지됩니다. 내 예약에서 다시 결제하거나 취소할 수 있어요.</p>

        <div th:if="${reservation != null}">
            <h2 class="payment-result-detail-title">예약 정보</h2>
            <dl class="payment-result-details">
                <div>
                    <dt>예약자</dt>
                    <dd th:text="${reservation.reserverName}">브라운</dd>
                </div>
                <div>
                    <dt>테마</dt>
                    <dd th:text="${reservation.themeName}">미스터리 룸</dd>
                </div>
                <div>
                    <dt>예약 일시</dt>
                    <dd><span th:text="${reservation.date}">2026. 06. 30.</span> <span th:text="${reservation.time}">14:00</span></dd>
                </div>
            </dl>
        </div>

        <h2 class="payment-result-detail-title payment-result-failure-title">결제 실패 정보</h2>
        <dl class="payment-result-details">
            <div>
                <dt>에러 코드</dt>
                <dd th:text="${code}">AMOUNT_MISMATCH</dd>
            </div>
            <div>
                <dt>사유</dt>
                <dd th:text="${message}">결제 금액이 일치하지 않습니다.</dd>
            </div>
            <div th:if="${orderId != null}">
                <dt>주문번호</dt>
                <dd th:text="${orderId}">payment-xxxx</dd>
            </div>
        </dl>

        <div class="payment-result-actions">
            <a class="payment-result-primary" th:if="${name != null}" th:href="@{/reservation/me(name=${name})}">내 예약으로 이동</a>
            <a class="payment-result-primary" th:unless="${name != null}" href="/reservation/me">내 예약으로 이동</a>
            <a class="payment-result-secondary" href="/reservation">새 예약하기</a>
        </div>
    </section>
</main>
</body>
</html>
