<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>결제 실패 - ENIGMA ROOMS</title>
    <link rel="stylesheet" href="/css/user.css">
    <style>
        .status-container {
            max-width: 600px;
            margin: 100px auto;
            text-align: center;
            padding: 40px;
            background: #0b0d10;
            border: 1px solid rgba(226, 90, 90, 0.3);
            border-radius: 14px;
        }
        .status-container h1 {
            color: #e25a5a;
            margin-bottom: 20px;
        }
        .status-container p {
            color: #b5b5b5;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="status-container">
        <h1>결제 실패</h1>
        <p th:text="${message}">결제 중 오류가 발생했습니다.</p>
        <p style="font-size: 14px; color: #888;" th:if="${code}" th:text="'에러 코드: ' + ${code}"></p>
        <p style="font-size: 14px; color: #888;" th:if="${orderId}" th:text="'주문 번호: ' + ${orderId}"></p>
        <button class="primary-button" onclick="location.href='/reservation'">다시 시도하기</button>
    </div>
</body>
</html>
