<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>결제 확인 필요</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
            margin: 0;
            background: #f5f5f7;
            color: #1d1d1f;
        }

        header {
            background: #1d1d1f;
            color: #fff;
            padding: 24px 40px;
        }

        header h1 {
            margin: 0;
            font-size: 24px;
        }

        main {
            max-width: 480px;
            margin: 40px auto;
            padding: 0 16px;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
        }

        .card h2 {
            margin: 0 0 8px;
            font-size: 20px;
        }

        .desc {
            color: #888;
            margin: 0 0 20px;
            font-size: 14px;
            line-height: 1.6;
        }

        .row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
            gap: 16px;
        }

        .row .label {
            color: #888;
            white-space: nowrap;
        }

        .row .val {
            text-align: right;
            word-break: break-all;
            color: #ff9500;
        }

        .links {
            margin-top: 24px;
            display: flex;
            gap: 16px;
        }

        .links a {
            color: #007aff;
            text-decoration: none;
            font-weight: 600;
        }

        .links a.primary {
            color: #fff;
            background: #007aff;
            padding: 10px 16px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
<header>
    <h1>🔑 방탈출 예약</h1>
</header>
<main>
    <div class="card">
        <h2>⏳ 결제 결과를 확인하지 못했어요</h2>
        <p class="desc">
            결제가 실패한 것은 아닙니다. 토스 쪽 응답을 받지 못해 결과를 아직 모르는 상태예요.
            같은 주문으로 다시 확인해도 이중 승인되지 않으니, 안심하고 다시 확인해주세요.
        </p>

        <div class="row"><span class="label">상태코드</span>
            <span class="val" th:text="${code}">RESULT_UNKNOWN</span></div>
        <div class="row"><span class="label">안내</span>
            <span class="val" th:text="${message}">안내 메시지</span></div>
        <div class="row"><span class="label">주문번호</span>
            <span class="val" style="color:#555" th:text="${orderId}">order-xxxx</span></div>

        <div class="links">
            <a class="primary"
               th:href="@{/payments/success(paymentKey=${paymentKey},orderId=${orderId},amount=${amount})}">
                다시 확인하기
            </a>
            <a href="/index.html">← 메인으로</a>
        </div>
    </div>
</main>
</body>
</html>
