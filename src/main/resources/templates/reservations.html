<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 예약 조회</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f6f7fb;
            color: #1f2937;
        }

        .page {
            width: min(800px, calc(100% - 32px));
            margin: 32px auto;
        }

        .nav, .card {
            background: #fff;
            border: 1px solid #dde3f0;
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 16px;
        }

        form {
            display: grid;
            gap: 12px;
        }

        label {
            display: grid;
            gap: 6px;
            font-weight: 600;
        }

        input, select, button {
            width: 100%;
            border: 1px solid #dde3f0;
            border-radius: 12px;
            padding: 11px 13px;
            font: inherit;
            background: white;
            box-sizing: border-box;
        }

        button {
            border: none;
            background: #4f46e5;
            color: white;
            font-weight: 700;
            cursor: pointer;
        }

        button.danger {
            background: #dc2626;
            width: auto;
            padding: 8px 16px;
        }

        ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: grid;
            gap: 10px;
        }

        li {
            border: 1px solid #dde3f0;
            border-radius: 14px;
            padding: 14px;
            background: #fbfcff;
        }

        .flash {
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-weight: 600;
        }

        .success {
            background: #ecfdf3;
            color: #027a48;
        }

        .error {
            background: #fef3f2;
            color: #b42318;
        }

        .head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .meta {
            color: #667085;
            font-size: 0.9em;
            margin: 4px 0 0;
        }

        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 999px;
            font-size: 0.8em;
            font-weight: 700;
        }

        .badge.reserved {
            background: #ecfdf3;
            color: #027a48;
        }

        .badge.waiting {
            background: #fef9ec;
            color: #b45309;
        }

        .badge.pending {
            background: #eff6ff;
            color: #1d4ed8;
        }

        .badge.uncertain {
            background: #fef3c7;
            color: #92400e;
        }

        .payment-info {
            margin-top: 8px;
            font-size: 0.85em;
            color: #4b5563;
        }

        .payment-info span {
            display: inline-block;
            margin-right: 12px;
        }

        .empty {
            color: #667085;
            font-style: italic;
        }

        .inline-form {
            display: inline-block;
        }

        .search-row {
            display: flex;
            gap: 10px;
        }

        .search-row input {
            flex: 1;
        }

        .search-row button {
            width: auto;
            padding: 11px 20px;
        }

        .update-row {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            align-items: center;
        }

        .update-row select {
            flex: 1;
        }

        .update-row button {
            width: auto;
            padding: 8px 16px;
            background: #0ea5e9;
        }
    </style>
</head>
<body>
<div class="page">
    <section class="nav">
        <h1>내 예약 조회</h1>
    </section>

    <div th:if="${successMessage}" class="flash success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="flash error" th:text="${errorMessage}"></div>

    <section class="card">
        <h2>이름으로 예약 조회</h2>
        <form method="get" th:action="@{/page/reservations}">
            <div class="search-row">
                <input type="text" name="name" placeholder="이름 입력" th:value="${name}" required>
                <button type="submit">조회</button>
            </div>
        </form>
    </section>

    <section class="card">
        <h2>예약 생성</h2>
        <form method="post" th:action="@{/page/reservations}">
            <input type="hidden" name="name" th:value="${name}">
            <label>테마
                <select name="themeId" required>
                    <option value="">테마 선택</option>
                    <option th:each="theme : ${themes}" th:value="${theme.id()}" th:text="${theme.name()}"></option>
                </select>
            </label>
            <label>시간
                <select name="timeId" required>
                    <option value="">시간 선택</option>
                    <option th:each="time : ${times}" th:value="${time.id()}"
                            th:text="|${time.startAt()} ~ ${time.endAt()}|"></option>
                </select>
            </label>
            <label>결제 금액 (원)
                <input type="number" name="amount" placeholder="예: 50000" required min="1">
            </label>
            <button type="submit" th:disabled="${name == null or name.isBlank()}">예약 / 대기 신청</button>
        </form>
    </section>

    <section class="card" th:if="${reservations != null}">
        <h2>예약 목록</h2>
        <ul>
            <li th:if="${#lists.isEmpty(reservations)}" class="empty">예약 없음</li>
            <li th:each="r : ${reservations}">
                <div class="head">
                    <div>
                        <strong th:text="${r.theme().name()}"></strong>
                        <span th:with="s=${r.status().name()}"
                              th:class="${s == 'CONFIRMED'} ? 'badge reserved' : (${s == 'WAITING'} ? 'badge waiting' : (${s == 'PAYMENT_UNCERTAIN'} ? 'badge uncertain' : 'badge pending'))"
                              th:text="${s == 'CONFIRMED'} ? '결제 완료' : (${s == 'WAITING'} ? |대기 ${r.waitingOrder()}번| : (${s == 'PAYMENT_UNCERTAIN'} ? '확인 필요' : (${s == 'PAYMENT_PENDING'} ? '결제 대기' : '예약')))"></span>
                        <p class="meta" th:text="|${r.time().startAt()} ~ ${r.time().endAt()}|"></p>
                    </div>
                    <form class="inline-form" method="post"
                          th:action="@{|/page/reservations/${r.id()}/cancel|}">
                        <input type="hidden" name="name" th:value="${name}">
                        <input type="hidden" name="status" th:value="${r.status().name()}">
                        <button type="submit" class="danger">취소</button>
                    </form>
                </div>
                <div class="payment-info" th:if="${r.orderId() != null}">
                    <span>주문 ID: <code th:text="${r.orderId()}"></code></span>
                    <span th:if="${r.amount() != null}">금액: <strong th:text="${r.amount()}">0</strong>원</span>
                    <span th:if="${r.paymentKey() != null}">결제 키: <code th:text="${r.paymentKey()}"></code></span>
                    <span th:if="${r.status().name() == 'PAYMENT_UNCERTAIN'}">
                        ⚠ 결제 결과를 확인할 수 없습니다.
                        <a th:href="@{/page/payment(orderId=${r.orderId()}, amount=${r.amount()}, orderName='방탈출 예약')}">재시도</a>
                    </span>
                </div>
                <form class="update-row" method="post"
                      th:action="@{|/page/reservations/${r.id()}/update|}">
                    <input type="hidden" name="name" th:value="${name}">
                    <select name="timeId" required>
                        <option value="">시간 선택</option>
                        <option th:each="time : ${times}"
                                th:value="${time.id()}"
                                th:text="|${time.startAt()} ~ ${time.endAt()}|"
                                th:selected="${time.id() == r.time().id()}"></option>
                    </select>
                    <button type="submit">시간 변경</button>
                </form>
            </li>
        </ul>
    </section>
</div>
</body>
</html>
