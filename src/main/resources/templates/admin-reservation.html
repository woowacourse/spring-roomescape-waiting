<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예약 관리</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="admin-page">
<header>
    <a href="/admin" class="brand">
        <div class="header-title">예약 관리</div>
        <div class="header-sub">Admin</div>
    </a>
    <nav class="admin-nav">
        <a href="/admin/reservation" class="active">예약</a>
        <a href="/admin/time">시간</a>
        <a href="/admin/theme">테마</a>
    </nav>
</header>

<main>
    <div class="section-header">
        <div class="section-title">예약 추가</div>
    </div>
    <div class="form-grid reservation-form">
        <input type="text" id="name-input" placeholder="예약자 이름">
        <input type="date" id="date-input">
        <select id="theme-select"></select>
        <select id="time-select"></select>
        <button onclick="createReservation()">예약 추가</button>
    </div>

    <div class="section-header">
        <div class="section-title">예약 목록</div>
    </div>
    <div class="reservation-filter-panel">
        <div class="filter-preset-row">
            <div class="filter-preset-tabs">
                <button type="button" class="filter-preset" data-range="today" onclick="selectDatePreset('today')">오늘</button>
                <button type="button" class="filter-preset" data-range="lastMonth" onclick="selectDatePreset('lastMonth')">지난 달</button>
                <button type="button" class="filter-preset" data-range="thisMonth" onclick="selectDatePreset('thisMonth')">이번 달</button>
                <button type="button" class="filter-preset" data-range="nextMonth" onclick="selectDatePreset('nextMonth')">다음 달</button>
                <button type="button" class="filter-preset" data-range="custom" onclick="selectDatePreset('custom', false)">기간 선택</button>
            </div>
            <div class="status-filter-group" aria-label="보기 옵션">
                <span>보기 옵션</span>
                <label class="status-filter-option">
                    <input type="checkbox" id="show-reserved-checkbox" checked>
                    <span>예약</span>
                </label>
                <label class="status-filter-option">
                    <input type="checkbox" id="show-waiting-checkbox" checked>
                    <span>대기</span>
                </label>
            </div>
        </div>
        <div class="date-range-row">
            <label class="date-field">
                <span>시작일</span>
                <input type="date" id="start-date-input"
                       onmousedown="selectDatePreset('custom', false)"
                       onfocus="selectDatePreset('custom', false)">
            </label>
            <label class="date-field">
                <span>종료일</span>
                <input type="date" id="end-date-input"
                       onmousedown="selectDatePreset('custom', false)"
                       onfocus="selectDatePreset('custom', false)">
            </label>
            <button type="button" class="btn-filter-search" onclick="loadReservations()">조회</button>
        </div>
    </div>
    <div class="toolbar">
        <input type="search" id="search-input" placeholder="이름, 날짜, 시간, 테마, 상태, 순번 검색">
    </div>
    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th data-sort="id">ID<span class="sort-indicator"></span></th>
                <th data-sort="name">이름<span class="sort-indicator"></span></th>
                <th data-sort="date">날짜<span class="sort-indicator"></span></th>
                <th data-sort="time">시간<span class="sort-indicator"></span></th>
                <th data-sort="theme">테마<span class="sort-indicator"></span></th>
                <th data-sort="status">상태<span class="sort-indicator"></span></th>
                <th data-sort="turn">대기 순번<span class="sort-indicator"></span></th>
                <th class="right">관리</th>
            </tr>
            </thead>
            <tbody id="reservation-body"></tbody>
        </table>
    </div>
</main>

<div class="toast" id="toast"></div>

<script>
    let reservations = [];
    let themes = [];
    let times = [];
    let sortCriteria = [];

    window.onload = () => {
        document.getElementById('date-input').value = getTodayString();
        selectDatePreset('thisMonth', false);
        document.getElementById('search-input').addEventListener('input', renderReservations);
        document.getElementById('show-reserved-checkbox').addEventListener('change', updateStatusFilter);
        document.getElementById('show-waiting-checkbox').addEventListener('change', updateStatusFilter);
        document.querySelectorAll('th[data-sort]').forEach(th => {
            th.addEventListener('click', () => {
                toggleSort(th.dataset.sort);
                renderReservations();
            });
        });
        loadReservations();
        loadThemes().catch(showError);
        loadTimes().catch(showError);
    };

    function loadReservations() {
        const startDate = document.getElementById('start-date-input').value;
        const endDate = document.getElementById('end-date-input').value;
        return fetch(`/admin/bookings?startDate=${startDate}&endDate=${endDate}`)
            .then(handleResponse)
            .then(data => {
                reservations = data;
                renderReservations();
            })
            .catch(showError);
    }

    function loadThemes() {
        return fetch('/admin/themes')
            .then(handleResponse)
            .then(data => {
                themes = data;
                const select = document.getElementById('theme-select');
                select.innerHTML = themes.map(theme => `<option value="${theme.id}">${escapeHtml(theme.name)}</option>`).join('');
            });
    }

    function loadTimes() {
        return fetch('/admin/times')
            .then(handleResponse)
            .then(data => {
                times = data;
                times.sort((a, b) => a.startAt.localeCompare(b.startAt));
                const select = document.getElementById('time-select');
                select.innerHTML = times.map(time => `<option value="${time.id}">${formatTime(time.startAt)}</option>`).join('');
            });
    }

    function renderReservations() {
        const query = document.getElementById('search-input').value.trim().toLowerCase();
        const body = document.getElementById('reservation-body');
        updateSortIndicators();
        const rows = reservations
            .filter(matchesStatusFilter)
            .filter(reservation => {
                const haystack = [
                    reservation.name,
                    reservation.date,
                    reservation.time?.startAt,
                    reservation.theme?.name,
                    getStatusLabel(reservation),
                    reservation.turn
                ].join(' ').toLowerCase();
                return haystack.includes(query);
            })
            .sort(compareReservation);

        if (rows.length === 0) {
            body.innerHTML = `<tr><td colspan="8" class="empty">예약 또는 대기가 없습니다</td></tr>`;
            return;
        }

        body.innerHTML = rows.map(reservation => `
            <tr>
                <td class="muted">${reservation.id}</td>
                <td>${escapeHtml(reservation.name)}</td>
                <td>${reservation.date}</td>
                <td class="accent">${formatTime(reservation.time?.startAt)}</td>
                <td>${escapeHtml(reservation.theme?.name || '')}</td>
                <td>${renderStatusBadge(reservation)}</td>
                <td>${reservation.turn ?? '-'}</td>
                <td class="right">${renderActions(reservation)}</td>
            </tr>
        `).join('');
    }

    function updateStatusFilter(event) {
        if (!hasSelectedStatusFilter()) {
            event.target.checked = true;
            return;
        }
        renderReservations();
    }

    function hasSelectedStatusFilter() {
        return document.getElementById('show-reserved-checkbox').checked
            || document.getElementById('show-waiting-checkbox').checked;
    }

    function matchesStatusFilter(reservation) {
        if (reservation.bookingType === 'WAITING') {
            return document.getElementById('show-waiting-checkbox').checked;
        }
        return document.getElementById('show-reserved-checkbox').checked;
    }

    function compareReservation(a, b) {
        for (const criterion of sortCriteria) {
            const result = String(getSortValue(a, criterion.key)).localeCompare(
                String(getSortValue(b, criterion.key)),
                'ko',
                { numeric: true }
            );
            if (result !== 0) {
                return criterion.direction === 'asc' ? result : -result;
            }
        }
        return compareDefaultReservation(a, b);
    }

    function compareDefaultReservation(a, b) {
        const dateResult = String(a.date).localeCompare(String(b.date), 'ko', { numeric: true });
        if (dateResult !== 0) {
            return dateResult;
        }
        const timeResult = String(a.time?.startAt || '').localeCompare(String(b.time?.startAt || ''), 'ko', { numeric: true });
        if (timeResult !== 0) {
            return timeResult;
        }
        const themeResult = String(a.theme?.name || '').localeCompare(String(b.theme?.name || ''), 'ko', { numeric: true });
        if (themeResult !== 0) {
            return themeResult;
        }
        const statusResult = getStatusOrder(a) - getStatusOrder(b);
        if (statusResult !== 0) {
            return statusResult;
        }
        const turnResult = getTurnOrder(a.turn) - getTurnOrder(b.turn);
        if (turnResult !== 0) {
            return turnResult;
        }
        return String(a.id).localeCompare(String(b.id), 'ko', { numeric: true });
    }

    function getSortValue(reservation, key) {
        const values = {
            id: reservation.id,
            name: reservation.name,
            date: reservation.date,
            time: reservation.time?.startAt,
            theme: reservation.theme?.name,
            status: getStatusOrder(reservation),
            turn: getTurnOrder(reservation.turn)
        };
        return values[key] ?? '';
    }

    function toggleSort(key) {
        const index = sortCriteria.findIndex(criterion => criterion.key === key);
        if (index === -1) {
            sortCriteria.push({ key, direction: 'asc' });
            return;
        }
        if (sortCriteria[index].direction === 'asc') {
            sortCriteria[index].direction = 'desc';
            return;
        }
        sortCriteria.splice(index, 1);
    }

    function updateSortIndicators() {
        document.querySelectorAll('th[data-sort]').forEach(th => {
            const indicator = th.querySelector('.sort-indicator');
            const index = sortCriteria.findIndex(criterion => criterion.key === th.dataset.sort);
            if (index === -1) {
                indicator.textContent = '';
                return;
            }
            const arrow = sortCriteria[index].direction === 'asc' ? '↑' : '↓';
            indicator.textContent = `${arrow}${index + 1}`;
        });
    }

    function createReservation() {
        const body = {
            name: document.getElementById('name-input').value.trim(),
            date: document.getElementById('date-input').value,
            themeId: Number(document.getElementById('theme-select').value),
            timeId: Number(document.getElementById('time-select').value)
        };

        fetch('/admin/reservations', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        })
            .then(handleResponse)
            .then(() => {
                document.getElementById('name-input').value = '';
                showToast('예약이 추가되었습니다', 'success');
                loadReservations();
            })
            .catch(showError);
    }

    function deleteReservation(id) {
        fetch(`/admin/reservations/${id}`, { method: 'DELETE' })
            .then(handleResponse)
            .then(() => {
                showToast('예약이 삭제되었습니다', 'success');
                loadReservations();
            })
            .catch(showError);
    }

    function deleteWaiting(id) {
        fetch(`/admin/waitings/${id}`, { method: 'DELETE' })
            .then(handleResponse)
            .then(() => {
                showToast('대기가 삭제되었습니다', 'success');
                loadReservations();
            })
            .catch(showError);
    }

    function selectDatePreset(range, shouldLoad = true) {
        updateActivePreset(range);
        setDateInputsEnabled(range === 'custom');
        if (range === 'custom') {
            return;
        }

        const today = new Date();
        let start = today;
        let end = today;

        if (range === 'thisMonth') {
            start = getMonthStart(today);
            end = getMonthEnd(today);
        }
        if (range === 'nextMonth') {
            const nextMonth = new Date(today.getFullYear(), today.getMonth() + 1, 1);
            start = getMonthStart(nextMonth);
            end = getMonthEnd(nextMonth);
        }
        if (range === 'lastMonth') {
            const lastMonth = new Date(today.getFullYear(), today.getMonth() - 1, 1);
            start = getMonthStart(lastMonth);
            end = getMonthEnd(lastMonth);
        }

        document.getElementById('start-date-input').value = formatDate(start);
        document.getElementById('end-date-input').value = formatDate(end);

        if (shouldLoad) {
            loadReservations();
        }
    }

    function updateActivePreset(range) {
        document.querySelectorAll('.filter-preset').forEach(button => {
            button.classList.toggle('active', button.dataset.range === range);
        });
    }

    function setDateInputsEnabled(enabled) {
        document.getElementById('start-date-input').readOnly = !enabled;
        document.getElementById('end-date-input').readOnly = !enabled;
    }

    function renderActions(reservation) {
        if (reservation.bookingType === 'WAITING') {
            return `<button class="btn-danger table-action-button" onclick="deleteWaiting(${reservation.id})">삭제</button>`;
        }
        return `<button class="btn-danger table-action-button" onclick="deleteReservation(${reservation.id})">삭제</button>`;
    }

    function renderStatusBadge(reservation) {
        if (reservation.bookingType === 'WAITING') {
            return '<span class="status-badge waiting">대기</span>';
        }
        if (reservation.reservationStatus === 'PENDING') {
            return '<span class="status-badge waiting">결제 대기</span>';
        }
        return '<span class="status-badge reserved">예약 확정</span>';
    }

    function getStatusLabel(reservation) {
        if (reservation.bookingType === 'WAITING') {
            return '대기';
        }
        return reservation.reservationStatus === 'PENDING' ? '결제 대기' : '예약 확정';
    }

    function getStatusOrder(reservation) {
        if (reservation.bookingType === 'WAITING') {
            return 2;
        }
        return reservation.reservationStatus === 'PENDING' ? 1 : 0;
    }

    function getTurnOrder(turn) {
        return turn ?? 0;
    }

    function formatTime(value) {
        return value ? value.slice(0, 5) : '';
    }

    function getMonthStart(date) {
        return new Date(date.getFullYear(), date.getMonth(), 1);
    }

    function getMonthEnd(date) {
        return new Date(date.getFullYear(), date.getMonth() + 1, 0);
    }

    function formatDate(value) {
        const year = value.getFullYear();
        const month = String(value.getMonth() + 1).padStart(2, '0');
        const date = String(value.getDate()).padStart(2, '0');
        return `${year}-${month}-${date}`;
    }

    function getTodayString() {
        return formatDate(new Date());
    }

    function escapeHtml(value) {
        return String(value)
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#039;');
    }

    function handleResponse(response) {
        if (response.ok) {
            if (response.status === 204) return null;
            return response.json();
        }
        return response.json()
            .then(error => {
                throw new Error(error.detail || '요청을 처리하지 못했습니다');
            })
            .catch(error => {
                throw new Error(error.message || '요청을 처리하지 못했습니다');
            });
    }

    function showError(error) {
        showToast(error.message, 'error');
    }

    function showToast(message, type = '') {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.className = `toast ${type} show`;
        setTimeout(() => toast.className = 'toast', 2600);
    }
</script>
</body>
</html>
