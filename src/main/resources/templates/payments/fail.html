<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>결제 실패</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container" style="max-width: 480px; margin-top: 80px;">
  <div class="card shadow-sm">
    <div class="card-body text-center p-5">
      <div class="mb-3" style="font-size: 3rem;">❌</div>
      <h4 class="mb-2">결제에 실패했습니다</h4>
      <p id="failMessage" class="text-muted mb-1">결제가 정상적으로 처리되지 않았습니다.</p>
      <p id="failCode" class="small text-muted"></p>
      <a href="/" class="btn btn-dark mt-3">홈으로</a>
    </div>
  </div>
</div>
<script>
  (() => {
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const message = params.get('message');
    if (message) {
      document.getElementById('failMessage').innerText = message;
    }
    if (code) {
      document.getElementById('failCode').innerText = '오류 코드: ' + code;
    }
  })();
</script>
</body>
</html>
