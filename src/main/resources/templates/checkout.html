<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>방탈출 예약 결제 (Rate Limit)</title>
  <!-- Toss Payments v2 결제위젯(주문서형) SDK -->
  <script src="https://js.tosspayments.com/v2/standard"></script>
  <style>
    body {
      font-family: -apple-system, "Segoe UI", sans-serif;
      background: #f4f5f7;
      margin: 0;
      padding: 40px 16px;
    }

    .card {
      max-width: 480px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, .06);
    }

    h1 {
      font-size: 20px;
      margin: 0 0 24px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .row .label {
      color: #888;
    }

    .row code {
      font-size: 12px;
      color: #555;
    }

    button {
      width: 100%;
      margin-top: 12px;
      padding: 16px;
      border: 0;
      border-radius: 10px;
      background: #3182f6;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      background: #1b64da;
    }

    button:disabled {
      background: #c3d7f5;
      cursor: not-allowed;
    }

    .burst {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px dashed #e9ecef;
    }

    .burst label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 6px;
    }

    .burst .inline {
      display: flex;
      gap: 8px;
    }

    .burst input[type=number] {
      flex: 1;
      padding: 12px;
      border: 1px solid #dfe1e5;
      border-radius: 8px;
      font-size: 15px;
    }

    .burst button {
      margin-top: 0;
      width: auto;
      padding: 12px 18px;
      background: #fff;
      color: #e8590c;
      border: 1px solid #ffd8a8;
    }

    .burst button:hover {
      background: #fff4e6;
    }

    .hint {
      margin-top: 16px;
      font-size: 13px;
      color: #999;
      line-height: 1.6;
    }

    .links {
      margin-top: 18px;
      text-align: center;
    }

    .links a {
      color: #3182f6;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
    }
  </style>
</head>
<body>
<div class="card">
  <h1>🔐 방탈출 예약 결제</h1>
  <div class="row"><span class="label">주문명</span><b th:text="${orderName}">방탈출 예약</b></div>
  <div class="row"><span class="label">주문번호</span><code th:text="${orderId}">order-xxxx</code></div>
  <div class="row"><span class="label">결제금액</span>
    <b><span th:text="${#numbers.formatInteger(amount, 0, 'COMMA')}">50,000</span>원</b></div>

  <!-- 주문서형 위젯: 결제수단·약관 UI 가 이 div 안에 렌더링된다 -->
  <div id="payment-method"></div>
  <div id="agreement"></div>

  <button id="payButton" disabled>결제하기 (Toss 결제위젯)</button>

  <form class="burst" method="get" th:action="@{/payments/burst}">
    <label>🚦 버스트 결제 — 한 번에 여러 건을 동시에 보냅니다(한도 초과분은 거부)</label>
    <div class="inline">
      <input type="number" name="count" min="1" th:max="${maxBurst}" value="10"/>
      <button type="submit">N건 결제</button>
    </div>
  </form>

  <p class="hint">
    '결제하기' 는 모듈 1과 같은 흐름이지만, 서버 승인은 <b>나가는 Rate Limit + 백오프</b>가 걸린 게이트웨이 호출로 나갑니다.
    단건은 한도를 거의 안 넘으니, 한도가 동작하는지는 <b>버스트 결제</b>로 확인하세요 —
    complete 에서는 capacity 만큼만 통과하고 나머지는 거부, initial 에서는 전부 통과합니다.
  </p>
  <div class="links"><a th:href="@{/payments/history}">📜 결제 내역 보기</a></div>
</div>

<!-- Thymeleaf 가 주석 안 표현식(/*[[...]]*/)을 서버 값으로 치환한다. 뒤의 리터럴은 정적 미리보기용. -->
<script th:inline="javascript">
  /*<![CDATA[*/
  const clientKey = /*[[${clientKey}]]*/ "test_gck_xxx";
  const orderId = /*[[${orderId}]]*/ "order-1";
  const orderName = /*[[${orderName}]]*/ "방탈출 예약";
  const amountValue = /*[[${amount}]]*/ 50000;

  const tossPayments = TossPayments(clientKey);
  // 비회원 결제. 회원이라면 추측 불가능한 고유 customerKey 를 넣는다.
  const widgets = tossPayments.widgets({customerKey: TossPayments.ANONYMOUS});
  const payButton = document.getElementById("payButton");

  (async () => {
    try {
      // 금액을 먼저 설정해야 결제수단 UI 를 렌더링할 수 있다.
      await widgets.setAmount({currency: "KRW", value: amountValue});
      await Promise.all([
        widgets.renderPaymentMethods({selector: "#payment-method", variantKey: "DEFAULT"}),
        widgets.renderAgreement({selector: "#agreement", variantKey: "AGREEMENT"})
      ]);
      payButton.disabled = false; // 렌더링 완료 전의 결제 요청은 실패하므로 그때까지 버튼을 막는다.
    } catch (error) {
      // 렌더링 실패를 침묵시키면 버튼이 이유 없이 비활성으로 남는다 → 원인을 화면에 드러낸다.
      document.querySelector(".hint").textContent = "결제위젯 렌더링 실패: " + error.message;
    }
  })();

  payButton.addEventListener("click", async function () {
    try {
      // 금액은 setAmount() 로 위젯에 이미 설정돼 있어 다시 넘기지 않는다.
      await widgets.requestPayment({
        orderId: orderId,
        orderName: orderName,
        // 인증 성공/실패 시 서버의 SSR 엔드포인트로 리다이렉트된다.
        successUrl: window.location.origin + "/payments/success",
        failUrl: window.location.origin + "/payments/fail"
      });
    } catch (error) {
      // 사용자가 결제창을 닫으면 failUrl 리다이렉트가 아니라 USER_CANCEL 에러가 throw 된다 → 조용히 주문서로 복귀.
      if (error.code !== "USER_CANCEL") {
        document.querySelector(".hint").textContent = "결제 요청 실패: " + error.message;
      }
    }
  });
  /*]]>*/
</script>
</body>
</html>
