<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>예약 결제</title>
    <!-- Toss Payments v2 결제위젯(주문서형) SDK -->
    <script src="https://js.tosspayments.com/v2/standard"></script>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
            margin: 0;
            background: #f5f5f7;
            color: #1d1d1f;
        }

        header {
            background: #1d1d1f;
            color: #fff;
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 24px;
        }

        header a {
            color: #aaa;
            text-decoration: none;
            font-size: 14px;
        }

        header a:hover {
            color: #fff;
        }

        main {
            max-width: 480px;
            margin: 40px auto;
            padding: 0 16px;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .card h2 {
            margin: 0 0 16px;
            font-size: 18px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
            gap: 16px;
        }

        .row .label {
            color: #888;
        }

        .row code {
            font-size: 12px;
            color: #555;
            word-break: break-all;
        }

        .pay-btn {
            width: 100%;
            padding: 14px;
            background: #007aff;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            margin-top: 8px;
        }

        .pay-btn:hover:not(:disabled) {
            background: #0066cc;
        }

        .pay-btn:disabled {
            background: #d2d2d7;
            cursor: not-allowed;
        }

        .hint {
            margin-top: 16px;
            font-size: 13px;
            color: #999;
            line-height: 1.6;
        }

        .error {
            color: #ff3b30;
        }
    </style>
</head>
<body>
<header>
    <h1>🔑 방탈출 예약</h1>
    <a href="index.html">← 메인으로</a>
</header>
<main>
    <div class="card">
        <h2>결제 정보</h2>
        <div class="row"><span class="label">주문명</span><b th:text="${orderName}">방탈출 예약</b></div>
        <div class="row"><span class="label">주문번호</span><code th:text="${orderId}">order-xxxx</code></div>
        <div class="row"><span class="label">결제금액</span>
            <b><span th:text="${#numbers.formatInteger(amount, 0, 'COMMA')}">30,000</span>원</b></div>
    </div>

    <div class="card">
        <!-- 주문서형 위젯: 결제수단·약관 UI 가 이 div 안에 렌더링된다 -->
        <div id="payment-method"></div>
        <div id="agreement"></div>
        <button id="payButton" class="pay-btn" disabled>결제하기</button>
        <p class="hint">
            샌드박스 테스트 결제입니다. 위 결제수단 중 하나를 선택하세요(실제 출금 없음).<br/>
            인증 성공 시 successUrl 로 이동한 뒤 <b>서버가 직접</b> 결제를 승인합니다.
        </p>
    </div>
</main>

<!-- Thymeleaf 가 주석 안 표현식(/*[[...]]*/)을 서버 값으로 치환한다. 뒤의 리터럴은 정적 미리보기용. -->
<script th:inline="javascript">
    /*<![CDATA[*/
    const clientKey = /*[[${clientKey}]]*/ "test_gck_xxx";
    const orderId = /*[[${orderId}]]*/ "order-1";
    const orderName = /*[[${orderName}]]*/ "방탈출 예약";
    const amountValue = /*[[${amount}]]*/ 30000;

    const tossPayments = TossPayments(clientKey);
    // 비회원 결제. 회원이라면 추측 불가능한 고유 customerKey 를 넣는다.
    const widgets = tossPayments.widgets({customerKey: TossPayments.ANONYMOUS});
    const payButton = document.getElementById("payButton");

    (async () => {
        try {
            // 금액을 먼저 설정해야 결제수단 UI 를 렌더링할 수 있다.
            await widgets.setAmount({currency: "KRW", value: amountValue});
            await Promise.all([
                widgets.renderPaymentMethods({selector: "#payment-method", variantKey: "DEFAULT"}),
                widgets.renderAgreement({selector: "#agreement", variantKey: "AGREEMENT"})
            ]);
            payButton.disabled = false; // 렌더링 완료 전 결제 요청은 실패하므로 그때까지 버튼을 막는다.
        } catch (error) {
            // 렌더링 실패를 침묵시키면 버튼이 이유 없이 비활성으로 남는다 → 원인을 화면에 드러낸다.
            document.querySelector(".hint").innerHTML = '<span class="error">결제위젯 렌더링 실패: ' + error.message + '</span>';
        }
    })();

    payButton.addEventListener("click", async function () {
        try {
            // 금액은 setAmount() 로 위젯에 이미 설정돼 있어 다시 넘기지 않는다.
            await widgets.requestPayment({
                orderId: orderId,
                orderName: orderName,
                // 인증 성공/실패 시 서버의 SSR 엔드포인트로 리다이렉트된다.
                successUrl: window.location.origin + "/payments/success",
                failUrl: window.location.origin + "/payments/fail"
            });
        } catch (error) {
            // 사용자가 결제창을 닫으면 failUrl 리다이렉트가 아니라 USER_CANCEL 에러가 throw 된다 → 조용히 주문서로 복귀.
            if (error.code !== "USER_CANCEL") {
                document.querySelector(".hint").innerHTML = '<span class="error">결제 요청 실패: ' + error.message + '</span>';
            }
        }
    });
    /*]]>*/
</script>
</body>
</html>
