<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>결제 처리 중</title>
    <style>
        :root {
            --ink: #202124;
            --muted: #666f7a;
            --line: #d9dee7;
            --surface: #ffffff;
            --bg: #f6f7f9;
            --accent: #1f6feb;
            --danger: #c9362c;
            --success: #237a4b;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--ink);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg);
        }

        .panel {
            width: min(100%, 420px);
            margin: 24px;
            padding: 32px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--surface);
            text-align: center;
        }

        h1 {
            margin: 0 0 12px;
            font-size: 22px;
        }

        p {
            color: var(--muted);
            line-height: 1.5;
        }

        .message {
            min-height: 22px;
            margin-top: 16px;
            font-weight: 700;
            color: var(--danger);
        }

        .message.success {
            color: var(--success);
        }

        a {
            display: inline-block;
            margin-top: 20px;
            color: var(--accent);
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>
<body>
<main class="panel">
    <h1 id="title">결제를 확인하고 있습니다</h1>
    <p>잠시만 기다려주세요. 결제 승인을 처리하고 있습니다.</p>
    <p aria-live="polite" class="message" id="message" role="status"></p>
    <a href="/" id="home-link" style="display: none;">홈으로 이동</a>
</main>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(window.location.search);
        const paymentKey = params.get('paymentKey');
        const orderId = params.get('orderId');
        const amount = params.get('amount');

        const title = document.getElementById('title');
        const message = document.getElementById('message');
        const homeLink = document.getElementById('home-link');

        if (!paymentKey || !orderId || !amount) {
            title.textContent = '결제 정보가 올바르지 않습니다';
            message.textContent = '필요한 결제 정보가 전달되지 않았습니다.';
            homeLink.style.display = 'inline-block';
            return;
        }

        fetch('/api/payments/confirm', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({paymentKey, orderId, amount: Number(amount)})
        })
            .then(handleResponse)
            .then(() => {
                title.textContent = '예약이 확정되었습니다';
                message.textContent = '결제가 완료되어 예약이 확정되었습니다.';
                message.classList.add('success');
                setTimeout(() => window.location.href = '/', 1500);
            })
            .catch(error => {
                title.textContent = '결제 승인에 실패했습니다';
                message.textContent = toErrorMessage(error, '결제 승인 중 오류가 발생했습니다.');
                homeLink.style.display = 'inline-block';
            });
    });

    function handleResponse(res) {
        return res.text().then(text => {
            const data = text ? JSON.parse(text) : null;
            if (res.ok) {
                return data;
            }
            throw data || {message: '요청을 처리할 수 없습니다.'};
        });
    }

    function toErrorMessage(error, fallback) {
        if (error && error.errors && error.errors.length > 0) {
            return error.errors.map(detail => detail.reason).join(' ');
        }
        return (error && error.message) || fallback;
    }
</script>
</body>
</html>
