<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>결제 확인 중 — ESCAPE</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:#080808;color:#d4d4d4;font-family:'Inter',sans-serif;font-weight:300;padding:2rem}
.box{max-width:440px;width:100%;text-align:center;border:1px solid #525252;background:#0f0f0f;padding:3rem}
h1{font-size:1.3rem;color:#ebebeb;margin-bottom:1rem;letter-spacing:.04em}
p{font-size:.92rem;color:#aaa;letter-spacing:.05em;line-height:1.7}
a{display:inline-block;margin-top:2rem;color:#c22235;text-decoration:none;font-size:.8rem;
  letter-spacing:.2em;text-transform:uppercase}
</style>
</head>
<body>
<div class="box">
  <h1 id="title">결제를 확인하고 있습니다…</h1>
  <p id="msg">잠시만 기다려 주세요.</p>
  <a id="link" href="/" style="display:none">목록으로 돌아가기</a>
</div>
<script>
const params = new URLSearchParams(location.search);
const paymentKey = params.get('paymentKey');
const orderId = params.get('orderId');
const amount = Number(params.get('amount'));

async function confirm() {
  try {
    const r = await fetch('/payments/confirm', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ paymentKey, orderId, amount })
    });
    if (r.ok) {
      document.getElementById('title').textContent = '예약이 확정되었습니다';
      document.getElementById('msg').textContent = '잠시 후 내 예약으로 이동합니다.';
      setTimeout(() => { location.href = '/my-reservations'; }, 1500);
      return;
    }
    let detail = '결제 승인에 실패했습니다.';
    try { const e = await r.json(); detail = e.detail || detail; } catch {}
    showError(detail);
  } catch {
    showError('네트워크 오류가 발생했습니다.');
  }
}

function showError(message) {
  document.getElementById('title').textContent = '결제 승인 실패';
  document.getElementById('msg').textContent = message;
  document.getElementById('link').style.display = 'inline-block';
}

confirm();
</script>
</body>
</html>
