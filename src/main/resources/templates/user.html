<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ENIGMA ROOMS - 예약하기</title>
    <link rel="stylesheet" th:href="@{/css/user.css}">
</head>
<body>
<header class="header">
    <a class="logo" href="/">ENIGMA ROOMS</a>

    <nav class="nav">
        <a href="/reservation">예약하기</a>
        <a href="/reservation-lookup">예약 조회</a>
        <button class="logout-button" type="button" onclick="logout()">로그아웃</button>
    </nav>
</header>

<main class="container">
    <section class="hero">
        <h1>어둠 속의 진실을 마주하라</h1>
        <p>선택된 자만이 진실에 다가갈 수 있습니다. 테마, 날짜, 시간을 순서대로 선택하여 예약하세요.</p>
    </section>

    <!-- 테마 선택 (01) -->
    <section class="step-section">
        <div class="popular-heading">
            <p>POPULAR THEMES</p>
            <h2>인기 테마 TOP 10</h2>
        </div>
        <div id="popular-theme-list" class="popular-theme-list"></div>
    </section>

    <section id="theme-select-section" class="step-section">
        <h2><span>01.</span> 테마 선택</h2>
        <div id="theme-list" class="theme-list"></div>
    </section>

    <!-- 날짜 선택 (02) - 테마 선택 후 표시 -->
    <section id="date-select-section" class="step-section hidden">
        <h2><span>02.</span> 날짜 선택</h2>
        <div id="date-list" class="date-list"></div>
    </section>

    <!-- 시간 선택 (03) - 날짜 선택 후 표시 -->
    <section id="time-select-section" class="step-section hidden">
        <article class="confirm-card">
            <div class="confirm-header">
                <h2><span>03.</span> 시간 선택</h2>
                <p>방문할 시간을 선택하고 예약을 확정하세요.</p>
            </div>

            <div class="confirm-body">
                <div id="time-list" class="time-list"></div>

                <div class="reservation-action-area">
                    <button class="primary-button full" type="button" onclick="createReservation()">
                        예약 확정하기
                    </button>
                </div>
            </div>
        </article>
    </section>

    <!-- 결제 모달 -->
    <div id="payment-modal" class="modal">
        <div class="modal-content" style="width: 700px; margin: 2% auto;">
            <div class="modal-header">
                <h2>결제하기</h2>
                <button type="button" class="close-button" onclick="closePaymentModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div id="payment-method"></div>
                <div id="agreement"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="secondary-button" onclick="closePaymentModal()">취소</button>
                <button id="payment-button" type="button" class="primary-button" style="width: 200px;">결제하기</button>
            </div>
        </div>
    </div>
</main>

<script th:inline="javascript">
    const tossClientKey = [[${clientKey}]];
</script>
<script src="https://js.tosspayments.com/v1/payment-widget"></script>
<script th:src="@{/js/user.js}"></script>
</body>
</html>
