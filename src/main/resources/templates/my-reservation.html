<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 예약 · 방탈출</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="topbar">
    <a class="brand" th:href="@{/}">방탈출 예약</a>
    <nav class="nav">
        <a th:href="@{/}">홈</a>
        <a th:href="@{/reservation}">예약</a>
        <a class="active" th:href="@{/my}">내 예약</a>
        <a th:href="@{/popular}">인기 테마</a>
        <a th:href="@{/admin}">어드민</a>
    </nav>
</header>

<main class="container">
    <div class="page-header">
        <div>
            <h1>내 예약</h1>
            <p class="subtitle">본인 이름을 입력해 예약과 대기 목록을 조회하세요.</p>
        </div>
    </div>

    <section class="card">
        <form id="search-form" class="search-form">
            <input id="name-input" type="text" placeholder="예: 민욱" required>
            <button type="submit" class="btn btn-primary">조회</button>
        </form>

        <table class="data">
            <thead>
            <tr>
                <th>상태</th>
                <th>테마</th>
                <th>날짜</th>
                <th>시간</th>
                <th>대기 순번</th>
                <th>결제</th>
                <th>금액</th>
                <th>주문번호</th>
                <th class="actions"></th>
            </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </section>
</main>

<script th:src="@{/js/common.js(v=2)}"></script>
<script th:src="@{/js/my-reservation.js(v=4)}"></script>
</body>
</html>
