spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.datasource.url=jdbc:h2:mem:database
spring.config.import=optional:file:./.env[.properties]
security.jwt.token.secret-key=${JWT_SECRET_KEY}
security.jwt.token.expire-length=${JWT_EXPIRE_LENGTH:3600000}
payment.toss.base-url=${TOSS_BASE_URL:https://api.tosspayments.com}
payment.toss.client-key=${TOSS_CLIENT_KEY}
payment.toss.secret-key=${TOSS_SECRET_KEY}
payment.reservation-amount=${RESERVATION_PAYMENT_AMOUNT:50000}
