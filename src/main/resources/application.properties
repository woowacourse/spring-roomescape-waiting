spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.datasource.url=jdbc:h2:mem:database

spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa

# Browser standard payment window key. Must start with test_ck_ in the Toss sandbox.
payment.client-key=${TOSS_CLIENT_KEY:test_ck_placeholder}
# Server-only payment confirm key. Must start with test_sk_ and must never be exposed to the browser.
payment.toss.secret-key=${TOSS_SECRET_KEY:}
