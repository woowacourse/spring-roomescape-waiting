spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.datasource.url=jdbc:h2:mem:database
toss.payments.secret-key=${TOSS_PAYMENTS_SECRET_KEY:}
toss.payments.connect-timeout=2s
toss.payments.read-timeout=3s
toss.payments.retry.max-attempts=3
toss.payments.retry.default-delay=1s
rate-limit.capacity=20
rate-limit.refill-per-sec=10
outbound-rate-limit.capacity=10
outbound-rate-limit.refill-per-sec=5
