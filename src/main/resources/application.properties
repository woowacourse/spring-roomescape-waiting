spring.datasource.url=jdbc:h2:mem:database
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.datasource.driver-class-name=org.h2.Driver

# [1단계 과도기] reservation·waiting 이 아직 비-JPA 슬라이스에서 schema.sql 테이블을 필요로 하므로
# DDL 권위는 schema.sql 에 둔다(ddl-auto=none). 4개 테이블 전부 엔티티화(1-2 종료) 시 create-drop 으로 전환.
# Hibernate 자동 생성 DDL 은 02 문서에 격리 관찰로 기록.
spring.jpa.hibernate.ddl-auto=none

# 발행 SQL + 바인딩 파라미터 추적 (Hibernate 6 / Boot 3.x)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
