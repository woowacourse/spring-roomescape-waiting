spring.datasource.url=jdbc:h2:mem:database
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.datasource.driver-class-name=org.h2.Driver
spring.config.import=optional:classpath:application-secret.properties
toss.base-url=https://api.tosspayments.com
toss.connect-timeout=1s
toss.read-timeout=2s
toss.rate-limit.max-attempts=3
toss.rate-limit.fallback-retry-after=1s
rate-limit.capacity=1000
rate-limit.refill-per-sec=1000.0
outbound-rate-limit.capacity=1000
outbound-rate-limit.refill-per-sec=1000.0
