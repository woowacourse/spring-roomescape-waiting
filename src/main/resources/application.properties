spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.datasource.url=jdbc:h2:mem:database

toss.base-url=${TOSS_BASE_URL:https://api.tosspayments.com}
toss.client-key=${TOSS_CLIENT_KEY:}
toss.secret-key=${TOSS_SECRET_KEY:}
toss.connect-timeout-ms=1000
toss.read-timeout-ms=2000

rate-limit.capacity=10
rate-limit.refill-per-sec=5

outbound-rate-limit.capacity=5
outbound-rate-limit.refill-per-sec=2
outbound-rate-limit.retry.max-attempts=3
outbound-rate-limit.retry.fallback-delay=1s
