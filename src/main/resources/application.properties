logging.level.root=warn
logging.level.org.springframework.web=debug
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.datasource.url=jdbc:h2:mem:database

# Toss Payments. 시크릿 키는 환경변수로 외부화하고, 미설정 시 토스 공개 문서용 테스트 키로 폴백한다.
toss.base-url=https://api.tosspayments.com
toss.client-key=${TOSS_CLIENT_KEY:test_gck_docs_Ovk5rk1EwkEbP0W43n07xlzm}
toss.secret-key=${TOSS_SECRET_KEY:test_gsk_docs_OaPz8L5KdmQXkzRz3y47BMw6}
toss.connect-timeout=2s
toss.read-timeout=5s

# Rate Limit (토큰 버킷). 들어오는/나가는 한도를 분리해 외부화한다.
rate-limit.capacity=20
rate-limit.refill-per-sec=10
outbound-rate-limit.capacity=10
outbound-rate-limit.refill-per-sec=5
outbound-rate-limit.max-attempts=3
outbound-rate-limit.fallback-seconds=1
