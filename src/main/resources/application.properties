spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.datasource.url=jdbc:h2:mem:database

toss.base-url=https://api.tosspayments.com
toss.client-key=test_gck_docs_Ovk5rk1EwkEbP0W43n07xlzm
toss.secret-key=test_gsk_docs_OaPz8L5KdmQXkzRz3y47BMw6
# TossClientConfig 가 RestClient 에 적용하는 타임아웃(밀리초). 값은 코드에 박지 않고 여기서 외부화한다.
toss.connect-timeout-ms=1000
toss.read-timeout-ms=2000
# 토스가 429 를 주면 Retry-After 만큼 대기 후 재시도한다. 이 횟수를 넘어도 429 면 도메인 예외로 실패시킨다(무한 재시도 금지).
toss.max-attempts=3

# 들어오는 요청의 Rate Limit 정책(서버 관점). 한도를 넘으면 컨트롤러 호출 없이 429+Retry-After 로 거부한다.
# 기본값은 일반 트래픽/테스트를 막지 않을 만큼 넉넉히 두고, 거부 시점 검증은 테스트에서 작은 값으로 오버라이드한다.
rate-limit.capacity=100
rate-limit.refill-per-second=100.0

# 나가는 호출(토스 호출)의 Rate Limit 정책(클라이언트 관점). 들어오는 쪽과 분리해 외부화한다.
outbound-rate-limit.capacity=100
outbound-rate-limit.refill-per-second=100.0