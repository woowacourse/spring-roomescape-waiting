spring.datasource.url=jdbc:h2:mem:database
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.datasource.driver-class-name=org.h2.Driver
logging.level.org.springframework.web=DEBUG

# Toss Payments. 키는 환경변수로 외부화하고, 미설정 시 공개 문서용 테스트 키로 폴백한다.
# client-key는 브라우저 위젯용, secret-key는 서버 승인 전용(노출 금지).
toss.base-url=${TOSS_BASE_URL:https://api.tosspayments.com}
toss.client-key=${TOSS_CLIENT_KEY:test_gck_docs_Ovk5rk1EwkEbP0W43n07xlzm}
toss.secret-key=${TOSS_SECRET_KEY:test_gsk_docs_OaPz8L5KdmQXkzRz3y47BMw6}
toss.connect-timeout-ms=${TOSS_CONNECT_TIMEOUT_MS:500}
toss.read-timeout-ms=${TOSS_READ_TIMEOUT_MS:500}

# 토스가 429 를 주면 Retry-After 만큼 대기 후 재시도하는 백오프 정책(무한 재시도 금지).
toss.max-attempts=${TOSS_MAX_ATTEMPTS:3}

# 들어오는 요청의 Rate Limit 정책(서버/게이트웨이 관점). 값만 바꿔 거부 시점을 조절한다.
rate-limit.capacity=${RATE_LIMIT_CAPACITY:5}
rate-limit.refill-per-second=${RATE_LIMIT_REFILL_PER_SECOND:1.0}
