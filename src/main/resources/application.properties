spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.datasource.url=jdbc:h2:mem:database

spring.thymeleaf.cache=false

# Toss Payments
# secret-key 는 절대 커밋하지 말 것. 환경 변수(TOSS_PAYMENTS_SECRET_KEY)로 주입한다.
toss.payments.base-url=https://api.tosspayments.com
toss.payments.confirm-path=/v1/payments/confirm
toss.payments.secret-key=${TOSS_PAYMENTS_SECRET_KEY:test_sk_zXLkKEypNArWmo50nX3lmeaxYG5R}
# client-key 는 브라우저에 노출되어도 되는 공개 키다.
# API 개별 연동 키(test_ck/test_sk)를 한 세트로 사용한다. 결제위젯 키(test_gck/test_gsk)는 payment() 표준 결제창에서 지원하지 않는다.
toss.payments.client-key=test_ck_D5GePWvyJnrK0W0k6q8gLzN97Eoq
# 예약 결제 고정 금액(원)
toss.payments.amount=1000
# 전송 타임아웃 (TossPaymentProperties — TossPaymentClient가 소유하는 Toss 호출 정책)
toss.payments.connect-timeout=5s
toss.payments.read-timeout=10s

# Rate Limit (인·아웃 독립 설정 — 코드 수정 없이 값만 바꿔 거부 시점을 조정한다)
# 들어오는 요청(인바운드)
rate-limit.capacity=10
rate-limit.refill-per-second=1
# 나가는 호출(아웃바운드, 토스 결제 API)
outbound-rate-limit.capacity=5
outbound-rate-limit.refill-per-second=0.5
