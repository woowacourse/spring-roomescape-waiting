<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>RoomEscape — 방탈출 예약</title>
    <meta content="방탈출 테마 선택 및 예약 페이지" name="description">
    <link href="style.css" rel="stylesheet">
    <script src="https://js.tosspayments.com/v1/payment-widget"></script>
    <style>
        .user-layout {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-nav {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 0 36px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            gap: 16px;
        }

        .top-nav-logo {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, #5b7fff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            border: none;
            cursor: pointer;
            padding: 0;
        }

        .top-nav-links {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .user-main {
            flex: 1;
            max-width: 960px;
            margin: 0 auto;
            padding: 40px 24px;
            width: 100%;
        }

        .steps {
            display: flex;
            align-items: center;
            gap: 0;
            margin-bottom: 36px;
        }

        .step {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            position: relative;
        }

        .step:not(:last-child)::after {
            content: '';
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: calc(100% - 120px);
            height: 2px;
            background: var(--border);
            left: 130px;
        }

        .step.done::after {
            background: var(--accent);
        }

        .step-num {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            border: 2px solid var(--border);
            color: var(--text-muted);
            background: var(--bg-secondary);
            flex-shrink: 0;
            transition: all 0.3s;
        }

        .step.active .step-num {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            box-shadow: 0 0 16px rgba(91, 127, 255, 0.4);
        }

        .step.done .step-num {
            background: var(--success);
            border-color: var(--success);
            color: #0d0f1a;
        }

        .step-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .step.active .step-label {
            color: var(--accent);
        }

        .step.done .step-label {
            color: var(--success);
        }

        .section-panel {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .section-panel.visible {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .booking-summary {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px 24px;
            margin-bottom: 24px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .summary-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .summary-key {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .summary-val {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .summary-val.empty {
            color: var(--text-muted);
            font-weight: 400;
            font-style: italic;
        }

        .modal-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .modal-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 28px;
            width: 100%;
            max-width: 480px;
            margin: 0 16px;
        }

        .login-required-notice {
            background: rgba(91, 127, 255, 0.08);
            border: 1px solid rgba(91, 127, 255, 0.2);
            border-radius: var(--radius);
            padding: 20px 24px;
            text-align: center;
        }

        .login-required-notice p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 14px;
        }

        .user-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 12px;
            background: var(--accent-soft);
            border-radius: 100px;
            font-size: 13px;
            font-weight: 600;
            color: var(--accent);
            cursor: pointer;
            transition: background 0.15s, box-shadow 0.15s;
        }

        .user-chip:hover {
            background: rgba(91, 127, 255, 0.18);
            box-shadow: 0 0 0 2px rgba(91, 127, 255, 0.3);
        }
    </style>
</head>
<body>

                        <button class="btn btn-primary btn-sm" id="popular-load-btn" type="button">조회</button>
                    </div>
                </div>

        <div class="card" style="margin-top: 32px;">

<div class="modal-backdrop" id="auth-modal-backdrop">

            </div>
            <div class="form-group" style="margin-bottom:12px;">
                <label for="signup-password">비밀번호</label>
                <input id="signup-password" placeholder="비밀번호 입력" type="password" autocomplete="new-password">
            </div>
            <div class="form-group" style="margin-bottom:18px;">
                <label for="signup-name">이름</label>
                <input id="signup-name" placeholder="실명 입력" type="text">
            </div>
            <button class="btn btn-primary btn-full" id="register-btn" type="button">회원가입</button>
        </div>

        <p class="auth-message" id="auth-message"></p>
    </div>
</div>

<div id="toast-container"></div>

<script src="app.js"></script>
<script>
    const R = Roomescape;
    const state = {selectedTheme: null, selectedDate: null, selectedTime: null, themes: [], isWaiting: false};
    const themePageState = {page: 0, hasNext: false};

    let pendingReturnTo = null;

    // Toss Payments 결제위젯 클라이언트 키 (테스트용 공개 키)
    const TOSS_CLIENT_KEY = 'test_gck_docs_Ovk5rk1EwkEbP0W43n07xlzm';

    function tokenInfo() {
        return R.decodeToken(R.auth.getMemberToken());
    }

    // 로그인 사용자별 고유 customerKey 생성 (영문/숫자/_-=.@ 만 허용)
    function paymentCustomerKey() {
        const info = tokenInfo();
        const base = String(info?.sub ?? info?.username ?? 'guest');
        return ('customer_' + base).replace(/[^A-Za-z0-9_\-=.@]/g, '').slice(0, 50);
    }

    function openPaymentModal() {
        R.byId('payment-modal-backdrop').style.display = 'flex';
    }

    function closePaymentModal() {
        R.byId('payment-modal-backdrop').style.display = 'none';
    }

    // 주문 정보로 결제위젯을 초기화하고 결제창을 띄운다.
    function openPaymentWidget(order, orderName) {
        if (typeof PaymentWidget !== 'function') {
            R.toast('결제 모듈을 불러오지 못했습니다. 새로고침 후 다시 시도해주세요.', 'error');
            return;
        }
        R.byId('payment-order-name').textContent = orderName;
        R.byId('payment-amount').textContent = `${Number(order.amount).toLocaleString()}원`;
        R.byId('payment-method').replaceChildren();
        R.byId('agreement').replaceChildren();

        const payBtn = R.byId('payment-pay-btn');
        payBtn.disabled = true;
        payBtn.textContent = '결제 UI 준비 중...';

        // 결제 UI가 보이는 영역에서 렌더링되도록 모달을 먼저 표시한다.
        openPaymentModal();

        const widget = PaymentWidget(TOSS_CLIENT_KEY, paymentCustomerKey());
        const methodsWidget = widget.renderPaymentMethods(
            '#payment-method', {value: order.amount}, {variantKey: 'DEFAULT'});
        widget.renderAgreement('#agreement', {variantKey: 'AGREEMENT'});

        // 결제 UI 렌더링이 끝난 뒤에만 결제 버튼을 활성화한다.
        const enablePay = () => {
            payBtn.disabled = false;
            payBtn.textContent = '결제하기';
        };
        if (methodsWidget && typeof methodsWidget.on === 'function') {
            methodsWidget.on('ready', enablePay);
        } else if (methodsWidget && typeof methodsWidget.then === 'function') {
            methodsWidget.then(enablePay);
        } else {
            enablePay();
        }

        payBtn.onclick = async () => {
            try {
                // 카드 정보 입력·인증은 결제창과 카드사가 처리한다.
                // 성공 시 토스가 successUrl 로 paymentKey, orderId, amount 를 넘긴다.
                await widget.requestPayment({
                    orderId: order.orderId,
                    orderName,
                    successUrl: `${window.location.origin}/?payment=success`,
                    failUrl: `${window.location.origin}/?payment=fail`,
                });
            } catch (e) {
                R.toast(`결제 요청 실패: ${e.message}`, 'error');
            }
        };
    }

    // successUrl/failUrl 리다이렉트 복귀 처리
    function handlePaymentRedirect(params) {
        const payment = params.get('payment');
        if (!payment) return;
        if (payment === 'success') {
            const paymentKey = params.get('paymentKey');
            const orderId = params.get('orderId');
            const amount = params.get('amount');
            // TODO(결제 승인 단계): POST /payments/confirm {paymentKey, orderId, amount} 로 서버 최종 승인
            console.info('Toss 결제 인증 결과', {paymentKey, orderId, amount});
            R.toast('결제 인증이 완료되었습니다.', 'success');
        } else if (payment === 'fail') {
            const message = params.get('message') || '결제가 취소되었거나 실패했습니다.';
            R.toast(`결제 실패: ${message}`, 'error');
        }
        history.replaceState(null, '', '/');
    }

    function requireLogin() {
        if (R.auth.getMemberToken()) return true;
        R.toast('로그인이 필요합니다.', 'error');
        return false;
    }

    function openAuthModal(tab = 'login', notice = '', noticeType = '') {
        const backdrop = R.byId('auth-modal-backdrop');
        const noticeEl = R.byId('auth-modal-notice');
        R.byId('auth-message').textContent = '';
        if (notice) {
            noticeEl.textContent = notice;
            noticeEl.className = 'auth-notice' + (noticeType === 'warning' ? ' warning' : '');
            noticeEl.style.display = '';
        } else {
            noticeEl.style.display = 'none';
        }
        switchAuthTab(tab);
        backdrop.style.display = 'flex';
        setTimeout(() => {
            const input = tab === 'login' ? R.byId('auth-username') : R.byId('signup-username');
            if (input) input.focus();
        }, 80);
    }

    function closeAuthModal() {
        R.byId('auth-modal-backdrop').style.display = 'none';
        R.byId('auth-message').textContent = '';
        R.byId('auth-modal-notice').style.display = 'none';
    }

    function switchAuthTab(tab) {
        const isLogin = tab === 'login';
        R.byId('tab-login').classList.toggle('active', isLogin);
        R.byId('tab-signup').classList.toggle('active', !isLogin);
        R.byId('auth-login-panel').style.display = isLogin ? '' : 'none';
        R.byId('auth-signup-panel').style.display = isLogin ? 'none' : '';
        R.byId('auth-message').textContent = '';
    }

    function updateAuthUi() {
        const token = R.auth.getMemberToken();
        const info = R.decodeToken(token);
        const status = R.byId('member-status');
        const logoutBtn = R.byId('logout-btn');
        const loginBtn = R.byId('nav-login-btn');
        const signupBtn = R.byId('nav-signup-btn');

        if (token && (info?.username || info?.sub)) {
            status.textContent = info.username || info.sub;
            status.style.display = 'flex';
            logoutBtn.style.display = '';
            loginBtn.style.display = 'none';
            signupBtn.style.display = 'none';
        } else {
            status.style.display = 'none';
            logoutBtn.style.display = 'none';
            loginBtn.style.display = '';
            signupBtn.style.display = '';
        }
        updateSummary();
        updateStepThreeArea();
    }

    async function loginMember() {
        const username = R.byId('auth-username').value.trim();
        const password = R.byId('auth-password').value;
        if (!username || !password) {
            R.byId('auth-message').textContent = '아이디와 비밀번호를 입력해주세요.';
            return;
        }
        try {
            const token = await R.login(username, password);
            R.auth.setMemberToken(token);
            R.byId('auth-password').value = '';
            R.byId('auth-message').textContent = '';
            closeAuthModal();
            updateAuthUi();
            R.toast('로그인되었습니다.', 'success');
            await loadMyReservations();

            const info = R.decodeToken(token);
            if (pendingReturnTo && info?.role === 'MANAGER') {
                window.location.href = pendingReturnTo;
            }
            pendingReturnTo = null;
        } catch (e) {
            R.byId('auth-message').textContent = e.message;
        }
    }

    async function registerMember() {
        const username = R.byId('signup-username').value.trim();
        const password = R.byId('signup-password').value;
        const name = R.byId('signup-name').value.trim();
        if (!username || !password || !name) {
            R.byId('auth-message').textContent = '아이디, 비밀번호, 이름을 모두 입력해주세요.';
            return;
        }
        try {
            await R.api('POST', '/users', {body: {username, password, name}});
            R.toast('회원가입이 완료되었습니다. 로그인할게요.', 'success');
            R.byId('auth-username').value = username;
            R.byId('auth-password').value = password;
            switchAuthTab('login');
            await loginMember();
        } catch (e) {
            R.byId('auth-message').textContent = e.message;
        }
    }

    function logoutMember() {
        R.auth.clearMemberToken();
        updateAuthUi();
        renderMyReservations([], []);
        R.toast('로그아웃되었습니다.', 'info');
    }

    function updateSummary() {
        const setVal = (id, value) => {
            const el = R.byId(id);
            el.textContent = value || '–';
            el.classList.toggle('empty', !value);
        };
        setVal('sum-theme', state.selectedTheme?.name);
        setVal('sum-date', state.selectedDate);
        setVal('sum-time', state.selectedTime?.startAt);
        const info = tokenInfo();
        setVal('sum-name', info?.username || info?.sub);
    }

    function updateStepThreeArea() {
        const area = R.byId('submit-area');
        if (!area) return;
        R.clear(area);
        if (!R.auth.getMemberToken()) {
            const notice = R.h('div', {className: 'login-required-notice'}, [
                R.h('p', {text: '예약을 완료하려면 로그인이 필요합니다.'}),
                R.button('btn btn-primary', '로그인하기', () => openAuthModal('login')),
            ]);
            area.appendChild(notice);
        } else {
            const btn = R.h('button', {
                className: 'btn btn-primary btn-full',
                id: 'submit-reservation-btn',
                type: 'button',
                style: {maxWidth: '300px'},
                text: state.isWaiting ? '🕐 대기 신청' : '🎟 예약 확정',
                on: {click: submitReservation},
            });
            if (state.isWaiting) {
                btn.style.background = '#eab308';
                btn.style.color = '#0d0f1a';
            }
            area.appendChild(btn);
        }
    }

    function goToStep(n) {
        for (let i = 1; i <= 3; i++) {
            R.byId(`panel-${i}`).classList.toggle('visible', i === n);
            const step = R.byId(`step-${i}`);
            step.classList.toggle('active', i === n);
            step.classList.toggle('done', i < n);
        }
        updateSummary();
        if (n === 3) updateStepThreeArea();
    }

    function renderThemeCard(theme) {
        return R.h('button', {
            className: 'theme-card',
            type: 'button',
            id: `theme-card-${theme.id}`,
            on: {click: () => selectTheme(theme)},
        }, [
            R.h('div', {className: 'theme-thumbnail'}, R.imageOrFallback(theme.thumbnailImageUrl, theme.name, {
                fallbackStyle: {width: '100%', height: '100%', fontSize: '36px'},
            })),
            R.h('div', {className: 'theme-card-body'}, [
                R.h('div', {className: 'theme-card-name', text: theme.name}),
                R.h('div', {className: 'theme-card-desc', text: theme.description || '설명 없음'}),
            ]),
        ]);
    }

    async function loadThemes(reset = true) {
        const grid = R.byId('theme-grid');
        if (reset) {
            themePageState.page = 0;
            state.themes = [];
            R.clear(grid);
            grid.appendChild(R.loadingState());
        }
        try {
            const data = await R.api('GET', `/themes?page=${themePageState.page}&size=20`);
            const themes = data.themes;
            themePageState.hasNext = data.hasNext;
            if (reset) R.clear(grid);
            state.themes = state.themes.concat(themes);
            if (reset && themes.length === 0) {
                grid.appendChild(R.emptyState('등록된 테마가 없습니다.', '🎭'));
            } else {
                themes.forEach(theme => grid.appendChild(renderThemeCard(theme)));
            }
            R.byId('theme-load-more-btn').style.display = themePageState.hasNext ? '' : 'none';
        } catch (e) {
            R.clear(grid);
            grid.appendChild(R.errorState(`로드 실패: ${e.message}`));
        }
    }

    async function loadThemeMore() {
        themePageState.page += 1;
        await loadThemes(false);
    }

    function selectTheme(theme) {
        state.selectedTheme = theme;
        document.querySelectorAll('.theme-card').forEach(card => card.classList.remove('selected'));
        R.byId(`theme-card-${theme.id}`)?.classList.add('selected');
        updateSummary();
        goToStep(2);
        if (R.byId('book-date').value) loadAvailableTimes();
    }

    async function loadPopular() {
        const limit = R.byId('pop-limit').value || 5;
        const container = R.byId('popular-section');
        R.clear(container);
        container.appendChild(R.loadingState());
        try {
            const themes = (await R.api('GET', `/themes/popular?limit=${limit}`)).themes;
            R.clear(container);
            if (!themes.length) {
                container.appendChild(R.emptyState('데이터가 없습니다.', '📊'));
                return;
            }
            const list = R.h('div', {style: {display: 'flex', flexDirection: 'column', gap: '10px'}});
            themes.forEach((theme, index) => {
                list.appendChild(R.h('button', {
                    className: 'nav-item',
                    type: 'button',
                    style: {background: 'var(--bg-input)', padding: '12px', width: '100%'},
                    on: {click: () => selectTheme(theme)},
                }, [
                    R.h('span', {
                        text: ['🥇', '🥈', '🥉'][index] || String(index + 1),
                        style: {width: '28px', textAlign: 'center'}
                    }),
                    R.h('span', {style: {flex: '1', textAlign: 'left'}}, [
                        R.h('strong', {text: theme.name}),
                        R.h('div', {
                            text: theme.description || '',
                            style: {fontSize: '12px', color: 'var(--text-secondary)'}
                        }),
                    ]),
                    R.badge(`🔖 ${theme.reservedCount}건`, 'yellow'),
                ]));
            });
            container.appendChild(list);
        } catch (e) {
            R.clear(container);
            container.appendChild(R.errorState(`조회 실패: ${e.message}`));
        }
    }

    async function loadAvailableTimes() {
        const date = R.byId('book-date').value;
        state.selectedDate = date;
        state.selectedTime = null;
        updateSummary();
        const container = R.byId('time-slot-container');
        R.clear(container);
        if (!state.selectedTheme || !date) {
            container.appendChild(R.emptyState('테마와 날짜를 선택해주세요.'));
            return;
        }
        container.appendChild(R.loadingState());
        try {
            const times = (await R.api('GET', `/themes/${state.selectedTheme.id}/times?date=${date}`)).times;
            R.clear(container);
            if (!times.length) {
                container.appendChild(R.emptyState('가용 시간이 없습니다.', '⏰'));
                return;
            }
            const now = new Date();
            const grid = R.h('div', {className: 'time-grid'});
            times.forEach(time => {
                const slotDateTime = new Date(`${date}T${time.startAt}`);
                const isPast = slotDateTime < now;
                const slotClass = isPast ? 'past' : (time.isReserved ? 'reserved' : 'available');
                const label = isPast ? '지난 시간' : (time.isReserved ? '예약됨 · 대기 신청 가능' : '예약 가능');
                grid.appendChild(R.h('button', {
                    className: `time-slot ${slotClass}`,
                    type: 'button',
                    id: `ts-${time.id}`,
                    disabled: isPast,
                    on: isPast ? {} : {click: () => selectTime(time, time.isReserved)},
                }, [
                    R.h('div', {text: time.startAt}),
                    R.h('div', {className: 'time-slot-label', text: label}),
                ]));
            });
            container.appendChild(grid);
        } catch (e) {
            R.clear(container);
            container.appendChild(R.errorState(`조회 실패: ${e.message}`));
        }
    }

    function selectTime(time, isWaiting = false) {
        state.selectedTime = time;
        state.isWaiting = !!isWaiting;
        document.querySelectorAll('.time-slot').forEach(el => el.classList.remove('selected'));
        R.byId(`ts-${time.id}`)?.classList.add('selected');
        updateSummary();
        buildConfirmSummary();
        goToStep(3);
    }

    function buildConfirmSummary() {
        const container = R.byId('confirm-summary');
        R.clear(container);
        const modeBanner = R.h('div', {
            style: {
                gridColumn: '1 / -1',
                padding: '10px 14px',
                borderRadius: 'var(--radius)',
                background: state.isWaiting ? 'rgba(234, 179, 8, 0.15)' : 'rgba(34, 197, 94, 0.15)',
                color: state.isWaiting ? '#facc15' : '#22c55e',
                fontWeight: '700',
                fontSize: '13px',
            },
            text: state.isWaiting
                ? '🕐 이미 예약된 슬롯입니다. 대기 신청 모드로 진행합니다.'
                : '🎟 일반 예약 모드입니다.',
        });
        container.append(
            modeBanner,
            R.h('div', {style: {background: 'var(--bg-input)', borderRadius: 'var(--radius)', padding: '16px'}}, [
                R.h('div', {text: '테마', style: {fontSize: '11px', color: 'var(--text-muted)', fontWeight: '600'}}),
                R.h('div', {text: state.selectedTheme?.name || '–', style: {fontSize: '16px', fontWeight: '700'}}),
                R.h('div', {
                    text: state.selectedTheme?.description || '',
                    style: {fontSize: '12px', color: 'var(--text-secondary)'}
                }),
            ]),
            R.h('div', {style: {background: 'var(--bg-input)', borderRadius: 'var(--radius)', padding: '16px'}}, [
                R.h('div', {text: '일정', style: {fontSize: '11px', color: 'var(--text-muted)', fontWeight: '600'}}),
                R.h('div', {text: state.selectedDate || '–', style: {fontSize: '16px', fontWeight: '700'}}),
                R.h('div', {
                    text: `⏰ ${state.selectedTime?.startAt || '–'}`,
                    style: {fontSize: '12px', color: 'var(--text-secondary)'}
                }),
            ]),
        );
    }

    async function submitReservation() {
        if (!requireLogin()) return;
        if (!state.selectedTheme || !state.selectedDate || !state.selectedTime) {
            R.toast('테마, 날짜, 시간을 모두 선택해주세요.', 'error');
            return;
        }
        const isWaiting = state.isWaiting;
        if (isWaiting && !confirm('이미 예약된 슬롯입니다. 대기 등록하시겠습니까?')) return;
        const endpoint = isWaiting ? '/reservations/waiting' : '/reservations';
        const token = R.auth.getMemberToken();
        const themeName = state.selectedTheme.name;
        try {
            const created = await R.api('POST', endpoint, {
                token,
                body: {
                    themeId: state.selectedTheme.id,
                    date: state.selectedDate,
                    timeId: state.selectedTime.id,
                    storeId: 1,
                },
            });
            if (isWaiting) {
                R.toast(`"${themeName}" 대기 등록이 완료되었습니다.`, 'success');
                await resetReservationWizard();
                return;
            }
            // 확정 예약: 생성된 주문을 조회해 결제창으로 진행한다.
            const order = await R.api('GET', `/order?reservationId=${created.id}`, {token});
            R.toast(`"${themeName}" 예약이 생성되었습니다. 결제를 진행해주세요.`, 'success');
            openPaymentWidget(order, themeName);
            await resetReservationWizard();
        } catch (e) {
            if (e.status === 401) R.auth.clearMemberToken();
            updateAuthUi();
            R.toast(`${isWaiting ? '대기 신청' : '예약'} 실패: ${e.message}`, 'error');
        }
    }

    async function resetReservationWizard() {
        state.selectedTheme = null;
        state.selectedDate = null;
        state.selectedTime = null;
        state.isWaiting = false;
        updateSummary();
        goToStep(1);
        await loadThemes(true);
        await loadMyReservations();
    }

    async function loadMyReservations() {
        const section = R.byId('my-res-section');
        R.clear(section);
        if (!R.auth.getMemberToken()) {
            section.appendChild(R.emptyState('로그인하면 내 예약을 확인할 수 있습니다.', '📋'));
            return;
        }
        section.appendChild(R.loadingState());
        try {
            const data = await R.api('GET', '/reservations/mine', {token: R.auth.getMemberToken()});
            renderMyReservations(data.reservations || [], data.waitingReservations || []);
        } catch (e) {
            if (e.status === 401) R.auth.clearMemberToken();
            updateAuthUi();
            R.clear(section);
            section.appendChild(R.errorState(`조회 실패: ${e.message}`));
        }
    }

    function renderMyReservations(reservations, waitingReservations) {
        const section = R.byId('my-res-section');
        R.clear(section);
        if (!R.auth.getMemberToken()) {
            section.appendChild(R.emptyState('로그인하면 내 예약을 확인할 수 있습니다.', '📋'));
            return;
        }
        const reservedRows = reservations || [];
        const waitingRows = (waitingReservations || []).slice().sort((a, b) => a.waitingOrder - b.waitingOrder);
        if (!reservedRows.length && !waitingRows.length) {
            section.appendChild(R.emptyState('예약이 없습니다.', '📭'));
            return;
        }
        const tbody = R.h('tbody');
        reservedRows.forEach(reservation => tbody.appendChild(renderReservedRow(reservation)));
        waitingRows.forEach(waiting => tbody.appendChild(renderWaitingRow(waiting)));
        section.appendChild(R.h('div', {className: 'table-wrap'}, [
            R.h('table', {}, [
                R.h('thead', {}, [
                    R.h('tr', {}, ['ID', '테마', '날짜', '시간', '상태', '액션'].map(text => R.h('th', {text}))),
                ]),
                tbody,
            ]),
        ]));
    }

    function renderReservedRow(reservation) {
        return R.h('tr', {}, [
            R.h('td', {}, [R.badge(`#${reservation.id}`)]),
            R.h('td', {text: reservation.themeName || '–'}),
            R.h('td', {text: reservation.date}),
            R.h('td', {text: reservation.time || '–'}),
            R.h('td', {}, [R.badge('예약 완료', 'green')]),
            R.h('td', {style: {display: 'flex', gap: '6px'}}, [
                R.button('btn btn-ghost btn-sm', '✏️ 수정', () => openEditModal(reservation)),
                R.button('btn btn-danger btn-sm', '✕ 취소', () => cancelReservation(reservation.id)),
            ]),
        ]);
    }

    function renderWaitingRow(waiting) {
        return R.h('tr', {}, [
            R.h('td', {}, [R.badge(`#${waiting.id}`)]),
            R.h('td', {text: waiting.themeName || '–'}),
            R.h('td', {text: waiting.date}),
            R.h('td', {text: waiting.time || '–'}),
            R.h('td', {}, [R.badge(`대기 ${waiting.waitingOrder}번`, 'yellow')]),
            R.h('td', {style: {display: 'flex', gap: '6px'}}, [
                R.button('btn btn-danger btn-sm', '✕ 취소', () => cancelReservation(waiting.id)),
            ]),
        ]);
    }

    async function cancelReservation(id) {
        if (!confirm(`#${id} 항목을 취소할까요?`)) return;
        try {
            await R.api('POST', `/reservations/${id}/cancel`, {token: R.auth.getMemberToken()});
            R.toast('취소되었습니다.', 'success');
            await loadMyReservations();
            if (state.selectedTheme && state.selectedDate) await loadAvailableTimes();
        } catch (e) {
            R.toast(`취소 실패: ${e.message}`, 'error');
        }
    }

    async function openEditModal(reservation) {
        R.byId('edit-res-id').value = reservation.id;
        R.byId('edit-date').value = reservation.date;
        try {
            const themes = (await R.api('GET', '/themes?page=0&size=100')).themes;
            R.setOptions(R.byId('edit-theme'), themes, '테마 선택');
            const matched = themes.find(theme => theme.name === reservation.themeName);
            if (matched) R.byId('edit-theme').value = String(matched.id);
        } catch (e) {
            R.toast(`테마 목록 로드 실패: ${e.message}`, 'error');
        }
        R.byId('edit-modal-backdrop').style.display = 'flex';
        await loadEditTimes();
    }

    function closeEditModal() {
        R.byId('edit-modal-backdrop').style.display = 'none';
    }

    async function loadEditTimes() {
        const themeId = R.byId('edit-theme').value;
        const date = R.byId('edit-date').value;
        const select = R.byId('edit-time');
        R.clear(select);
        select.appendChild(new Option('시간 선택', ''));
        if (!themeId || !date) return;
        try {
            const times = (await R.api('GET', `/themes/${themeId}/times?date=${date}`)).times;
            times.forEach(time => {
                const option = new Option(`${time.startAt}${time.isReserved ? ' (예약됨)' : ''}`, String(time.id));
                option.disabled = time.isReserved;
                select.appendChild(option);
            });
        } catch (e) {
            R.toast(`시간 조회 실패: ${e.message}`, 'error');
        }
    }

    async function submitEdit() {
        const id = R.byId('edit-res-id').value;
        const date = R.byId('edit-date').value;
        const themeId = R.byId('edit-theme').value;
        const timeId = R.byId('edit-time').value;
        if (!date || !themeId || !timeId) {
            R.toast('날짜, 테마, 시간을 모두 선택해주세요.', 'error');
            return;
        }
        try {
            await R.api('PUT', `/reservations/${id}`, {
                token: R.auth.getMemberToken(),
                body: {date, themeId: Number(themeId), timeId: Number(timeId)},
            });
            R.toast('예약이 수정되었습니다.', 'success');
            closeEditModal();
            await loadMyReservations();
        } catch (e) {
            R.toast(`수정 실패: ${e.message}`, 'error');
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        // 로고 클릭 → Step 1 초기화
        R.byId('logo-btn').addEventListener('click', () => {
            state.selectedTheme = null;
            state.selectedDate = null;
            state.selectedTime = null;
            state.isWaiting = false;
            updateSummary();
            goToStep(1);
            window.scrollTo({top: 0, behavior: 'smooth'});
        });

        // 로그인/회원가입 모달
        R.byId('nav-login-btn').addEventListener('click', () => openAuthModal('login'));
        R.byId('nav-signup-btn').addEventListener('click', () => openAuthModal('signup'));
        R.byId('auth-modal-close').addEventListener('click', closeAuthModal);
        R.byId('auth-modal-backdrop').addEventListener('click', e => {
            if (e.target === R.byId('auth-modal-backdrop')) closeAuthModal();
        });
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                closeAuthModal();
                closeEditModal();
                closePaymentModal();
            }
        });
        R.byId('tab-login').addEventListener('click', () => switchAuthTab('login'));
        R.byId('tab-signup').addEventListener('click', () => switchAuthTab('signup'));
        R.byId('login-btn').addEventListener('click', loginMember);
        R.byId('register-btn').addEventListener('click', registerMember);
        R.byId('auth-password').addEventListener('keydown', e => {
            if (e.key === 'Enter') loginMember();
        });
        R.byId('signup-password').addEventListener('keydown', e => {
            if (e.key === 'Enter') registerMember();
        });

        // 관리자 링크 권한 체크
        R.byId('admin-nav-btn').addEventListener('click', () => {
            const token = R.auth.getMemberToken();
            const info = R.decodeToken(token);
            if (!token) {
                pendingReturnTo = '/admin/reservation.html';
                openAuthModal('login', '관리자 페이지는 로그인 후 이용 가능합니다.');
                return;
            }
            if (info?.role !== 'MANAGER') {
                R.toast('관리자 권한이 없습니다.', 'error');
                return;
            }
            window.location.href = '/admin/reservation.html';
        });

        // 이름 클릭 → 내 예약 섹션으로 스크롤
        R.byId('member-status').addEventListener('click', async () => {
            const myResCard = R.byId('my-res-section').closest('.card');
            await loadMyReservations();
            myResCard.scrollIntoView({behavior: 'smooth', block: 'start'});
        });

        // 로그아웃
        R.byId('logout-btn').addEventListener('click', logoutMember);

        // 예약 흐름
        R.byId('theme-refresh-btn').addEventListener('click', () => loadThemes(true));
        R.byId('theme-load-more-btn').addEventListener('click', loadThemeMore);
        R.byId('popular-load-btn').addEventListener('click', loadPopular);
        R.byId('back-step-1').addEventListener('click', () => {
            state.isWaiting = false;
            goToStep(1);
        });
        R.byId('back-step-2').addEventListener('click', () => goToStep(2));
        R.byId('book-date').addEventListener('change', loadAvailableTimes);
        R.byId('my-res-refresh-btn').addEventListener('click', loadMyReservations);

        // 예약 수정 모달
        R.byId('edit-close-btn').addEventListener('click', closeEditModal);
        R.byId('edit-cancel-btn').addEventListener('click', closeEditModal);
        R.byId('edit-save-btn').addEventListener('click', submitEdit);
        R.byId('edit-theme').addEventListener('change', loadEditTimes);
        R.byId('edit-date').addEventListener('change', loadEditTimes);
        R.byId('edit-modal-backdrop').addEventListener('click', e => {
            if (e.target === R.byId('edit-modal-backdrop')) closeEditModal();
        });

        // 결제 모달
        R.byId('payment-close-btn').addEventListener('click', closePaymentModal);
        R.byId('payment-modal-backdrop').addEventListener('click', e => {
            if (e.target === R.byId('payment-modal-backdrop')) closePaymentModal();
        });

        // URL 파라미터 처리 (관리자 리다이렉트 후 복귀)
        const params = new URLSearchParams(window.location.search);
        handlePaymentRedirect(params);
        const authError = params.get('authError');
        const returnTo = params.get('returnTo');
        if (returnTo) pendingReturnTo = returnTo;
        if (authError) {
            const msg = authError === 'forbidden'
                ? '관리자 권한이 필요합니다. 관리자 계정으로 로그인해주세요.'
                : '로그인이 필요합니다.';
            openAuthModal('login', msg, authError === 'forbidden' ? 'warning' : '');
            history.replaceState(null, '', '/');
        }

        R.byId('book-date').value = new Date().toISOString().split('T')[0];
        R.byId('popular-section').appendChild(R.emptyState('조회 버튼을 눌러 확인하세요.'));
        updateAuthUi();
        loadThemes(true);
        loadMyReservations();
    });
</script>
</body>
</html>
