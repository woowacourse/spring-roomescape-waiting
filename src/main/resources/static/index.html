<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RoomEscape</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0d1a;
      color: #f3f4f6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(245, 158, 11, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 80%, rgba(239, 68, 68, 0.05) 0%, transparent 50%);
      pointer-events: none;
    }

    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle var(--dur) ease-in-out infinite;
      opacity: 0;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0; }
      50% { opacity: var(--op); }
    }

    .card {
      position: relative;
      background: rgba(18, 24, 40, 0.9);
      border: 1px solid rgba(245, 158, 11, 0.2);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow:
        0 0 0 1px rgba(245, 158, 11, 0.05),
        0 20px 60px rgba(0, 0, 0, 0.6),
        0 0 40px rgba(245, 158, 11, 0.08);
      text-align: center;
    }

    .logo {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.25em;
      color: #f59e0b;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .title {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #f3f4f6;
      margin-bottom: 8px;
    }

    .title span {
      color: #f59e0b;
    }

    .subtitle {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(245, 158, 11, 0.3), transparent);
      margin-bottom: 32px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: #9ca3af;
      text-transform: uppercase;
      text-align: left;
      margin-bottom: 8px;
    }

    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(245, 158, 11, 0.2);
      border-radius: 8px;
      color: #f3f4f6;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 24px;
    }

    input[type="text"]:focus, input[type="password"]:focus {
      border-color: #f59e0b;
      box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
    }

    input[type="text"]::placeholder, input[type="password"]::placeholder { color: #4b5563; }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      border: none;
      border-radius: 8px;
      color: #0a0d1a;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.02em;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(245, 158, 11, 0.35);
    }

    .btn-primary:active { transform: translateY(0); }

    .btn-secondary {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      background: transparent;
      border: 1px solid rgba(245, 158, 11, 0.25);
      border-radius: 8px;
      color: #f59e0b;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-secondary:hover {
      border-color: #f59e0b;
      background: rgba(245, 158, 11, 0.08);
    }

    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      align-items: center;
      justify-content: center;
      z-index: 20;
      padding: 24px;
    }

    .modal-backdrop.show { display: flex; }

    .modal {
      width: 100%;
      max-width: 420px;
      background: #111827;
      border: 1px solid rgba(245, 158, 11, 0.22);
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.55);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 800;
    }

    .modal-close {
      background: transparent;
      border: none;
      color: #6b7280;
      font-size: 24px;
      cursor: pointer;
      line-height: 1;
    }

    .modal-close:hover { color: #f3f4f6; }

    .modal .btn-primary { margin-top: 6px; }

    .field-error {
      display: none;
      margin-bottom: 16px;
      padding: 10px 14px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 6px;
      color: #fca5a5;
      font-size: 13px;
    }

    .error {
      display: none;
      margin-bottom: 16px;
      padding: 10px 14px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 6px;
      color: #fca5a5;
      font-size: 13px;
    }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="card">
  <div class="logo">Mystery Experience</div>
  <h1 class="title">Room<span>Escape</span></h1>
  <p class="subtitle">당신의 탈출을 기다리고 있습니다.<br>로그인 후 예약을 시작하세요.</p>
  <div class="divider"></div>

  <div class="error" id="error">로그인 ID와 비밀번호를 입력해주세요.</div>

  <label for="loginId">로그인 ID</label>
  <input
    type="text"
    id="loginId"
    placeholder="id"
    maxlength="255"
    autocomplete="off"
  />

  <label for="password">비밀번호</label>
  <input
    type="password"
    id="password"
    placeholder="password"
    maxlength="255"
    autocomplete="current-password"
  />

  <button class="btn-primary" onclick="login()">로그인</button>
  <button class="btn-secondary" onclick="openSignup()">회원 가입</button>
</div>

<div class="modal-backdrop" id="signupModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">회원 가입</div>
      <button class="modal-close" onclick="closeSignup()" aria-label="닫기">×</button>
    </div>

    <div class="field-error" id="signupError">회원가입에 실패했습니다.</div>

    <label for="signupName">이름</label>
    <input type="text" id="signupName" placeholder="러로" maxlength="10" autocomplete="off" />

    <label for="signupLoginId">로그인 ID</label>
    <input type="text" id="signupLoginId" placeholder="new-user" maxlength="255" autocomplete="off" />

    <label for="signupPassword">비밀번호</label>
    <input type="password" id="signupPassword" placeholder="password" maxlength="255" autocomplete="new-password" />

    <label for="signupPasswordConfirm">비밀번호 확인</label>
    <input type="password" id="signupPasswordConfirm" placeholder="password" maxlength="255" autocomplete="new-password" />

    <button class="btn-primary" onclick="signup()">가입하기</button>
  </div>
</div>

<script>
  // Generate twinkling stars
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2 + 1;
    s.style.cssText = `
      left: ${Math.random() * 100}%;
      top: ${Math.random() * 100}%;
      width: ${size}px;
      height: ${size}px;
      --dur: ${2 + Math.random() * 4}s;
      --op: ${0.3 + Math.random() * 0.6};
      animation-delay: ${Math.random() * 4}s;
    `;
    starsEl.appendChild(s);
  }

  document.getElementById('loginId').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });
  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });
  ['signupName', 'signupLoginId', 'signupPassword', 'signupPasswordConfirm'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') signup();
    });
  });

  async function login() {
    const loginId = document.getElementById('loginId').value.trim();
    const password = document.getElementById('password').value.trim();
    const err = document.getElementById('error');
    if (!loginId || !password) {
      err.textContent = '로그인 ID와 비밀번호를 입력해주세요.';
      err.style.display = 'block';
      return;
    }

    try {
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ loginId, password })
      });

      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        err.textContent = data.message || '로그인에 실패했습니다.';
        err.style.display = 'block';
        return;
      }

      const member = await res.json();
      err.style.display = 'none';
      window.location.href = member.role === 'ADMIN' ? '/admin.html' : '/user.html';
    } catch (e) {
      err.textContent = '로그인에 실패했습니다.';
      err.style.display = 'block';
    }
  }

  function openSignup() {
    document.getElementById('signupError').style.display = 'none';
    document.getElementById('signupModal').classList.add('show');
  }

  function closeSignup() {
    document.getElementById('signupModal').classList.remove('show');
  }

  async function signup() {
    const name = document.getElementById('signupName').value.trim();
    const loginId = document.getElementById('signupLoginId').value.trim();
    const password = document.getElementById('signupPassword').value.trim();
    const passwordConfirm = document.getElementById('signupPasswordConfirm').value.trim();
    const err = document.getElementById('signupError');

    if (!name || !loginId || !password || !passwordConfirm) {
      err.textContent = '모든 항목을 입력해주세요.';
      err.style.display = 'block';
      return;
    }
    if (password !== passwordConfirm) {
      err.textContent = '비밀번호가 일치하지 않습니다.';
      err.style.display = 'block';
      return;
    }

    try {
      const res = await fetch('/auth/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, loginId, password, passwordConfirm })
      });

      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        err.textContent = data.message || '회원가입에 실패했습니다.';
        err.style.display = 'block';
        return;
      }

      window.location.href = '/user.html';
    } catch (e) {
      err.textContent = '회원가입에 실패했습니다.';
      err.style.display = 'block';
    }
  }
</script>
</body>
</html>
