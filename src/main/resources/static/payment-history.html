<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주문/결제 내역</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f7f7f8; color: #222; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; background: #fff; border-bottom: 1px solid #ececec; }
        header h1 { font-size: 20px; margin: 0; }
        header a { color: #555; text-decoration: none; }
        main { max-width: 920px; margin: 0 auto; padding: 24px; }
        .search-box { display: flex; gap: 8px; margin-bottom: 20px; }
        .search-box input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; }
        .btn { padding: 12px 18px; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
        .btn-primary { background: #3182f6; color: #fff; }
        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; }
        th, td { padding: 12px 14px; text-align: left; font-size: 14px; border-bottom: 1px solid #f0f0f0; }
        th { background: #fafafa; color: #666; font-weight: 600; }
        td.mono { font-family: monospace; font-size: 12px; color: #888; word-break: break-all; }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
        .b-pending { background: #fff4e5; color: #b35900; }
        .b-confirmed { background: #e6f4ea; color: #1e7e34; }
        .b-canceled { background: #f1f1f1; color: #888; }
        .b-unknown { background: #fdecea; color: #c0392b; }
        .note { margin-top: 6px; font-size: 12px; color: #c0392b; }
        .empty, .error { color: #999; font-size: 14px; padding: 16px 0; }
        .error { color: #ff3b30; }
    </style>
</head>
<body>
<header>
    <h1>🧾 주문/결제 내역</h1>
    <a href="index.html">← 메인으로</a>
</header>
<main>
    <div class="search-box">
        <input id="name-input" maxlength="30" placeholder="예약자 이름을 입력하세요" type="text">
        <button class="btn btn-primary" id="search-btn">조회</button>
    </div>
    <div id="results">
        <p class="empty">이름으로 본인의 주문/결제 내역을 조회하세요.</p>
    </div>
</main>

<script>
    document.getElementById('search-btn').addEventListener('click', search);
    document.getElementById('name-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') search();
    });

    async function errorMessage(res) {
        const body = await res.json().catch(() => ({}));
        return body.message || `서버 오류 (${res.status})`;
    }

    async function search() {
        const name = document.getElementById('name-input').value.trim();
        const container = document.getElementById('results');
        if (!name) {
            container.innerHTML = '<p class="empty">이름을 입력하세요.</p>';
            return;
        }
        container.innerHTML = '<p class="empty">불러오는 중...</p>';
        try {
            const res = await fetch(`/user/payments?reserverName=${encodeURIComponent(name)}`);
            if (!res.ok) throw new Error(await errorMessage(res));
            render(await res.json(), name);
        } catch (e) {
            container.innerHTML = `<p class="error">내역을 불러오지 못했습니다. ${e.message}</p>`;
        }
    }

    function statusInfo(status) {
        if (status === 'CONFIRMED') return { label: '확정', cls: 'b-confirmed' };
        if (status === 'PENDING') return { label: '결제 대기', cls: 'b-pending' };
        if (status === 'CANCELED') return { label: '취소/실패', cls: 'b-canceled' };
        if (status === 'UNKNOWN') return { label: '확인 필요', cls: 'b-unknown' };
        return { label: status, cls: 'b-canceled' };
    }

    function rowHtml(o) {
        const info = statusInfo(o.paymentStatus);
        const note = o.paymentStatus === 'UNKNOWN'
            ? '<div class="note">결제 결과가 확인되지 않았습니다. 안전하게 재확인·재시도할 수 있습니다.</div>'
            : '';
        return `
            <tr>
                <td>${o.themeName}<br><span style="color:#999;font-size:12px;">${o.date} ${o.startAt}</span></td>
                <td><span class="badge ${info.cls}">${info.label}</span>${note}</td>
                <td class="mono">${o.orderId}</td>
                <td class="mono">${o.paymentKey || '-'}</td>
                <td>${o.amount.toLocaleString()}원</td>
            </tr>`;
    }

    function render(orders, name) {
        const container = document.getElementById('results');
        if (orders.length === 0) {
            container.innerHTML = `<p class="empty">${name} 님의 주문 내역이 없습니다.</p>`;
            return;
        }
        container.innerHTML = `
            <table>
                <thead>
                    <tr><th>예약 정보</th><th>결제 상태</th><th>주문번호</th><th>결제키</th><th>금액</th></tr>
                </thead>
                <tbody>${orders.map(rowHtml).join('')}</tbody>
            </table>`;
    }
</script>
</body>
</html>
