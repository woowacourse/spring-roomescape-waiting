<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roomescape Admin - 시간 관리</title>
    <link rel="stylesheet" href="/admin.css">
</head>
<body>
<div class="auth-overlay" id="auth-overlay">
    <section class="auth-card">
        <h2>관리자 인증</h2>
        <p>관리자 화면은 비밀번호 확인 후 사용할 수 있습니다.</p>
        <input id="admin-password" type="password" placeholder="비밀번호">
        <button class="primary-button" id="auth-button" type="button">확인</button>
    </section>
</div>

<nav class="nav">
    <div class="nav-inner">
        <a class="brand" href="/">Roomescape Admin</a>
        <div class="nav-links">
            <a href="/">홈</a>
            <a href="/admin-theme.html">테마 관리</a>
            <a class="active" href="/admin-time.html">시간 관리</a>
            <a href="/admin-reservation.html">예약 관리</a>
        </div>
    </div>
</nav>

<main class="page">
    <section class="hero">
        <div>
            <h1>예약 시간 관리</h1>
            <p>예약에 사용할 시간 슬롯을 추가하거나 삭제합니다.</p>
        </div>
    </section>

    <section class="panel">
        <h2>새 시간 추가</h2>
        <form class="grid-form" id="time-form">
            <div class="field">
                <label for="time-start">시작 시간</label>
                <input id="time-start" required step="300" type="time">
            </div>
            <button class="primary-button" type="submit">추가하기</button>
        </form>
    </section>

    <section class="table-panel">
        <div class="table-header">
            <h2>전체 시간</h2>
            <span class="count" id="time-count">0개</span>
        </div>
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>시작 시간</th>
                <th>상태</th>
                <th>관리</th>
            </tr>
            </thead>
            <tbody id="time-table-body"></tbody>
        </table>
        <div class="empty" id="time-empty" hidden>등록된 시간이 없습니다.</div>
    </section>
</main>

<div class="toast" id="toast"></div>

<script>
    const $ = (selector) => document.querySelector(selector);

    document.addEventListener('DOMContentLoaded', () => {
        setupAuth();
        $('#time-form').addEventListener('submit', addTime);
        fetchAllTimes();
    });

    function setupAuth() {
        if (sessionStorage.getItem('admin-authorized') === 'true') {
            $('#auth-overlay').classList.add('hidden');
        }
        $('#auth-button').addEventListener('click', checkPassword);
        $('#admin-password').addEventListener('keydown', event => {
            if (event.key === 'Enter') checkPassword();
        });
    }

    function checkPassword() {
        if ($('#admin-password').value === '1234') {
            sessionStorage.setItem('admin-authorized', 'true');
            $('#auth-overlay').classList.add('hidden');
            return;
        }
        showToast('비밀번호가 틀렸습니다.');
    }

    function fetchAllTimes() {
        fetch('/themes')
            .then(toJson)
            .then(themes => {
                if (themes.length === 0) return [];
                return fetch(`/times?themeId=${themes[0].id}&date=2099-12-31`).then(toJson);
            })
            .then(times => {
                $('#time-count').textContent = `${times.length}개`;
                $('#time-empty').hidden = times.length !== 0;
                $('#time-table-body').innerHTML = times.map(time => `
                    <tr>
                        <td>${time.id}</td>
                        <td><strong>${time.startAt}</strong></td>
                        <td><span class="badge">사용 중</span></td>
                        <td><button class="danger-button" type="button" onclick="deleteTime(${time.id})">삭제</button></td>
                    </tr>
                `).join('');
            })
            .catch(error => showToast(error.message || '시간을 불러오지 못했습니다.'));
    }

    function addTime(event) {
        event.preventDefault();
        const startAt = $('#time-start').value;

        fetch('/admin/times', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ startAt })
        })
            .then(toJson)
            .then(() => {
                showToast('시간이 추가되었습니다.');
                $('#time-form').reset();
                fetchAllTimes();
            })
            .catch(error => showToast(error.message || '시간 추가에 실패했습니다.'));
    }

    function deleteTime(id) {
        if (!confirm('시간을 삭제할까요? 예약이 연결된 시간은 삭제할 수 없습니다.')) return;

        fetch(`/admin/times/${id}`, { method: 'DELETE' })
            .then(response => {
                if (!response.ok) {
                    return response.json().catch(() => ({})).then(body => {
                        throw new Error(body.detail || body.message || '시간 삭제에 실패했습니다.');
                    });
                }
                showToast('시간이 삭제되었습니다.');
                fetchAllTimes();
            })
            .catch(error => showToast(error.message || '시간 삭제에 실패했습니다.'));
    }

    function toJson(response) {
        return response.json().catch(() => ({})).then(body => {
            if (!response.ok) throw new Error(body.detail || body.message || '요청을 처리하지 못했습니다.');
            return body;
        });
    }

    function showToast(message) {
        const toast = $('#toast');
        toast.textContent = message;
        toast.classList.add('show');
        clearTimeout(showToast.timer);
        showToast.timer = setTimeout(() => toast.classList.remove('show'), 3200);
    }
</script>
</body>
</html>
