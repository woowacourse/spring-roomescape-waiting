<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>방탈출 예약</title>
    <!--
      이 페이지가 호출하는 API
      ----------------------------------------------------
      GET    /themes                                       모든 테마
      GET    /themes/popular?limit=10                      인기 테마
      GET    /admin/times                                  모든 시간 (점유 여부 계산용)
      GET    /times?date=&themeId=                         예약 가능한 시간만 (차집합으로 점유 시간 도출)
      POST   /reservations                                 예약 생성
      GET    /reservations?name=                           내 예약 조회
      PATCH  /reservations/{id}                            예약 변경
      DELETE /reservations/{id}                            예약 취소
      POST   /reservations/waitings                        예약 대기 신청 {name, date, timeId, themeId}
      DELETE /reservations/waitings/{id}?name=             대기 취소 (본인 검증용 name 쿼리)
      GET    /reservations/waitings?name=                  내 대기 조회 (백엔드 미구현. 응답 [] fallback)
    -->
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f5f5f5;
            color: #333;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 16px 24px;
            font-size: 1.3rem;
            font-weight: bold;
        }

        .tab-bar {
            display: flex;
            background: #34495e;
            padding: 0 24px;
        }

        .tab {
            padding: 12px 20px;
            color: #aaa;
            cursor: pointer;
            font-size: 0.95rem;
            border-bottom: 3px solid transparent;
        }

        .tab.active {
            color: white;
            border-bottom-color: #3498db;
        }

        .container {
            max-width: 860px;
            margin: 40px auto;
            padding: 0 16px;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        .card {
            background: white;
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .card h2 {
            font-size: 1.1rem;
            margin-bottom: 16px;
            color: #2c3e50;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 4px;
        }

        input[type="date"], input[type="text"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            margin-bottom: 16px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: #2c3e50;
            color: white;
        }

        .btn-primary:hover {
            background: #3d5166;
        }

        .btn-success {
            background: #27ae60;
            color: white;
        }

        .btn-success:hover {
            background: #219a52;
        }

        .btn-warning {
            background: #f39c12;
            color: white;
        }

        .btn-warning:hover {
            background: #d98a0a;
        }

        /* 테마 카드 */
        .theme-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }

        .theme-card {
            border: 2px solid #eee;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: border-color 0.15s;
        }

        .theme-card:hover {
            border-color: #2c3e50;
        }

        .theme-card.selected {
            border-color: #2c3e50;
            box-shadow: 0 0 0 2px #2c3e50;
        }

        .theme-card img {
            width: 100%;
            height: 110px;
            object-fit: cover;
            display: block;
        }

        .theme-card-body {
            padding: 8px 10px;
        }

        .theme-card-body .name {
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .theme-card-body .desc {
            font-size: 0.78rem;
            color: #888;
            line-height: 1.4;
        }

        /* 인기 테마 */
        .popular-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }

        .popular-card {
            border: 1px solid #eee;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        .popular-card img {
            width: 100%;
            height: 130px;
            object-fit: cover;
            display: block;
        }

        .popular-card-body {
            padding: 10px 12px;
        }

        .popular-card-body .name {
            font-size: 0.95rem;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .popular-card-body .desc {
            font-size: 0.8rem;
            color: #888;
            line-height: 1.4;
        }

        .rank-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background: #2c3e50;
            color: white;
            font-size: 0.8rem;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 12px;
        }

        /* 시간 선택 */
        .time-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
        }

        .time-btn {
            padding: 10px 18px;
            border-radius: 6px;
            border: 2px solid #ddd;
            background: white;
            cursor: pointer;
            font-size: 0.95rem;
            position: relative;
        }

        .time-btn:hover {
            border-color: #2c3e50;
            color: #2c3e50;
        }

        .time-btn.selected {
            border-color: #2c3e50;
            background: #2c3e50;
            color: white;
        }

        .time-btn.booked {
            border-color: #e67e22;
            color: #e67e22;
            background: #fff7ec;
        }

        .time-btn.booked:hover {
            border-color: #d35400;
            color: #d35400;
        }

        .time-btn.booked.selected {
            background: #e67e22;
            color: white;
            border-color: #e67e22;
        }

        .time-btn .badge {
            display: block;
            font-size: 0.7rem;
            font-weight: bold;
            margin-top: 2px;
            opacity: 0.85;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 0.9rem;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .hidden {
            display: none;
        }

        /* 내 예약 */
        .my-search {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .my-search input {
            flex: 1;
            margin-bottom: 0;
        }

        .reservation-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .reservation-item {
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 16px;
            background: #fafafa;
        }

        .reservation-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .reservation-detail {
            font-size: 0.95rem;
            color: #333;
        }

        .reservation-detail span {
            margin-right: 16px;
            color: #555;
        }

        .reservation-actions {
            display: flex;
            gap: 8px;
        }

        .status-chip {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: bold;
            padding: 3px 10px;
            border-radius: 10px;
            margin-right: 10px;
            vertical-align: middle;
        }

        .status-chip.reserved {
            background: #27ae60;
            color: white;
        }

        .status-chip.waiting {
            background: #e67e22;
            color: white;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
            font-size: 0.85rem;
            padding: 7px 14px;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .btn-secondary {
            background: #95a5a6;
            color: white;
            font-size: 0.85rem;
            padding: 7px 14px;
        }

        .btn-secondary:hover {
            background: #7f8c8d;
        }

        .edit-form {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid #eee;
        }

        .edit-form label {
            margin-top: 8px;
        }

        .edit-form input[type="date"] {
            margin-bottom: 10px;
        }

        .empty-message {
            color: #aaa;
            font-size: 0.9rem;
            text-align: center;
            padding: 24px 0;
        }
    </style>
</head>
<body>

<header>방탈출 예약</header>

<div class="tab-bar">
    <div class="tab active" onclick="showTab('reservation')">예약하기</div>
    <div class="tab" onclick="showTab('popular')">인기 테마</div>
    <div class="tab" onclick="showTab('my')">내 예약</div>
</div>

<div class="container">

    <!-- 예약하기 -->
    <div class="section active" id="section-reservation">
        <div class="card">
            <h2>1. 날짜와 테마를 선택하세요</h2>

            <label for="date">예약 날짜</label>
            <input type="date" id="date">

            <label>테마</label>
            <div class="theme-grid" id="themeGrid"></div>

            <button class="btn-primary" onclick="loadTimes()">시간 조회</button>
        </div>

        <div class="card hidden" id="step2">
            <h2>2. 시간을 선택하세요</h2>
            <div class="alert alert-info">
                회색 시간은 예약 가능, 주황색 시간은 이미 예약되어 있어 <b>대기 신청</b>이 가능합니다.
            </div>

            <label>시간</label>
            <div class="time-list" id="timeList"></div>

            <label for="name" style="margin-top: 8px;">이름</label>
            <input type="text" id="name" placeholder="이름을 입력하세요">

            <div id="alertBox"></div>

            <button class="btn-success hidden" id="reserveBtn" onclick="submitReservation()">예약하기</button>
            <button class="btn-warning hidden" id="waitingBtn" onclick="submitWaiting()">대기 신청</button>
        </div>
    </div>

    <!-- 인기 테마 -->
    <div class="section" id="section-popular">
        <div class="card">
            <h2>최근 1주 인기 테마 TOP 10</h2>
            <div class="popular-grid" id="popularGrid"></div>
        </div>
    </div>

    <!-- 내 예약 -->
    <div class="section" id="section-my">
        <div class="card">
            <h2>내 예약 & 대기 조회</h2>
            <div class="my-search">
                <input type="text" id="myName" placeholder="이름을 입력하세요">
                <button class="btn-primary" onclick="loadMyList()">조회</button>
            </div>
            <div id="myAlertBox"></div>
            <div class="reservation-list" id="reservationList"></div>
        </div>
    </div>

</div>

<script>
    let selectedTimeId = null;
    let selectedTimeBooked = false;
    let selectedThemeId = null;

    function showTab(name) {
        document.querySelectorAll('.tab').forEach((t, i) => {
            t.classList.toggle('active', ['reservation', 'popular', 'my'][i] === name);
        });
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('section-' + name).classList.add('active');

        if (name === 'popular') loadPopularThemes();
    }

    /* ---------- 예약하기 ---------- */

    async function loadThemes() {
        const res = await fetch('/themes');
        const themes = await res.json();
        const grid = document.getElementById('themeGrid');
        grid.innerHTML = themes.map(t => `
            <div class="theme-card" data-id="${t.id}" onclick="selectTheme(this, ${t.id})">
                <img src="${t.thumbnailUrl}" alt="${t.name}">
                <div class="theme-card-body">
                    <div class="name">${t.name}</div>
                    <div class="desc">${t.description}</div>
                </div>
            </div>
        `).join('');
    }

    function selectTheme(el, themeId) {
        document.querySelectorAll('.theme-card').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        selectedThemeId = themeId;
    }

    async function loadTimes() {
        const date = document.getElementById('date').value;
        if (!date || !selectedThemeId) {
            alert('날짜와 테마를 모두 선택해주세요.');
            return;
        }

        const list = document.getElementById('timeList');
        list.innerHTML = '';
        selectedTimeId = null;
        selectedTimeBooked = false;
        toggleSubmitButtons();

        // 모든 시간과 예약 가능 시간을 받아 차집합으로 점유 시간 도출
        const [allTimes, availableTimes] = await Promise.all([
            fetchOrEmpty(`/admin/times`),
            fetchOrEmpty(`/times?date=${date}&themeId=${selectedThemeId}`)
        ]);

        const availableIds = new Set(availableTimes.map(t => t.id));
        const times = allTimes
            .map(t => ({...t, booked: !availableIds.has(t.id)}))
            .sort((a, b) => a.startAt.localeCompare(b.startAt));

        if (times.length === 0) {
            list.innerHTML = '<p style="color:#aaa;">선택 가능한 시간이 없습니다.</p>';
        } else {
            times.forEach(t => {
                const btn = document.createElement('button');
                btn.className = 'time-btn' + (t.booked ? ' booked' : '');
                btn.innerHTML = `${t.startAt}<span class="badge">${t.booked ? '대기 가능' : '예약 가능'}</span>`;
                btn.onclick = () => selectTime(btn, t.id, t.booked);
                list.appendChild(btn);
            });
        }

        document.getElementById('step2').classList.remove('hidden');
        clearAlert();
    }

    function selectTime(btn, timeId, booked) {
        document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedTimeId = timeId;
        selectedTimeBooked = booked;
        toggleSubmitButtons();
    }

    function toggleSubmitButtons() {
        const reserveBtn = document.getElementById('reserveBtn');
        const waitingBtn = document.getElementById('waitingBtn');
        reserveBtn.classList.add('hidden');
        waitingBtn.classList.add('hidden');
        if (selectedTimeId == null) return;
        if (selectedTimeBooked) {
            waitingBtn.classList.remove('hidden');
        } else {
            reserveBtn.classList.remove('hidden');
        }
    }

    async function submitReservation() {
        const name = document.getElementById('name').value.trim();
        const date = document.getElementById('date').value;
        if (!name) return showAlert('이름을 입력해주세요.', 'error');

        const res = await fetch('/reservations', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name, date, timeId: selectedTimeId, themeId: Number(selectedThemeId)})
        });

        if (res.ok) {
            showAlert('예약이 완료되었습니다.', 'success');
            await loadTimes();
            document.getElementById('name').value = '';
        } else {
            const err = await res.json().catch(() => ({message: '예약에 실패했습니다.'}));
            showAlert(err.message, 'error');
        }
    }

    async function submitWaiting() {
        const name = document.getElementById('name').value.trim();
        const date = document.getElementById('date').value;
        if (!name) return showAlert('이름을 입력해주세요.', 'error');

        const res = await fetch('/reservations/waitings', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name, date, timeId: selectedTimeId, themeId: Number(selectedThemeId)})
        });

        if (res.ok) {
            showAlert('대기 신청이 완료되었습니다.', 'success');
            await loadTimes();
            document.getElementById('name').value = '';
        } else {
            const err = await res.json().catch(() => ({message: '대기 신청에 실패했습니다.'}));
            showAlert(err.message, 'error');
        }
    }

    /* ---------- 인기 테마 ---------- */

    async function loadPopularThemes() {
        const res = await fetch(`/themes/popular?limit=10`);
        const themes = await res.json();
        const grid = document.getElementById('popularGrid');
        grid.innerHTML = themes.map((t, i) => `
            <div class="popular-card">
                <img src="${t.thumbnailUrl}" alt="${t.name}">
                <span class="rank-badge">${i + 1}위</span>
                <div class="popular-card-body">
                    <div class="name">${t.name}</div>
                    <div class="desc">${t.description}</div>
                </div>
            </div>
        `).join('');
    }

    /* ---------- 내 예약 & 대기 ---------- */

    async function loadMyList() {
        const name = document.getElementById('myName').value.trim();
        if (!name) {
            showMyAlert('이름을 입력해주세요.', 'error');
            return;
        }

        const [reservations, waitings] = await Promise.all([
            fetchOrEmpty(`/reservations?name=${encodeURIComponent(name)}`),
            fetchOrEmpty(`/reservations/waitings?name=${encodeURIComponent(name)}`)
        ]);

        const items = [
            ...reservations.map(r => ({...r, _type: 'RESERVED'})),
            ...waitings.map(w => ({...w, _type: 'WAITING'}))
        ].sort((a, b) => {
            const k = (a.date + ' ' + (a.time?.startAt ?? ''));
            const kb = (b.date + ' ' + (b.time?.startAt ?? ''));
            return k.localeCompare(kb);
        });

        const list = document.getElementById('reservationList');
        if (items.length === 0) {
            list.innerHTML = '<p class="empty-message">예약/대기 내역이 없습니다.</p>';
            clearMyAlert();
            return;
        }

        clearMyAlert();
        list.innerHTML = items.map(item => renderItem(item, name)).join('');
    }

    function renderItem(item, name) {
        if (item._type === 'WAITING') {
            const positionLabel = item.waitingPosition != null
                ? `대기 #${item.waitingPosition}`
                : '대기';
            return `
                <div class="reservation-item" id="waiting-item-${item.id}">
                    <div class="reservation-info">
                        <div class="reservation-detail">
                            <span class="status-chip waiting">${positionLabel}</span>
                            <span>📅 ${item.date}</span>
                            <span>⏰ ${item.time?.startAt ?? ''}</span>
                            <span>🎭 ${item.theme?.name ?? ''}</span>
                        </div>
                        <div class="reservation-actions">
                            <button class="btn-danger" onclick="cancelWaiting(${item.id}, '${encodeURIComponent(name)}')">취소</button>
                        </div>
                    </div>
                </div>
            `;
        }

        return `
            <div class="reservation-item" id="item-${item.id}">
                <div class="reservation-info">
                    <div class="reservation-detail">
                        <span class="status-chip reserved">예약</span>
                        <span>📅 ${item.date}</span>
                        <span>⏰ ${item.time?.startAt ?? ''}</span>
                        <span>🎭 ${item.theme?.name ?? ''}</span>
                    </div>
                    <div class="reservation-actions">
                        <button class="btn-secondary" onclick="toggleEditForm(${item.id})">변경</button>
                        <button class="btn-danger" onclick="cancelReservation(${item.id})">취소</button>
                    </div>
                </div>
                <div class="edit-form hidden" id="edit-${item.id}">
                    <label>새 날짜</label>
                    <input type="date" id="edit-date-${item.id}" onchange="loadEditTimes(${item.id}, ${item.theme?.id ?? 0})">
                    <label>새 시간</label>
                    <div class="time-list" id="edit-times-${item.id}"></div>
                    <div id="edit-alert-${item.id}"></div>
                    <button class="btn-success" onclick="submitEdit(${item.id})">저장</button>
                </div>
            </div>
        `;
    }

    async function fetchOrEmpty(url) {
        try {
            const res = await fetch(url);
            if (!res.ok) return [];
            return await res.json();
        } catch (_) {
            return [];
        }
    }

    function toggleEditForm(id) {
        document.getElementById(`edit-${id}`).classList.toggle('hidden');
    }

    async function loadEditTimes(reservationId, themeId) {
        const date = document.getElementById(`edit-date-${reservationId}`).value;
        if (!date) return;

        const res = await fetch(`/times?date=${date}&themeId=${themeId}`);
        const times = await res.json();
        const container = document.getElementById(`edit-times-${reservationId}`);

        if (times.length === 0) {
            container.innerHTML = '<p style="color:#aaa;font-size:0.9rem;">예약 가능한 시간이 없습니다.</p>';
            return;
        }

        container.innerHTML = times.map(t => `
            <button class="time-btn" id="edit-time-${reservationId}-${t.id}"
                onclick="selectEditTime(${reservationId}, ${t.id}, this)">${t.startAt}</button>
        `).join('');
    }

    const selectedEditTimeId = {};

    function selectEditTime(reservationId, timeId, btn) {
        document.querySelectorAll(`#edit-times-${reservationId} .time-btn`)
            .forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedEditTimeId[reservationId] = timeId;
    }

    async function submitEdit(reservationId) {
        const date = document.getElementById(`edit-date-${reservationId}`).value;
        const timeId = selectedEditTimeId[reservationId];
        const alertEl = document.getElementById(`edit-alert-${reservationId}`);

        if (!date || !timeId) {
            alertEl.innerHTML = '<div class="alert alert-error">날짜와 시간을 모두 선택해주세요.</div>';
            return;
        }

        const res = await fetch(`/reservations/${reservationId}`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({date, timeId})
        });

        if (res.ok) {
            showMyAlert('예약이 변경되었습니다.', 'success');
            loadMyList();
        } else {
            const err = await res.json().catch(() => ({message: '변경에 실패했습니다.'}));
            alertEl.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
        }
    }

    async function cancelReservation(reservationId) {
        if (!confirm('예약을 취소하시겠습니까?')) return;

        const res = await fetch(`/reservations/${reservationId}`, {method: 'DELETE'});

        if (res.ok) {
            showMyAlert('예약이 취소되었습니다.', 'success');
            loadMyList();
        } else {
            const err = await res.json().catch(() => ({message: '취소에 실패했습니다.'}));
            showMyAlert(err.message, 'error');
        }
    }

    async function cancelWaiting(waitingId, encodedName) {
        if (!confirm('대기를 취소하시겠습니까?')) return;

        const res = await fetch(`/reservations/waitings/${waitingId}?name=${encodedName}`, {method: 'DELETE'});

        if (res.ok) {
            showMyAlert('대기가 취소되었습니다.', 'success');
            loadMyList();
        } else {
            const err = await res.json().catch(() => ({message: '대기 취소에 실패했습니다.'}));
            showMyAlert(err.message, 'error');
        }
    }

    /* ---------- 공통 알림 ---------- */

    function showAlert(msg, type) {
        document.getElementById('alertBox').innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
    }

    function clearAlert() {
        document.getElementById('alertBox').innerHTML = '';
    }

    function showMyAlert(msg, type) {
        document.getElementById('myAlertBox').innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
    }

    function clearMyAlert() {
        document.getElementById('myAlertBox').innerHTML = '';
    }

    loadThemes();
</script>
