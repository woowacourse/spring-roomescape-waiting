<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Roomescape - 내 예약 조회</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://js.tosspayments.com/v2/standard"></script>
    <style>
        body { background-color: #f8f9fa; }
        .container { max-width: 900px; margin-top: 3rem; }
        .notice-card { background-color: #fff3cd; border-left: 5px solid #ffecb5; }
        .reservation-card { transition: all 0.2s; border-left: 5px solid #0d6efd; overflow: hidden; }
        .reservation-card:hover { transform: translateY(-5px); box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.1); }
        .theme-thumb { width: 120px; height: 100%; object-fit: cover; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Roomescape</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/">홈</a>
                <a class="nav-link" href="/reservation.html">예약하기</a>
                <a class="nav-link active" href="/my-reservation.html">내 예약 조회</a>
            </div>
        </div>
    </nav>

    <div class="container pb-5">
        <h2 class="text-center mb-4">내 예약 및 대기 내역 확인</h2>
        
        <div class="card notice-card p-3 mb-4 shadow-sm">
            <div class="d-flex align-items-center">
                <span class="fs-4 me-3">⚠️</span>
                <div>
                    <strong>안내 사항:</strong> 예약 변경 및 취소는 <strong>방탈출 게임 시작 24시간 전</strong>까지만 가능합니다. 대기 취소는 언제든지 가능합니다.
                </div>
            </div>
        </div>

        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <div class="row g-3 align-items-center">
                    <div class="col-md-9">
                        <label class="form-label d-none">이름</label>
                        <input type="text" id="user-name" class="form-control form-control-lg" placeholder="사용하신 이름을 입력하세요">
                    </div>
                    <div class="col-md-3">
                        <button class="btn btn-primary btn-lg w-100" onclick="loadAllData()">조회하기</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 탭 구조 -->
        <ul class="nav nav-tabs mb-4" id="reservationTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="reservation-tab" data-bs-toggle="tab" data-bs-target="#reservation-panel" type="button" role="tab">예약 내역</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="waiting-tab" data-bs-toggle="tab" data-bs-target="#waiting-panel" type="button" role="tab">대기 내역</button>
            </li>
        </ul>

        <div class="tab-content" id="reservationTabsContent">
            <div class="tab-pane fade show active" id="reservation-panel" role="tabpanel">
                <div id="reservation-results" class="row g-4">
                    <p class="text-center text-muted py-5">조회 버튼을 눌러 예약 내역을 확인하세요.</p>
                </div>
            </div>
            <div class="tab-pane fade" id="waiting-panel" role="tabpanel">
                <div id="waiting-results" class="row g-4">
                    <p class="text-center text-muted py-5">조회 버튼을 눌러 대기 내역을 확인하세요.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 결제 모달 -->
    <div class="modal fade" id="paymentModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">결제 수단 선택</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="modal-payment-method"></div>
                    <div id="modal-agreement" class="mt-3"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">취소</button>
                    <button type="button" class="btn btn-primary px-4" id="modal-pay-button">결제하기</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 수정 모달 -->
    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">예약 정보 수정</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="edit-form" class="row g-3">
                        <input type="hidden" id="edit-id">
                        <div class="col-md-6">
                            <label class="form-label font-weight-bold">예약자 이름 <span class="badge bg-secondary">변경 불가</span></label>
                            <input type="text" id="edit-name" class="form-control bg-light" disabled>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label font-weight-bold">테마 <span class="badge bg-secondary">변경 불가</span></label>
                            <input type="text" id="edit-theme-name" class="form-control bg-light" disabled>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label font-weight-bold">날짜</label>
                            <input type="date" id="edit-date" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label font-weight-bold">시간</label>
                            <select id="edit-time" class="form-select" required></select>
                        </div>
                        <div class="col-12 text-muted">
                            <small>* 날짜와 시간만 변경 가능합니다. 24시간 이내인 경우 수정이 제한될 수 있습니다.</small>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">닫기</button>
                    <button type="button" class="btn btn-primary px-4" onclick="updateReservation()">수정 완료</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const TOSS_CLIENT_KEY = 'test_gck_docs_Ovk5rk1EwkEbP0W43n07xlzm';

        const editModal = new bootstrap.Modal(document.getElementById('editModal'));
        const paymentModal = new bootstrap.Modal(document.getElementById('paymentModal'));
        let currentReservations = [];
        let editingThemeId = null;
        let tossWidgets = null;
        let pendingPayOrderId = null;

        document.getElementById('modal-pay-button').addEventListener('click', onModalPayClick);

        document.getElementById('paymentModal').addEventListener('shown.bs.modal', async () => {
            if (!tossWidgets) return;
            document.getElementById('modal-payment-method').innerHTML = '';
            document.getElementById('modal-agreement').innerHTML = '';
            await Promise.all([
                tossWidgets.renderPaymentMethods({ selector: '#modal-payment-method', variantKey: 'DEFAULT' }),
                tossWidgets.renderAgreement({ selector: '#modal-agreement', variantKey: 'AGREEMENT' }),
            ]);
        });

        function formatTime(time) {
            if (Array.isArray(time)) {
                return String(time[0]).padStart(2, '0') + ':' + String(time[1]).padStart(2, '0');
            }
            return time;
        }

        function loadAllData() {
            const name = document.getElementById('user-name').value.trim();
            if (!name) {
                alert('조회할 이름을 입력해주세요.');
                return;
            }
            fetchMyReservations(name);
            fetchMyWaitings(name);
        }

        function paymentStatusBadge(status, orderId, amount) {
            if (status === 'CONFIRMED') {
                return `<span class="badge bg-success">결제 완료</span>`;
            }
            if (status === 'PAYMENT_PENDING') {
                return `<span class="badge bg-warning text-dark">결제 대기</span>
                        <button class="btn btn-primary btn-sm ms-2 px-2 py-0"
                                onclick="openPaymentModal('${orderId}', ${amount})">
                            결제하기
                        </button>`;
            }
            if (status === 'PAYMENT_UNCERTAIN') {
                return `<span class="badge bg-danger">확인 필요</span>
                        <button class="btn btn-outline-danger btn-sm ms-2 px-2 py-0"
                                onclick="openPaymentModal('${orderId}', ${amount})"
                                title="결제 결과가 불명확합니다. 재시도하면 이중 청구 없이 상태를 확정할 수 있습니다.">
                            재시도
                        </button>`;
            }
            return `<span class="badge bg-secondary">${status}</span>`;
        }

        async function openPaymentModal(orderId, amount) {
            pendingPayOrderId = orderId;
            try {
                const tossPayments = TossPayments(TOSS_CLIENT_KEY);
                tossWidgets = tossPayments.widgets({ customerKey: crypto.randomUUID() });
                await tossWidgets.setAmount({ currency: 'KRW', value: amount });
                paymentModal.show();
            } catch (e) {
                console.error(e);
                alert('❌ 결제 초기화에 실패했습니다. 잠시 후 다시 시도해 주세요.');
            }
        }

        async function onModalPayClick() {
            if (!tossWidgets || !pendingPayOrderId) return;
            try {
                await tossWidgets.requestPayment({
                    orderId: pendingPayOrderId,
                    orderName: '방탈출 예약',
                    successUrl: `${window.location.origin}/payment-result.html`,
                    failUrl: `${window.location.origin}/payment-result.html`,
                });
            } catch (e) {
                handleError(e);
            }
        }

        function fetchMyReservations(name) {
            fetch(`/reservations/mine?name=${encodeURIComponent(name)}`)
                .then(response => {
                    if (!response.ok) return response.json().then(error => { throw error; });
                    return response.json();
                })
                .then(reservations => {
                    currentReservations = reservations;
                    const resultsContainer = document.getElementById('reservation-results');
                    if (reservations.length === 0) {
                        resultsContainer.innerHTML = '<div class="col-12 text-center text-muted py-5">조회된 예약 내역이 없습니다.</div>';
                        return;
                    }

                    resultsContainer.innerHTML = reservations.map(res => `
                        <div class="col-12">
                            <div class="card reservation-card shadow-sm h-100 flex-row ${res.paymentStatus === 'PAYMENT_UNCERTAIN' ? 'border-danger' : ''}">
                                <img src="${res.theme.thumbnail}" class="theme-thumb d-none d-md-block" alt="${res.theme.name}" onerror="this.src='https://picsum.photos/seed/${res.theme.id}/200/150'">
                                <div class="card-body d-flex justify-content-between align-items-center">
                                    <div>
                                        <h5 class="card-title text-primary mb-1">${res.theme.name}</h5>
                                        <div class="mb-2">
                                            <span class="badge bg-secondary me-2">${res.date}</span>
                                            <span class="badge bg-info text-dark">${formatTime(res.time.startAt)}</span>
                                        </div>
                                        <small class="text-muted d-block">예약자: ${res.name}</small>
                                        ${res.orderId ? `<small class="text-muted d-block">주문번호: ${res.orderId}</small>` : ''}
                                        ${res.amount != null ? `<small class="text-muted d-block">결제금액: ${res.amount.toLocaleString()}원</small>` : ''}
                                        ${res.paymentKey ? `<small class="text-muted d-block">결제키: ${res.paymentKey}</small>` : ''}
                                        <div class="mt-1">${res.paymentStatus ? paymentStatusBadge(res.paymentStatus, res.orderId, res.amount) : ''}</div>
                                    </div>
                                    <div class="d-flex flex-column flex-sm-row gap-2">
                                        <button class="btn btn-outline-warning btn-sm px-3" onclick="showEditModal(${res.id})">수정</button>
                                        <button class="btn btn-outline-danger btn-sm px-3" onclick="deleteReservation(${res.id})">취소</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `).join('');
                })
                .catch(handleError);
        }

        function fetchMyWaitings(name) {
            fetch(`/waitings?name=${encodeURIComponent(name)}`)
                .then(response => {
                    if (!response.ok) return response.json().then(error => { throw error; });
                    return response.json();
                })
                .then(waitings => {
                    const resultsContainer = document.getElementById('waiting-results');
                    if (waitings.length === 0) {
                        resultsContainer.innerHTML = '<div class="col-12 text-center text-muted py-5">조회된 대기 내역이 없습니다.</div>';
                        return;
                    }

                    resultsContainer.innerHTML = waitings.map(wait => `
                        <div class="col-12">
                            <div class="card reservation-card shadow-sm h-100 flex-row" style="border-left-color: #ffc107;">
                                <div class="card-body d-flex justify-content-between align-items-center">
                                    <div>
                                        <h5 class="card-title text-warning mb-1">${wait.themeName}</h5>
                                        <div class="mb-2">
                                            <span class="badge bg-secondary me-2">${wait.date}</span>
                                            <span class="badge bg-info text-dark">${formatTime(wait.startAt)}</span>
                                            <span class="badge bg-warning text-dark ms-2">대기 순번: ${wait.rank}번째</span>
                                        </div>
                                        <small class="text-muted d-block">신청자: ${wait.name}</small>
                                    </div>
                                    <div class="d-flex flex-column flex-sm-row gap-2">
                                        <button class="btn btn-outline-danger btn-sm px-3" onclick="deleteWaiting(${wait.id}, '${wait.name}')">대기 취소</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `).join('');
                })
                .catch(handleError);
        }

        function deleteWaiting(id, name) {
            if (!confirm('정말 대기 신청을 취소하시겠습니까?')) return;

            fetch(`/waitings/${id}?name=${encodeURIComponent(name)}`, { method: 'DELETE' })
                .then(response => {
                    if (response.ok) {
                        alert('✅ 대기 신청이 취소되었습니다.');
                        loadAllData();
                    } else {
                        return response.json().then(error => { throw error; });
                    }
                })
                .catch(handleError);
        }

        async function showEditModal(id) {
            const res = currentReservations.find(r => r.id === id);
            if (!res) return;

            editingThemeId = res.theme.id;

            document.getElementById('edit-id').value = res.id;
            document.getElementById('edit-name').value = res.name;
            document.getElementById('edit-theme-name').value = res.theme.name;
            document.getElementById('edit-date').value = res.date;

            // 시간 목록 로드
            await loadTimesForEdit(res.date, res.time.id);

            // 날짜 변경 시 시간 목록 재조회
            document.getElementById('edit-date').onchange = () => loadTimesForEdit();

            editModal.show();
        }

        async function loadTimesForEdit(date, selectedTimeId) {
            const d = date || document.getElementById('edit-date').value;
            const timeSelect = document.getElementById('edit-time');

            if (!editingThemeId || !d) return;

            const response = await fetch(`/times?themeId=${editingThemeId}&baseDate=${d}`);
            const times = await response.json();

            timeSelect.innerHTML = times.map(t => {
                const isCurrent = t.id === selectedTimeId;
                const disabled = t.reserved && !isCurrent;
                return `<option value="${t.id}" ${isCurrent ? 'selected' : ''} ${disabled ? 'disabled' : ''}>
                    ${formatTime(t.startAt)} ${t.reserved && !isCurrent ? '(마감)' : ''}
                </option>`;
            }).join('');
        }

        function updateReservation() {
            const id = parseInt(document.getElementById('edit-id').value);
            const date = document.getElementById('edit-date').value;
            const timeId = parseInt(document.getElementById('edit-time').value);

            const payload = { date, timeId };

            fetch(`/reservations/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(response => {
                if (response.ok) {
                    alert('✅ 예약 정보가 수정되었습니다.');
                    editModal.hide();
                    loadAllData();
                } else {
                    return response.json().then(error => { throw error; });
                }
            })
            .catch(handleError);
        }

        function deleteReservation(id) {
            if (!confirm('정말 예약을 취소하시겠습니까? (취소는 24시간 전까지만 가능합니다)')) return;

            fetch(`/reservations/${id}`, { method: 'DELETE' })
                .then(response => {
                    if (response.ok) {
                        alert('✅ 예약이 취소되었습니다.');
                        loadAllData();
                    } else {
                        return response.json().then(error => { throw error; });
                    }
                })
                .catch(handleError);
        }

        function handleError(error) {
            console.error(error);
            const code = error.exceptionCode;
            const message = error.message;

            if (code === 'RESERVATION_CANCEL_DEADLINE_PASSED') {
                alert('⏰ 처리 실패: 방탈출 게임 시작 24시간 전까지만 변경 및 취소가 가능합니다.');
            } else if (code === 'RESERVATION_NOT_FOUND') {
                alert('❓ 오류: 존재하지 않는 예약입니다.');
            } else if (code === 'RESERVATION_ALREADY_EXISTS') {
                alert('⚠️ 중복 예약: 해당 시간에는 이미 예약이 존재합니다.');
            } else if (code === 'WAITING_ALREADY_EXISTS') {
                alert('⚠️ 이미 대기 신청한 슬롯입니다.');
            } else if (code === 'CANNOT_WAIT_OWN_RESERVATION') {
                alert('🚫 본인이 이미 예약한 슬롯에는 대기를 신청할 수 없습니다.');
            } else {
                alert('❌ 오류 발생: ' + (message || '알 수 없는 오류가 발생했습니다.'));
            }
        }
    </script>
</body>
</html>
