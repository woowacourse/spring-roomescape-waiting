<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>결제 확인</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
            margin: 0;
            background: #f5f5f7;
            color: #1d1d1f;
        }

        header {
            background: #1d1d1f;
            color: #fff;
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 24px;
        }

        header a {
            color: #aaa;
            text-decoration: none;
            font-size: 14px;
        }

        main {
            max-width: 560px;
            margin: 0 auto;
            padding: 40px;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            padding: 32px;
        }

        .card h2 {
            margin: 0 0 16px;
            font-size: 20px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f3;
            font-size: 15px;
        }

        .row span:first-child {
            color: #888;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
        }

        .badge.confirmed {
            background: #d1f5d3;
            color: #1d6b1f;
        }

        .badge.waiting {
            background: #fff3cd;
            color: #856404;
        }

        .loading, .error {
            font-size: 15px;
            color: #888;
        }

        .error {
            color: #ff3b30;
        }

        .actions {
            margin-top: 24px;
        }

        .actions a {
            display: inline-block;
            padding: 12px 18px;
            background: #007aff;
            color: #fff;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
        }
    </style>
</head>
<body>
<header>
    <h1>🔑 방탈출 예약</h1>
    <a href="index.html">← 메인으로</a>
</header>
<main>
    <div class="card">
        <div id="content"><p class="loading">결제를 확인하고 있습니다...</p></div>
        <div class="actions"><a href="my-reservations.html">내 예약 보기</a></div>
    </div>
</main>

<script>
    const params = new URLSearchParams(window.location.search);
    const paymentKey = params.get('paymentKey');
    const orderId = params.get('orderId');
    const amount = params.get('amount');

    confirmPayment();

    async function confirmPayment() {
        const content = document.getElementById('content');
        try {
            const res = await fetch('/user/payments/confirm', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    paymentKey: paymentKey,
                    orderId: orderId,
                    amount: Number(amount)
                })
            });

            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.message || `서버 오류 (${res.status})`);
            }

            const reservation = await res.json();
            render(reservation);
        } catch (e) {
            content.innerHTML = `<h2>예약을 확정하지 못했습니다</h2><p class="error">${e.message}</p>`;
        }
    }

    function render(reservation) {
        let badgeClass;
        let badgeText;
        if (reservation.status === 'CONFIRMED') {
            badgeClass = 'confirmed';
            badgeText = '예약 확정';
        } else {
            badgeClass = 'waiting';
            badgeText = `예약 대기 ${reservation.waitingOrder}번`;
        }
        document.getElementById('content').innerHTML = `
            <h2>결제가 완료되었습니다 🎉</h2>
            <div class="row"><span>테마</span><span>${reservation.theme.name}</span></div>
            <div class="row"><span>예약자</span><span>${reservation.reserverName}</span></div>
            <div class="row"><span>날짜</span><span>${reservation.date}</span></div>
            <div class="row"><span>시간</span><span>${reservation.time.startAt}</span></div>
            <div class="row"><span>상태</span><span class="badge ${badgeClass}">${badgeText}</span></div>
        `;
    }
</script>
</body>
</html>
