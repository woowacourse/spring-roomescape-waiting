<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Roomflow | 결제 내역</title>
    <link rel="stylesheet" href="/css/roomescape.css">
    <script defer src="/js/roomescape.js"></script>
</head>
<body data-page="payments">
<header class="site-header">
    <a class="brand" href="/" aria-label="Roomflow 홈">
        <span class="brand-mark"></span>
        <span>Roomflow</span>
    </a>
    <nav class="top-nav" aria-label="주요 메뉴">
        <a class="nav-link" href="/">예약</a>
        <a class="nav-link" href="/my.html">내 예약</a>
        <a class="nav-link is-active" href="/payments.html">결제 내역</a>
        <a class="nav-link" href="/admin.html">관리자</a>
    </nav>
</header>

<main class="page-shell">
    <section class="page-hero">
        <p class="eyebrow">PAYMENTS</p>
        <h1>결제 내역</h1>
        <form id="paymentLookupForm" class="lookup-form">
            <label class="field">
                <span>이름</span>
                <input id="paymentLookupName" maxlength="255" autocomplete="name" placeholder="예약자 이름" required>
            </label>
            <button class="button primary" type="submit">조회</button>
        </form>
    </section>

    <section class="summary-row" aria-label="결제 요약">
        <div class="metric">
            <span>전체</span>
            <strong id="paymentTotalCount">0</strong>
        </div>
        <div class="metric">
            <span>결제 대기</span>
            <strong id="paymentReadyCount">0</strong>
        </div>
        <div class="metric">
            <span>결제 완료</span>
            <strong id="paymentConfirmedCount">0</strong>
        </div>
        <div class="metric">
            <span>결제 실패</span>
            <strong id="paymentFailedCount">0</strong>
        </div>
    </section>

    <div class="segmented-tabs" aria-label="결제 목록 필터">
        <button class="tab-button is-active" type="button" data-payment-filter="all">전체</button>
        <button class="tab-button" type="button" data-payment-filter="ready">대기</button>
        <button class="tab-button" type="button" data-payment-filter="confirmed">완료</button>
        <button class="tab-button" type="button" data-payment-filter="failed">실패</button>
    </div>

    <section id="paymentOrders" class="reservation-list" aria-live="polite"></section>
</main>

<div id="toast" class="toast" role="status" aria-live="polite"></div>
</body>
</html>
