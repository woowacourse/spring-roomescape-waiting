<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>결제 실패</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
            margin: 0;
            background: #f5f5f7;
            color: #1d1d1f;
        }

        header {
            background: #1d1d1f;
            color: #fff;
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 24px;
        }

        header a {
            color: #aaa;
            text-decoration: none;
            font-size: 14px;
        }

        main {
            max-width: 560px;
            margin: 0 auto;
            padding: 40px;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            padding: 32px;
        }

        .card h2 {
            margin: 0 0 12px;
            font-size: 20px;
        }

        .reason {
            background: #ffe5e2;
            color: #c4291c;
            padding: 16px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.5;
        }

        .code {
            color: #888;
            font-size: 13px;
            margin-top: 8px;
        }

        .actions {
            margin-top: 24px;
        }

        .actions a {
            display: inline-block;
            padding: 12px 18px;
            background: #007aff;
            color: #fff;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
        }
    </style>
</head>
<body>
<header>
    <h1>🔑 방탈출 예약</h1>
    <a href="index.html">← 메인으로</a>
</header>
<main>
    <div class="card">
        <h2>결제가 완료되지 않았습니다</h2>
        <p id="reason" class="reason">결제가 취소되었거나 실패했습니다.</p>
        <p id="code" class="code"></p>
        <div class="actions"><a href="index.html">다시 예약하기</a></div>
    </div>
</main>

<script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const message = params.get('message');
    const orderId = params.get('orderId');

    if (message) {
        document.getElementById('reason').textContent = message;
    }
    if (code) {
        document.getElementById('code').textContent = `오류 코드: ${code}`;
    }

    cleanupOrder();

    async function cleanupOrder() {
        if (!orderId) {
            return;
        }
        try {
            await fetch('/user/reservations/payment/cancel', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({code: code, message: message, orderId: orderId})
            });
        } catch (e) {
        }
    }
</script>
</body>
</html>
