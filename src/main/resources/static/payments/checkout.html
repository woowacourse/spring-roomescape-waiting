<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <title>결제하기</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="https://js.tosspayments.com/v2/standard"></script>
</head>
<body>
<header class="app-header">
    <a class="brand" href="/">
        <span class="brand-mark">RE</span>
        <span>Room Escape</span>
    </a>
</header>
<main>
    <section class="reservation-title">
        <h1>결제하기</h1>
        <p id="order-summary"></p>
    </section>

    <section class="shell">
        <!-- 결제 UI -->
        <div id="payment-method"></div>
        <!-- 이용약관 UI -->
        <div id="agreement"></div>
        <button class="primary-button" id="payment-button" style="margin-top: 30px">결제하기</button>
    </section>
</main>

<script>
    // 예약 단계에서 넘겨받은 주문 정보
    const params = new URLSearchParams(location.search);
    const orderId = params.get('orderId');
    const amount = Number(params.get('amount'));
    const orderName = params.get('orderName');
    const reservationId = params.get('reservationId');
    const customerName = params.get('customerName');

    document.getElementById('order-summary').textContent =
        `${orderName} / 결제 금액: ${amount.toLocaleString()}원`;

    main();

    async function main() {
        const button = document.getElementById('payment-button');

        // ------ 결제위젯 초기화 ------
        const clientKey = 'test_gck_docs_Ovk5rk1EwkEbP0W43n07xlzm';
        const tossPayments = TossPayments(clientKey);
        const widgets = tossPayments.widgets({customerKey: TossPayments.ANONYMOUS});

        // ------ 결제 금액 설정 ------
        await widgets.setAmount({currency: 'KRW', value: amount});

        await Promise.all([
            widgets.renderPaymentMethods({selector: '#payment-method', variantKey: 'DEFAULT'}),
            widgets.renderAgreement({selector: '#agreement', variantKey: 'AGREEMENT'}),
        ]);

        // ------ '결제하기' 클릭 시 결제창 띄우기 ------
        button.addEventListener('click', async function () {
            await widgets.requestPayment({
                orderId,
                orderName,
                successUrl: `${location.origin}/payments/success.html?reservationId=${reservationId}&customerName=${encodeURIComponent(customerName ?? '')}`,
                failUrl: `${location.origin}/payments/fail.html?reservationId=${reservationId}`,
            });
        });
    }
</script>
</body>
</html>
