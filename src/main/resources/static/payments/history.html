<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <title>주문/결제 내역</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        .history-table { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 16px; }
        .history-table th, .history-table td { padding: 10px 8px; border-bottom: 1px solid #eee; text-align: left; }
        .history-table th { color: #888; font-weight: 600; }
        .tag { font-weight: 600; white-space: nowrap; }
        .tag.CONFIRMED { color: #2b8a3e; }
        .tag.FAILED { color: #e03131; }
        .tag.UNKNOWN { color: #e8590c; }
        .tag.PENDING { color: #868e96; }
        .mono { font-family: monospace; font-size: 12px; color: #555; word-break: break-all; }
        .empty { color: #aaa; padding: 24px 0; text-align: center; }
        .inline-form { display: flex; gap: 8px; margin-top: 12px; }
    </style>
</head>
<body>
<header class="app-header">
    <a class="brand" href="/">
        <span class="brand-mark">RE</span>
        <span>Room Escape</span>
    </a>
</header>
<main>
    <section class="reservation-title">
        <h1>📜 주문/결제 내역</h1>
        <p>예약 정보와 함께 결제 상태(대기 / 확정 / 실패 / 확인 필요)를 확인할 수 있습니다.</p>
        <form id="search-form" class="inline-form">
            <input id="name-input" type="text" placeholder="예약자 이름" required>
            <button class="primary-button" type="submit">조회</button>
        </form>
    </section>

    <section class="shell">
        <table class="history-table">
            <thead>
            <tr>
                <th>테마</th>
                <th>날짜</th>
                <th>시간</th>
                <th>상태</th>
                <th>주문번호</th>
                <th>결제키</th>
                <th>금액</th>
            </tr>
            </thead>
            <tbody id="history-rows"></tbody>
        </table>
        <div id="empty" class="empty" style="display:none">내역이 없습니다.</div>
    </section>
</main>

<script>
    const params = new URLSearchParams(location.search);
    const form = document.getElementById('search-form');
    const nameInput = document.getElementById('name-input');
    const rows = document.getElementById('history-rows');
    const empty = document.getElementById('empty');

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        load(nameInput.value.trim());
    });

    async function load(name) {
        if (!name) return;
        const res = await fetch(`/payments/history?name=${encodeURIComponent(name)}`);
        const histories = await res.json();
        render(histories);
    }

    function render(histories) {
        rows.innerHTML = '';
        empty.style.display = histories.length === 0 ? 'block' : 'none';
        histories.forEach((h) => {
            const tr = document.createElement('tr');
            const approved = h.approvedAmount != null ? h.approvedAmount : h.amount;
            tr.innerHTML = `
                <td>${h.themeName}</td>
                <td>${h.date}</td>
                <td>${h.time}</td>
                <td><span class="tag ${h.status}">${h.statusLabel}</span></td>
                <td class="mono">${h.orderId}</td>
                <td class="mono">${h.paymentKey ?? '-'}</td>
                <td>${approved.toLocaleString()}원</td>`;
            rows.appendChild(tr);
        });
    }

    // 이름이 쿼리로 넘어오면 자동 조회 (success 페이지의 "확인 필요" 링크에서 사용)
    const presetName = params.get('name');
    if (presetName) {
        nameInput.value = presetName;
        load(presetName);
    }
</script>
</body>
</html>
