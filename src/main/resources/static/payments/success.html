<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <title>결제 완료</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<header class="app-header">
    <a class="brand" href="/">
        <span class="brand-mark">RE</span>
        <span>Room Escape</span>
    </a>
</header>
<main>
    <section class="reservation-title">
        <h1 id="title">결제 승인 중...</h1>
        <p id="orderId"></p>
        <p id="amount"></p>
        <a href="/" class="primary-button">홈으로 돌아가기</a>
    </section>
</main>

<script>
    const urlParams = new URLSearchParams(location.search);
    const paymentKey = urlParams.get('paymentKey');
    const orderId = urlParams.get('orderId');
    const amount = urlParams.get('amount');
    const reservationId = urlParams.get('reservationId');
    const customerName = urlParams.get('customerName');

    async function confirm() {
        const response = await fetch('/payments/confirm', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({paymentKey, orderId, amount: Number(amount)}),
        });

        const json = await response.json();

        if (!response.ok) {
            // read timeout: 승인 여부 불명("확인 필요"). 예약을 지우지 않고 내역에서 확인하도록 안내한다.
            // (멱등키 덕분에 재시도해도 이중 승인되지 않는다)
            if (json.code === 'PAYMENT_RESULT_UNKNOWN') {
                document.getElementById('title').textContent = '결제 결과 확인 필요';
                document.getElementById('orderId').textContent = json.message;
                const historyUrl = customerName
                    ? `/payments/history.html?name=${encodeURIComponent(customerName)}`
                    : '/payments/history.html';
                document.getElementById('amount').innerHTML =
                    `<a href="${historyUrl}" class="primary-button">결제 내역에서 확인하기</a>`;
                return;
            }
            // 그 외(토스 거절/연결 실패) → fail 페이지로 이동 (선점한 PENDING 예약 정리)
            location.href = `/payments/fail.html?reservationId=${reservationId}&code=${json.code}&message=${encodeURIComponent(json.message)}`;
            return;
        }

        document.getElementById('title').textContent = '예약이 완료되었습니다!';
        document.getElementById('orderId').textContent = '주문번호: ' + json.orderId;
        document.getElementById('amount').textContent = '결제 금액: ' + json.approvedAmount.toLocaleString() + '원';
    }

    confirm();
</script>
</body>
</html>
