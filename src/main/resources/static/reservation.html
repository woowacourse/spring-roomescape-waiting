<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>예약하기</title>
    <script src="https://js.tosspayments.com/v2/standard"></script>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
            margin: 0;
            background: #f5f5f7;
            color: #1d1d1f;
        }

        header {
            background: #1d1d1f;
            color: #fff;
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 24px;
        }

        header a {
            color: #aaa;
            text-decoration: none;
            font-size: 14px;
        }

        header a:hover {
            color: #fff;
        }

        main {
            max-width: 720px;
            margin: 0 auto;
            padding: 40px;
        }

        .theme-info {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 32px;
        }

        .theme-info img {
            width: 100%;
            height: 240px;
            object-fit: cover;
            display: block;
            background: #e0e0e0;
        }

        .theme-info-body {
            padding: 20px 24px;
        }

        .theme-info h2 {
            margin: 0 0 8px;
            font-size: 22px;
        }

        .theme-info p {
            margin: 0;
            color: #666;
            line-height: 1.5;
        }

        .step {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .step-label {
            font-size: 13px;
            font-weight: 600;
            color: #007aff;
            margin: 0 0 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .step h3 {
            margin: 0 0 16px;
            font-size: 18px;
        }

        input[type="date"], input[type="text"] {
            width: 100%;
            padding: 12px 14px;
            font-size: 15px;
            border: 1px solid #d2d2d7;
            border-radius: 8px;
            outline: none;
            font-family: inherit;
        }

        input[type="date"]:focus, input[type="text"]:focus {
            border-color: #007aff;
        }

        .time-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 8px;
        }

        .time-btn {
            padding: 12px 8px;
            background: #f0f0f3;
            border: 2px solid transparent;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
        }

        .time-btn span {
            display: block;
            font-size: 11px;
            font-weight: 500;
            margin-top: 4px;
            color: #666;
        }

        .time-btn:hover {
            background: #e8e8ed;
        }

        .time-btn.waiting {
            background: #fff7ed;
            border-color: #fed7aa;
            color: #9a3412;
        }

        .time-btn.waiting span {
            color: #c2410c;
        }

        .time-btn.selected {
            background: #007aff;
            color: #fff;
        }

        .time-btn.selected span {
            color: #fff;
        }

        .submit-btn.waiting {
            background: #c2410c;
        }

        .submit-btn.waiting:hover:not(:disabled) {
            background: #9a3412;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #007aff;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            margin-top: 8px;
        }

        .submit-btn:hover:not(:disabled) {
            background: #0066cc;
        }

        .submit-btn:disabled {
            background: #d2d2d7;
            cursor: not-allowed;
        }

        .empty, .error {
            color: #999;
            font-size: 14px;
            padding: 16px 0;
        }

        .error {
            color: #ff3b30;
        }

        .success {
            background: #d1f5d3;
            color: #1d6b1f;
            padding: 16px;
            border-radius: 8px;
            margin-top: 16px;
            font-size: 14px;
            line-height: 1.5;
        }

        .hidden {
            display: none;
        }

        .toast {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            padding: 12px 24px;
            background: #1d6b1f;
            color: #fff;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease, transform 0.25s ease;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>
<header>
    <h1>🔑 방탈출 예약</h1>
    <a href="index.html">← 메인으로</a>
</header>
<main>
    <div id="toast" class="toast"></div>

    <div id="theme-info" class="theme-info">
        <div class="theme-info-body">
            <p class="empty">테마 정보를 불러오는 중...</p>
        </div>
    </div>

    <div class="step">
        <p class="step-label">Step 1</p>
        <h3>날짜 선택</h3>
        <input type="date" id="date-input">
    </div>

    <div id="time-step" class="step hidden">
        <p class="step-label">Step 2</p>
        <h3>시간 선택</h3>
        <div id="times" class="time-grid"></div>
    </div>

    <div id="name-step" class="step hidden">
        <p class="step-label">Step 3</p>
        <h3>예약자 이름</h3>
        <input type="text" id="name-input" placeholder="이름을 입력하세요" maxlength="30">
        <button id="submit" class="submit-btn" disabled>예약하기</button>
        <div id="result"></div>
    </div>
</main>

<script>
    const params = new URLSearchParams(window.location.search);
    const themeId = params.get('themeId');

    let selectedTimeId = null;
    let selectedTimeStatus = null;

    if (!themeId) {
        document.querySelector('main').innerHTML = '<p class="error">테마가 선택되지 않았습니다. <a href="index.html">메인으로</a></p>';
    } else {
        init();
    }

    async function init() {
        await loadTheme();
        setupDateInput();
    }

    async function loadTheme() {
        const container = document.getElementById('theme-info');
        try {
            const res = await fetch('/user/themes');
            const themes = await res.json();
            const theme = themes.find(t => String(t.id) === String(themeId));
            if (!theme) {
                container.innerHTML = '<div class="theme-info-body"><p class="error">테마를 찾을 수 없습니다.</p></div>';
                return;
            }
            container.innerHTML = `
                <img src="${theme.thumbnailUrl}" alt="${theme.name}"
                     onerror="this.style.background='#e0e0e0'; this.removeAttribute('src');">
                <div class="theme-info-body">
                    <h2>${theme.name}</h2>
                    <p>${theme.description}</p>
                </div>
            `;
        } catch (e) {
            container.innerHTML = '<div class="theme-info-body"><p class="error">테마 정보를 불러오지 못했습니다.</p></div>';
        }
    }

    function setupDateInput() {
        const input = document.getElementById('date-input');
        const today = formatLocalDate(new Date());
        input.min = today;
        input.value = today;
        input.addEventListener('change', loadAvailableTimes);
        loadAvailableTimes();
    }

    function formatLocalDate(date) {
        const parts = new Intl.DateTimeFormat('en-CA', {
            timeZone: 'Asia/Seoul',
            year: 'numeric',
            month: '2-digit',
            day: '2-digit'
        }).formatToParts(date);
        const value = type => parts.find(part => part.type === type).value;
        return `${value('year')}-${value('month')}-${value('day')}`;
    }

    function showToast(message) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2500);
    }

    async function loadAvailableTimes() {
        const date = document.getElementById('date-input').value;
        if (!date) return;

        // 이전 선택 초기화
        selectedTimeId = null;
        selectedTimeStatus = null;
        document.getElementById('name-step').classList.add('hidden');
        document.getElementById('result').innerHTML = '';
        document.getElementById('submit').textContent = '예약하기';
        document.getElementById('submit').classList.remove('waiting');

        const container = document.getElementById('times');
        const step = document.getElementById('time-step');
        step.classList.remove('hidden');
        container.innerHTML = '<p class="empty">불러오는 중...</p>';

        try {
            const [allRes, availableRes] = await Promise.all([
                fetch('/admin/times'),
                fetch(`/user/themes/${themeId}/available-times?date=${date}`)
            ]);

            if (!allRes.ok || !availableRes.ok) throw new Error('시간 조회 실패');

            const allTimes = await allRes.json();
            const availableTimes = await availableRes.json();
            const availableIds = new Set(availableTimes.map(t => String(t.id)));
            const times = allTimes.map(t => ({
                ...t,
                status: availableIds.has(String(t.id)) ? 'AVAILABLE' : 'WAITING'
            }));

            if (times.length === 0) {
                container.innerHTML = '<p class="empty">등록된 시간이 없습니다.</p>';
                return;
            }

            container.innerHTML = times.map(t =>
                `<button class="time-btn ${t.status === 'WAITING' ? 'waiting' : ''}"
                         data-id="${t.id}" data-status="${t.status}">
                    ${t.startAt}
                    <span>${t.status === 'WAITING' ? '대기 가능' : '예약 가능'}</span>
                 </button>`
            ).join('');

            container.querySelectorAll('.time-btn').forEach(btn => {
                btn.addEventListener('click', () => selectTime(btn));
            });
        } catch (e) {
            container.innerHTML = '<p class="error">예약 가능 시간을 불러오지 못했습니다.</p>';
        }
    }

    function selectTime(btn) {
        document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedTimeId = btn.dataset.id;
        selectedTimeStatus = btn.dataset.status;

        const submitBtn = document.getElementById('submit');
        if (selectedTimeStatus === 'WAITING') {
            submitBtn.textContent = '대기 신청하기';
            submitBtn.classList.add('waiting');
        } else {
            submitBtn.textContent = '예약하기';
            submitBtn.classList.remove('waiting');
        }
        document.getElementById('name-step').classList.remove('hidden');
        validateForm();
    }

    document.getElementById('name-input').addEventListener('input', validateForm);
    document.getElementById('submit').addEventListener('click', submit);

    function validateForm() {
        const name = document.getElementById('name-input').value.trim();
        document.getElementById('submit').disabled = !(name && selectedTimeId);
    }

    function generateCustomerKey() {
        if (crypto.randomUUID) {
            return crypto.randomUUID();
        }
        return 'customer-' + Date.now() + '-' + Math.random().toString(16).slice(2);
    }

    async function submit() {
        const name = document.getElementById('name-input').value.trim();
        const date = document.getElementById('date-input').value;
        const result = document.getElementById('result');
        const submitBtn = document.getElementById('submit');

        submitBtn.disabled = true;
        result.innerHTML = '';

        if (selectedTimeStatus === 'WAITING') {
            try {
                const res = await fetch('/user/waitings', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        name: name,
                        date: date,
                        timeId: Number(selectedTimeId),
                        themeId: Number(themeId)
                    })
                });

                if (!res.ok) {
                    const body = await res.json().catch(() => ({}));
                    result.innerHTML = `<p class="error">대기 신청에 실패했습니다. ${body.message || res.status}</p>`;
                    submitBtn.disabled = false;
                    return;
                }

                const r = await res.json();
                showToast(`${r.date} ${r.time.startAt} ${r.theme.name} 대기 ${r.order}번 신청 완료!`);
                document.getElementById('name-input').value = '';
                await loadAvailableTimes();
            } catch (e) {
                result.innerHTML = `<p class="error">처리에 실패했습니다. ${e.message}</p>`;
                submitBtn.disabled = false;
            }
            return;
        }

        let order;
        try {
            const res = await fetch('/user/reservations', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    name: name,
                    date: date,
                    timeId: Number(selectedTimeId),
                    themeId: Number(themeId)
                })
            });

            if (!res.ok) {
                const body = await res.json().catch(() => ({}));
                result.innerHTML = `<p class="error">예약에 실패했습니다. ${body.message || res.status}</p>`;
                submitBtn.disabled = false;
                return;
            }

            order = await res.json();
            const tossPayments = TossPayments(order.clientKey);
            const payment = tossPayments.payment({ customerKey: generateCustomerKey() });
            await payment.requestPayment({
                method: 'CARD',
                amount: { value: order.amount, currency: 'KRW' },
                orderId: order.orderId,
                orderName: order.orderName,
                customerName: name,
                successUrl: window.location.origin + '/payments/success',
                failUrl: window.location.origin + `/payments/fail?orderId=${encodeURIComponent(order.orderId)}`,
                windowTarget: 'self'
            });
        } catch (e) {
            if (order?.orderId) {
                await fetch(`/payments/fail?orderId=${encodeURIComponent(order.orderId)}`).catch(() => {});
            }
            console.error('Toss payment failed', e, order);

            const code = e.code || e.errorCode || e.name || '';
            const message = e.message || e.errorMessage || '알 수 없는 에러가 발생했습니다.';
            const detail = code ? `[${code}] ${message}` : message;
            result.innerHTML = `<p class="error">결제가 취소되었거나 실패했습니다. ${detail}</p>`;
            submitBtn.disabled = false;
        }
    }
</script>
</body>
</html>
