<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>예약하기</title>
    <script src="https://js.tosspayments.com/v2/standard"></script>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
            margin: 0;
            background: #f5f5f7;
            color: #1d1d1f;
        }

        header {
            background: #1d1d1f;
            color: #fff;
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 24px;
        }

        header a {
            color: #aaa;
            text-decoration: none;
            font-size: 14px;
        }

        header a:hover {
            color: #fff;
        }

        main {
            max-width: 720px;
            margin: 0 auto;
            padding: 40px;
        }

        .theme-info {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 32px;
        }

        .theme-info img {
            width: 100%;
            height: 240px;
            object-fit: cover;
            display: block;
            background: #e0e0e0;
        }

        .theme-info-body {
            padding: 20px 24px;
        }

        .theme-info h2 {
            margin: 0 0 8px;
            font-size: 22px;
        }

        .theme-info p {
            margin: 0;
            color: #666;
            line-height: 1.5;
        }

        .step {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .step-label {
            font-size: 13px;
            font-weight: 600;
            color: #007aff;
            margin: 0 0 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .step h3 {
            margin: 0 0 16px;
            font-size: 18px;
        }

        input[type="date"], input[type="text"] {
            width: 100%;
            padding: 12px 14px;
            font-size: 15px;
            border: 1px solid #d2d2d7;
            border-radius: 8px;
            outline: none;
            font-family: inherit;
        }

        input[type="date"]:focus, input[type="text"]:focus {
            border-color: #007aff;
        }

        .time-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 8px;
        }

        .time-btn {
            padding: 12px 8px;
            background: #f0f0f3;
            border: 2px solid transparent;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
        }

        .time-btn span {
            display: block;
            font-size: 11px;
            font-weight: 500;
            margin-top: 4px;
            color: #666;
        }

        .time-btn:hover {
            background: #e8e8ed;
        }

        .time-btn.waiting {
            background: #fff7ed;
            border-color: #fed7aa;
            color: #9a3412;
        }

        .time-btn.waiting span {
            color: #c2410c;
        }

        .time-btn.selected {
            background: #007aff;
            color: #fff;
        }

        .time-btn.selected span {
            color: #fff;
        }

        .submit-btn.waiting {
            background: #c2410c;
        }

        .submit-btn.waiting:hover:not(:disabled) {
            background: #9a3412;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #007aff;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            margin-top: 8px;
        }

        .submit-btn:hover:not(:disabled) {
            background: #0066cc;
        }

        .submit-btn:disabled {
            background: #d2d2d7;
            cursor: not-allowed;
        }

        .empty, .error {
            color: #999;
            font-size: 14px;
            padding: 16px 0;
        }

        .error {
            color: #ff3b30;
        }

        .success {
            background: #d1f5d3;
            color: #1d6b1f;
            padding: 16px;
            border-radius: 8px;
            margin-top: 16px;
            font-size: 14px;
            line-height: 1.5;
        }

        .payment-summary {
            display: grid;
            gap: 10px;
            margin-bottom: 16px;
        }

        .payment-row {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f3;
            font-size: 14px;
        }

        .payment-row span {
            color: #666;
        }

        .payment-row strong,
        .payment-row code {
            color: #1d1d1f;
            text-align: right;
            overflow-wrap: anywhere;
        }

        .payment-row code {
            font-size: 12px;
        }

        #payment-method,
        #agreement {
            margin-top: 12px;
        }

        .payment-hint {
            margin: 14px 0 0;
            color: #777;
            font-size: 13px;
            line-height: 1.5;
        }

        .hidden {
            display: none;
        }

        .toast {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            padding: 12px 24px;
            background: #1d6b1f;
            color: #fff;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease, transform 0.25s ease;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>
<header>
    <h1>🔑 방탈출 예약</h1>
    <a href="index.html">← 메인으로</a>
</header>
<main>
    <div id="toast" class="toast"></div>

    <div id="theme-info" class="theme-info">
        <div class="theme-info-body">
            <p class="empty">테마 정보를 불러오는 중...</p>
        </div>
    </div>

    <div class="step">
        <p class="step-label">Step 1</p>
        <h3>날짜 선택</h3>
        <input type="date" id="date-input">
    </div>

    <div id="time-step" class="step hidden">
        <p class="step-label">Step 2</p>
        <h3>시간 선택</h3>
        <div id="times" class="time-grid"></div>
    </div>

    <div id="name-step" class="step hidden">
        <p class="step-label">Step 3</p>
        <h3>예약자 이름</h3>
        <input type="text" id="name-input" placeholder="이름을 입력하세요" maxlength="30">
        <div id="result"></div>
    </div>

    <div id="payment-step" class="step hidden">
        <p class="step-label">Step 4</p>
        <h3>결제</h3>
        <div class="payment-summary">
            <div class="payment-row">
                <span>주문명</span>
                <strong id="payment-order-name">방탈출 예약</strong>
            </div>
            <div class="payment-row">
                <span>주문번호</span>
                <code id="payment-order-id">-</code>
            </div>
            <div class="payment-row">
                <span>결제금액</span>
                <strong id="payment-amount">50,000원</strong>
            </div>
        </div>

        <div id="payment-method"></div>
        <div id="agreement"></div>

        <button id="pay-button" class="submit-btn" disabled>결제창 열기</button>
        <button id="submit" class="submit-btn" disabled>예약하기</button>
        <p id="payment-hint" class="payment-hint"></p>
    </div>
</main>

<script>
    const params = new URLSearchParams(window.location.search);
    const themeId = params.get('themeId');
    const PAYMENT_DRAFT_KEY = 'roomescape-payment-draft';
    const paymentResult = params.get('paymentResult');

    let selectedTimeId = null;
    let selectedTimeStatus = null;
    let paymentWidgets = null;
    let paymentReady = null;
    let paymentWidgetRendered = false;
    let paymentWidgetRendering = null;
    let paymentAuthenticated = paymentResult === 'success';
    let paymentRestored = false;

    if (!themeId) {
        document.querySelector('main').innerHTML = '<p class="error">테마가 선택되지 않았습니다. <a href="index.html">메인으로</a></p>';
    } else {
        init();
    }

    async function init() {
        await loadTheme();
        setupDateInput();
    }

    async function loadTheme() {
        const container = document.getElementById('theme-info');
        try {
            const res = await fetch('/user/themes');
            const themes = await res.json();
            const theme = themes.find(t => String(t.id) === String(themeId));
            if (!theme) {
                container.innerHTML = '<div class="theme-info-body"><p class="error">테마를 찾을 수 없습니다.</p></div>';
                return;
            }
            container.innerHTML = `
                <img src="${theme.thumbnailUrl}" alt="${theme.name}"
                     onerror="this.style.background='#e0e0e0'; this.removeAttribute('src');">
                <div class="theme-info-body">
                    <h2>${theme.name}</h2>
                    <p>${theme.description}</p>
                </div>
            `;
        } catch (e) {
            container.innerHTML = '<div class="theme-info-body"><p class="error">테마 정보를 불러오지 못했습니다.</p></div>';
        }
    }

    function setupDateInput() {
        const input = document.getElementById('date-input');
        const today = formatLocalDate(new Date());
        const draft = paymentResult ? getPaymentDraft() : null;
        input.min = today;
        input.value = draft?.date || today;
        input.addEventListener('change', loadAvailableTimes);
        loadAvailableTimes();
    }

    function formatLocalDate(date) {
        const parts = new Intl.DateTimeFormat('en-CA', {
            timeZone: 'Asia/Seoul',
            year: 'numeric',
            month: '2-digit',
            day: '2-digit'
        }).formatToParts(date);
        const value = type => parts.find(part => part.type === type).value;
        return `${value('year')}-${value('month')}-${value('day')}`;
    }

    function showToast(message) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2500);
    }

    async function loadAvailableTimes() {
        const date = document.getElementById('date-input').value;
        if (!date) return;

        // 이전 선택 초기화
        selectedTimeId = null;
        selectedTimeStatus = null;
        document.getElementById('name-step').classList.add('hidden');
        resetPaymentPreview();
        document.getElementById('result').innerHTML = '';
        document.getElementById('submit').textContent = '예약하기';
        document.getElementById('submit').classList.remove('waiting');

        const container = document.getElementById('times');
        const step = document.getElementById('time-step');
        step.classList.remove('hidden');
        container.innerHTML = '<p class="empty">불러오는 중...</p>';

        try {
            const [allRes, availableRes] = await Promise.all([
                fetch('/admin/times'),
                fetch(`/user/themes/${themeId}/available-times?date=${date}`)
            ]);

            if (!allRes.ok || !availableRes.ok) throw new Error('시간 조회 실패');

            const allTimes = await allRes.json();
            const availableTimes = await availableRes.json();
            const availableIds = new Set(availableTimes.map(t => String(t.id)));
            const times = allTimes.map(t => ({
                ...t,
                status: availableIds.has(String(t.id)) ? 'AVAILABLE' : 'WAITING'
            }));

            if (times.length === 0) {
                container.innerHTML = '<p class="empty">등록된 시간이 없습니다.</p>';
                return;
            }

            container.innerHTML = times.map(t =>
                `<button class="time-btn ${t.status === 'WAITING' ? 'waiting' : ''}"
                         data-id="${t.id}" data-status="${t.status}">
                    ${t.startAt}
                    <span>${t.status === 'WAITING' ? '대기 가능' : '예약 가능'}</span>
                 </button>`
            ).join('');

            container.querySelectorAll('.time-btn').forEach(btn => {
                btn.addEventListener('click', () => selectTime(btn));
            });
            restorePaymentState();
        } catch (e) {
            container.innerHTML = '<p class="error">예약 가능 시간을 불러오지 못했습니다.</p>';
        }
    }

    function selectTime(btn) {
        document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedTimeId = btn.dataset.id;
        selectedTimeStatus = btn.dataset.status;
        resetPaymentPreview();

        const submitBtn = document.getElementById('submit');
        if (selectedTimeStatus === 'WAITING') {
            submitBtn.textContent = '대기 신청하기';
            submitBtn.classList.add('waiting');
        } else {
            submitBtn.textContent = '예약하기';
            submitBtn.classList.remove('waiting');
        }
        document.getElementById('name-step').classList.remove('hidden');
        validateForm();
        updatePaymentPreview();
    }

    document.getElementById('name-input').addEventListener('input', () => {
        validateForm();
        updatePaymentPreview();
    });
    document.getElementById('submit').addEventListener('click', submit);
    document.getElementById('pay-button').addEventListener('click', requestPayment);

    function validateForm() {
        const name = document.getElementById('name-input').value.trim();
        const requiresPayment = selectedTimeStatus === 'AVAILABLE';
        document.getElementById('submit').disabled = !(name && selectedTimeId && (!requiresPayment || paymentAuthenticated));
    }

    async function updatePaymentPreview() {
        const name = document.getElementById('name-input').value.trim();
        if (!name) {
            resetPaymentPreview();
            return;
        }

        if (selectedTimeStatus === 'WAITING') {
            document.getElementById('payment-step').classList.remove('hidden');
            document.getElementById('payment-method').classList.add('hidden');
            document.getElementById('agreement').classList.add('hidden');
            document.getElementById('pay-button').classList.add('hidden');
            document.getElementById('payment-hint').textContent = '대기 신청은 결제 없이 진행됩니다.';
            return;
        }

        document.getElementById('payment-method').classList.remove('hidden');
        document.getElementById('agreement').classList.remove('hidden');
        document.getElementById('pay-button').classList.remove('hidden');

        resetPaymentPreview();

        document.getElementById('payment-step').classList.remove('hidden');
        document.getElementById('payment-hint').textContent = paymentAuthenticated
                ? '결제 인증이 완료되었습니다. 예약을 생성하는 중입니다.'
                : '결제수단과 약관 영역을 준비하는 중입니다.';

        try {
            paymentReady = await loadPaymentReady();
            renderPaymentSummary(paymentReady);
            await renderPaymentWidgetOnce();
            document.getElementById('pay-button').disabled = paymentAuthenticated;
            document.getElementById('pay-button').classList.toggle('hidden', paymentAuthenticated);
            if (!paymentAuthenticated) {
                document.getElementById('payment-hint').textContent = '샌드박스 테스트 결제입니다. 실제 출금은 발생하지 않습니다.';
            }
        } catch (error) {
            document.getElementById('payment-hint').textContent = `결제위젯 렌더링 실패: ${error.message}`;
        }
    }

    async function renderPaymentWidgetOnce() {
        if (paymentWidgetRendered) {
            return;
        }
        if (paymentWidgetRendering) {
            return paymentWidgetRendering;
        }
        if (!paymentReady) {
            throw new Error('결제 준비 정보가 없습니다.');
        }

        paymentWidgetRendering = (async () => {
            const tossPayments = TossPayments(paymentReady.clientKey);
            paymentWidgets = tossPayments.widgets({customerKey: TossPayments.ANONYMOUS});
            await paymentWidgets.setAmount({currency: 'KRW', value: paymentReady.amount});
            await Promise.all([
                paymentWidgets.renderPaymentMethods({selector: '#payment-method', variantKey: 'DEFAULT'}),
                paymentWidgets.renderAgreement({selector: '#agreement', variantKey: 'AGREEMENT'})
            ]);
            paymentWidgetRendered = true;
        })();

        try {
            return await paymentWidgetRendering;
        } finally {
            paymentWidgetRendering = null;
        }
    }

    async function loadPaymentReady() {
        if (paymentReady) {
            return paymentReady;
        }

        const draft = paymentResult ? getPaymentDraft() : null;
        if (draft?.payment) {
            return draft.payment;
        }

        const response = await fetch('/user/payments/ready', {method: 'POST'});
        if (!response.ok) {
            const body = await response.json().catch(() => ({}));
            throw new Error(body.message || '결제 준비에 실패했습니다.');
        }
        return await response.json();
    }

    function renderPaymentSummary(payment) {
        document.getElementById('payment-order-name').textContent = payment.orderName;
        document.getElementById('payment-order-id').textContent = payment.orderId;
        document.getElementById('payment-amount').textContent = `${Number(payment.amount).toLocaleString()}원`;
    }

    function resetPaymentPreview() {
        paymentReady = null;
        paymentAuthenticated = false;
        document.getElementById('payment-step').classList.add('hidden');
        document.getElementById('pay-button').disabled = true;
        document.getElementById('pay-button').classList.remove('hidden');
        document.getElementById('payment-method').classList.remove('hidden');
        document.getElementById('agreement').classList.remove('hidden');
        document.getElementById('payment-hint').textContent = '';
        document.getElementById('payment-order-id').textContent = '-';
    }

    async function requestPayment() {
        const name = document.getElementById('name-input').value.trim();
        const payButton = document.getElementById('pay-button');
        const hint = document.getElementById('payment-hint');

        if (!paymentWidgets || !paymentReady) {
            hint.textContent = '결제 정보가 아직 준비되지 않았습니다.';
            return;
        }

        payButton.disabled = true;
        try {
            savePaymentDraft();
            await paymentWidgets.requestPayment({
                orderId: paymentReady.orderId,
                orderName: paymentReady.orderName,
                customerName: name,
                successUrl: paymentReturnUrl('success'),
                failUrl: paymentReturnUrl('fail')
            });
        } catch (error) {
            if (error.code !== 'USER_CANCEL') {
                hint.textContent = `결제 요청 실패: ${error.message}`;
            }
            payButton.disabled = false;
        }
    }

    function savePaymentDraft() {
        const draft = {
            themeId,
            date: document.getElementById('date-input').value,
            timeId: selectedTimeId,
            name: document.getElementById('name-input').value.trim(),
            payment: paymentReady
        };
        sessionStorage.setItem(PAYMENT_DRAFT_KEY, JSON.stringify(draft));
    }

    function getPaymentDraft() {
        try {
            const draft = JSON.parse(sessionStorage.getItem(PAYMENT_DRAFT_KEY));
            return draft?.themeId === themeId ? draft : null;
        } catch (e) {
            return null;
        }
    }

    function paymentReturnUrl(result) {
        const origin = window.location.origin === 'null' ? 'http://localhost:8080' : window.location.origin;
        const url = new URL('/reservation.html', origin);
        url.searchParams.set('themeId', themeId);
        url.searchParams.set('paymentResult', result);
        return url.toString();
    }

    function restorePaymentState() {
        if (paymentRestored || !paymentResult) {
            return;
        }

        paymentRestored = true;
        const draft = getPaymentDraft();
        const result = document.getElementById('result');
        if (!draft) {
            result.innerHTML = '<p class="error">이전 예약 정보를 복원하지 못했습니다. 다시 선택해 주세요.</p>';
            return;
        }

        const nameInput = document.getElementById('name-input');
        nameInput.value = draft.name;

        const timeButton = document.querySelector(`.time-btn[data-id="${draft.timeId}"]`);
        if (!timeButton) {
            result.innerHTML = '<p class="error">이전 예약 시간을 복원하지 못했습니다. 다시 선택해 주세요.</p>';
            return;
        }

        selectTime(timeButton);
        paymentReady = draft.payment;
        renderPaymentSummary(paymentReady);
        validateForm();

        if (paymentResult === 'success') {
            paymentAuthenticated = true;
            document.getElementById('pay-button').classList.add('hidden');
            document.getElementById('pay-button').disabled = true;
            document.getElementById('payment-step').classList.remove('hidden');
            document.getElementById('payment-hint').textContent = '결제 인증이 완료되었습니다. 예약을 생성하는 중입니다.';
            result.innerHTML = '<p class="success">결제 인증이 완료되었습니다. 예약을 생성하는 중입니다.</p>';
            validateForm();
            submit();
        }

        if (paymentResult === 'fail') {
            paymentAuthenticated = false;
            document.getElementById('payment-step').classList.remove('hidden');
            document.getElementById('pay-button').classList.remove('hidden');
            document.getElementById('pay-button').disabled = false;
            document.getElementById('payment-hint').textContent = '결제에 실패했습니다. 결제창 열기를 눌러 다시 시도할 수 있습니다.';
            result.innerHTML = '<p class="error">결제에 실패했습니다. 다시 결제해 주세요.</p>';
            validateForm();
        }
    }

    async function submit() {
        const name = document.getElementById('name-input').value.trim();
        const date = document.getElementById('date-input').value;
        const result = document.getElementById('result');
        const submitBtn = document.getElementById('submit');

        submitBtn.disabled = true;
        submitBtn.textContent = selectedTimeStatus === 'WAITING' ? '대기 신청 중...' : '예약 생성 중...';
        result.innerHTML = '';

        try {
            const endpoint = selectedTimeStatus === 'WAITING' ? '/user/waitings' : '/user/reservations';
            const actionName = selectedTimeStatus === 'WAITING' ? '대기 신청' : '예약';
            const res = await fetch(endpoint, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    name: name,
                    date: date,
                    timeId: Number(selectedTimeId),
                    themeId: Number(themeId)
                })
            });

            if (!res.ok) {
                const body = await res.json().catch(() => ({}));
                const msg = body.message || `서버 오류 (${res.status})`;
                result.innerHTML = `<p class="error">${actionName}에 실패했습니다. ${msg}</p>`;
                submitBtn.disabled = false;
                submitBtn.textContent = selectedTimeStatus === 'WAITING' ? '대기 신청하기' : '예약하기';
                return;
            }

            const r = await res.json();
            sessionStorage.removeItem(PAYMENT_DRAFT_KEY);
            if (selectedTimeStatus === 'WAITING') {
                showToast(`${r.date} ${r.time.startAt} ${r.theme.name} 대기 ${r.order}번 신청 완료!`);
            } else {
                showToast(`${r.date} ${r.time.startAt} ${r.theme.name} 예약 완료!`);
            }

            document.getElementById('name-input').value = '';
            await loadAvailableTimes();
        } catch (e) {
            result.innerHTML = `<p class="error">처리에 실패했습니다. ${e.message}</p>`;
            submitBtn.disabled = false;
            submitBtn.textContent = selectedTimeStatus === 'WAITING' ? '대기 신청하기' : '예약하기';
        }
    }
