<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>관리자 · 룸이스케이프</title>
    <link rel="stylesheet" href="/css/admin.css"/>
</head>
<body>
<header class="site-header">
    <div class="header-inner">
        <h1 class="logo">Room Escape</h1>
        <nav class="header-nav">
            <a href="/index.html" class="nav-link">예약</a>
            <a href="/admin.html" class="nav-link active">관리자</a>
        </nav>
    </div>
</header>

<main class="main">
    <section class="card">
        <h2 class="section-title">테마 추가</h2>
        <p class="section-desc">새 테마를 등록합니다. 썸네일은 이미지 파일로 첨부합니다.</p>
        <form id="theme-create-form" class="form-grid">
            <label class="field">
                <span class="field__label">이름</span>
                <input type="text" id="theme-name" name="name" required/>
            </label>
            <label class="field field--full">
                <span class="field__label">설명</span>
                <textarea id="theme-desc" name="description" rows="3" required></textarea>
            </label>
            <label class="field field--full">
                <span class="field__label">썸네일 이미지</span>
                <input type="file" id="theme-image" name="file" accept="image/*" required/>
            </label>
            <div class="actions">
                <button type="submit" class="btn btn--primary">테마 등록</button>
            </div>
        </form>
        <p id="theme-create-msg" class="message" role="status"></p>
    </section>

    <section class="card">
        <h2 class="section-title">테마 삭제</h2>
        <p class="section-desc">삭제할 테마를 선택하세요. 예약이 있는 테마는 삭제할 수 없습니다.</p>
        <div class="row">
            <label class="field grow">
                <span class="field__label">테마</span>
                <select id="theme-delete-select"></select>
            </label>
            <button type="button" id="theme-delete-btn" class="btn btn--danger">삭제</button>
        </div>
        <p id="theme-delete-msg" class="message" role="status"></p>
    </section>

    <section class="card">
        <h2 class="section-title">시간 추가</h2>
        <p class="section-desc">새로운 예약 시작 시간을 등록합니다.</p>
        <form id="time-create-form" class="row">
            <label class="field grow">
                <span class="field__label">시작 시간</span>
                <input type="time" id="time-start" name="startAt" required/>
            </label>
            <button type="submit" class="btn btn--primary">시간 등록</button>
        </form>
        <p id="time-create-msg" class="message" role="status"></p>
    </section>

    <section class="card">
        <h2 class="section-title">시간 삭제</h2>
        <p class="section-desc">삭제할 예약 시간을 선택하세요. 예약이 있는 시간은 삭제할 수 없습니다.</p>
        <div class="row">
            <label class="field grow">
                <span class="field__label">시간 선택</span>
                <select id="time-delete-select"></select>
            </label>
            <button type="button" id="time-delete-btn" class="btn btn--danger">삭제</button>
        </div>
        <p id="time-delete-msg" class="message" role="status"></p>
    </section>

    <section class="card">
        <h2 class="section-title">전체 예약 목록</h2>
        <p class="section-desc">관리자 페이지에서만 확인할 수 있습니다.</p>
        <div class="table-wrap">
            <table class="data-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>이름</th>
                    <th>날짜</th>
                    <th>시간</th>
                    <th>테마</th>
                </tr>
                </thead>
                <tbody id="reservations-body"></tbody>
            </table>
        </div>
        <button type="button" id="refresh-reservations" class="btn btn--ghost">새로고침</button>
        <p id="reservations-msg" class="message" role="status"></p>
    </section>
</main>

<footer class="site-footer">
    <small>Room Escape · 관리자 페이지</small>
</footer>

<script src="/js/admin.js" defer></script>
</body>
</html>
