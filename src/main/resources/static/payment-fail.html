<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>결제 실패</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #fff; border-radius: 16px; padding: 48px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .icon { font-size: 48px; margin-bottom: 16px; }
        h2 { font-size: 24px; margin-bottom: 8px; color: #1a1a1a; }
        p { color: #666; margin-bottom: 8px; }
        .error-info { font-size: 13px; color: #999; margin-bottom: 32px; }
        a { display: inline-block; padding: 12px 32px; background: #4f46e5; color: #fff; border-radius: 8px; text-decoration: none; font-weight: 700; }
        a:hover { background: #4338ca; }
    </style>
</head>
<body>
<div class="card">
    <div class="icon">❌</div>
    <h2>결제에 실패했습니다</h2>
    <p id="message">결제 중 문제가 발생했습니다.</p>
    <p class="error-info" id="code"></p>
    <a href="/reservation.html">다시 시도하기</a>
</div>
<script>
    const params = new URLSearchParams(window.location.search);
    const message = params.get('message');
    const code = params.get('code');
    if (message) document.getElementById('message').textContent = message;
    if (code) document.getElementById('code').textContent = '오류 코드: ' + code;
</script>
</body>
</html>
