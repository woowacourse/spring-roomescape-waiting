<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>결제 실패 · RoomEscape</title>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap"
          rel="stylesheet"/>
    <link href="/styles/common.css" rel="stylesheet"/>
    <style>
        .result-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            gap: 16px;
            text-align: center;
        }
        .result-icon { font-size: 48px; }
        .result-title { font-size: 24px; font-weight: 600; }
        .result-desc { color: #666; }
        .btn-back {
            margin-top: 8px;
            padding: 12px 32px;
            background: #3182f6;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
        }
    </style>
</head>
<body>
<nav class="top-nav">
    <div class="nav-inner">
        <a class="nav-logo" href="/">RoomEscape</a>
    </div>
</nav>

<main class="result-page">
    <div class="result-icon">❌</div>
    <div class="result-title">결제가 취소되었습니다.</div>
    <div class="result-desc" id="failMessage"></div>
    <a class="btn-back" href="/reserve">예약 다시 시도</a>
</main>

<script>
    const params = new URLSearchParams(window.location.search);
    const message = params.get("message");
    if (message) {
        document.getElementById("failMessage").textContent = decodeURIComponent(message);
    }
</script>
</body>
</html>
